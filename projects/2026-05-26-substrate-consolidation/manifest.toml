changes_since_previous = "Third unit of Phase 2. Adds the typed write path (stringifyManifest + atomic writeManifest with verify-before-rename + mtime/size concurrency guard) on top of U2's reader. Lib only — U4 folds checkins/sessions through the same mechanism; U5 flips the writer verbs onto this path and converts the on-disk state atomically."
verdict = { result = "approved", reasons = [] }
notes_for_pr = ["Operator decisions this unit (grilled before contract): (1) WRITE-PATH LIB ONLY — the verb-dispatch flip + this/sibling-project conversion both defer to U5, because the source loom does this project's own bookkeeping and it is still JSON until U5 (flipping verbs now would break the dogfood loop on its own project). (2) Concurrency safety = mtime/size re-check before rename -> loud abort, plus a single-writer-per-project note (vs document-only or lockfile).", "Design wrinkle resolved: the lenient-detail decision (U2) means Event.detail can carry null (e.g. a research event's topic: string | null), and TOML encodes null as absence — so a naive deep-equal verify would false-fail on null-vs-absent. verify-before-rename therefore compares null-STRIPPED trees (stripNullish), which stays immune to the asymmetry while still catching a dropped non-null field.", "verify-before-rename is compare-to-original, NOT a fixed-point check: stringifyManifest(readManifest(s)) === s would pass even if the serializer consistently dropped a field (the dropped field is absent on both sides). Comparing the re-parsed output against the original m catches that class.", "Naming ADVISORY (non-gating, kept deliberately): readManifest(string) / readManifestFile(path) / writeManifest(path) is asymmetric. The decision: the ...File suffix exists ONLY to disambiguate readManifest (pure, string) from readManifestFile (fs, path). Since there is no writeManifest(string), the write side needs no suffix — a suffix carrying no disambiguation is noise. The pure pair is readManifest/stringifyManifest; the fs pair is readManifestFile/writeManifest. Suffix-only-where-it-disambiguates is the principle; documented here so the asymmetry reads as deliberate, not sloppy.", "Panel = contract-fit + test-unit + naming. Same manual override: derive-panel adds evaluator-react-api for these pure-Node .ts files (no React/JSX) — dropped. Substrate-followup: gate react-api on JSX/react-import presence.", "Scope-shift detection: zero signals (panel approved, grill decisions were unit-contract scope, no round-2 whiteboard, U3 is not the phase's last unit). No revise offered.", "#73 (Phase 2 U2) pr-opened + pr-merged reconciled into this commit per the per-unit cadence recipe."]

