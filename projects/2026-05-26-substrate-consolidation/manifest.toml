contract = { goal = "Add the typed WRITE half of the manifest.toml layer on top of U1/U2: serialize a ManifestToml back to sectioned TOML, and write it atomically with a corruption guard (verify-before-rename) and an optimistic-concurrency guard (mtime/size re-check). LIB ONLY — tested against temp-dir fixtures; the live writer-verb dispatch and the on-disk project conversion both stay in U5 (keeps the dogfood loop running on JSON through U3/U4). The riskiest seam, isolated.", acceptance_criteria = ["manifest-toml.ts gains stringifyManifest(m: ManifestToml): string (inverse of readManifest; emits the six sections via stringifyToml); honors null-by-absence (meta nullable scalars + undefined optional phase fields omitted; [config] omits schema_version)", "round-trip closes: readManifest(stringifyManifest(m)) deep-equals m (null-stripped), pinned vs the U2 real fixture AND synthetic manifests (null current_branch, empty-detail event, phase without pr)", "writeManifest(path, m, opts?: { expect?: WriteToken }): WriteToken — serialize, verify-before-rename (stripNullish(readManifest(s)) deep-equals stripNullish(m); throw rather than rename on mismatch), then atomic temp + renameSync", "optimistic concurrency: readManifestFile(path) captures WriteToken={mtimeMs,size}; writeManifest with a stale expect token aborts loudly (manifest-changed-under-write) instead of clobbering; fresh write proceeds; + single-writer-per-project note", "append-only preservation test: read manifest with N events, append one in-memory, writeManifest, read back -> events toEqual the original N in order plus the new one", "strip-only smoke extended (stringifyManifest + writeManifest->readManifestFile to a temp path) under node; standalone exit 0 + marker", "vitest green (new + full loom suite) + standalone node smoke exit 0"], rules_applied = ["Lib only: no verb-dispatch edits, no live manifest.json touched, no project conversion (all U5)", "Atomic temp+rename (the current writeFileSync is non-atomic — this is net-new safety)", "verify-before-rename is compare-to-original null-stripped deep-equal (NOT a fixed-point check, which can't catch a consistently-dropped field); immune to the lenient-detail null/absent asymmetry via stripNullish", "loud LoomError on verify failure and on concurrent modification", "harvest the temp-dir test idiom (mkdtempSync + rmSync) from loom.test.ts makeCtx; unique temp dir per test (parallel-safe)"], disqualifiers = ["rewiring any verb to the toml write path (U5)", "converting any real project's on-disk state (U5)", "editing live manifest.ts/config.ts/events.ts writers", "a non-atomic write (must temp+rename)", "a verify that uses a fixed-point check instead of compare-to-original", "silent clobber on concurrent modification", "gold-plating into lockfiles (operator chose mtime/size)"], inputs = ["plugins/loom/cli/lib/manifest-toml.ts (U2 readManifest + types)", "plugins/loom/cli/lib/toml.ts (stringifyToml)", "plugins/loom/cli/loom.test.ts ~181-212 + makeCtx (temp-dir + spawnSync idiom)", "plugins/loom/cli/lib/errors.ts (LoomError)", "plugins/loom/cli/fixtures/manifest-real.toml (U2 fixture)", "projects/2026-05-26-substrate-consolidation/whiteboards/2-single-file-toml-state.md (Q3 append-only + atomic-write, verify-before-rename + mtime re-check mandates)"] }
