c — this is net-new safety)", "verify-before-rename is compare-to-original null-stripped deep-equal (NOT a fixed-point check, which can't catch a consistently-dropped field); immune to the lenient-detail null/absent asymmetry via stripNullish", "loud LoomError on verify failure and on concurrent modification", "harvest the temp-dir test idiom (mkdtempSync + rmSync) from loom.test.ts makeCtx; unique temp dir per test (parallel-safe)"], disqualifiers = ["rewiring any verb to the toml write path (U5)", "converting any real project's on-disk state (U5)", "editing live manifest.ts/config.ts/events.ts writers", "a non-atomic write (must temp+rename)", "a verify that uses a fixed-point check instead of compare-to-original", "silent clobber on concurrent modification", "gold-plating into lockfiles (operator chose mtime/size)"], inputs = ["plugins/loom/cli/lib/manifest-toml.ts (U2 readManifest + types)", "plugins/loom/cli/lib/toml.ts (stringifyToml)", "plugins/loom/cli/loom.test.ts ~181-212 + makeCtx (temp-dir + spawnSync idiom)", "plugins/loom/cli/lib/errors.ts (LoomError)", "plugins/loom/cli/fixtures/manifest-real.toml (U2 fixture)", "projects/2026-05-26-substrate-consolidation/whiteboards/2-single-file-toml-state.md (Q3 append-only + atomic-write, verify-before-rename + mtime re-check mandates)"] }
