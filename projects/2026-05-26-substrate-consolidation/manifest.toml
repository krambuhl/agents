notes_for_pr = ["Panel = contract-fit + test-unit + naming. Manual override: bin/guild derive-panel emitted evaluator-react-api for these .ts files, but they are pure-Node CLI lib with no React/JSX import — dropped per the known derive-panel misderivation (gate react-api on JSX/react-import presence, not bare .ts). Substrate-followup candidate.", "Harvest note: jelly-loom's manifest.ts parser is line-flat and hardcodes [config]/[[phases]] with only flat-scalar + string-array support. This lib keeps its mechanism (comment-stripping, escape/unescape, array-splitting, loud rejection) but generalizes to arbitrary table/array-of-table headers and adds a recursive value parser for nestable inline tables — the encoding loom's Checkin.contract and Event.detail (~40 detail variants) need. The whiteboard's TOML-fit concern (loom's nested data) is addressed by the inline-table mechanism per the operator's APPROVED decision to encode nesting as inline tables rather than switch to one-file JSON.", "Round-trip invariant rests on: the value tree does not record header-vs-inline provenance, so stringify is free to use [table]/[[array]] headers at the root and inline {...}/[...] when nested, and parse reconstructs the same TomlTable from either form.", "Scope-shift detection: zero signals (panel clean, no plan-structure redirect, no round-2 whiteboard, U1 is not the phase's last unit). No revise offered.", "Installed-vs-source: toml.ts is a lib (not yet wired to any verb), so there is no runtime-active-vs-installed gap for this unit — it ships as source for U2 to import.", "Carried from Phase 1 (still unresolved): .plan -> main cadence (land periodically vs one integration PR at project end). .plan is ~10 commits ahead of main."]

