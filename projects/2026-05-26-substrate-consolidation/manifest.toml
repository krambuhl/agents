supported construct throws LoomError('toml-invalid', 'line N: ...') — never silently mis-parse", "Headers at root only: nesting below a header is expressed inline ({...}/[...]); the value tree does not distinguish header-vs-inline, so round-trip holds either way", "Zero runtime dependency: only import is LoomError from ./errors.ts"], disqualifiers = ["coupling the parser to a Manifest type", "a runtime/npm TOML dependency", "silent mis-parse (must throw loud)", "parameter properties or */-in-JSDoc (strip-only break)", "lossy escaping", "gold-plating the subset beyond loom's manifest needs"], inputs = ["plugins/jelly-loom/cli/lib/manifest.ts (mechanism + loud-rejection harvest)", "plugins/loom/cli/lib/types.ts (Checkin/Event shapes the inline tables must encode)", "plugins/loom/cli/lib/errors.ts (LoomError)", "plugins/loom/cli/lib/plan.smoke.ts + plan.real.test.ts (strip-only smoke idiom)", "projects/2026-05-26-substrate-consolidation/whiteboards/2-single-file-toml-state.md (round 1 design context)"] }
