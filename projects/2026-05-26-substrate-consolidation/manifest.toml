open_threads = ["RESUME ACTION: build U1 — generic TOML parser/serializer in plugins/loom/cli/lib/toml.ts per the approved contract (full contract in notes below). Branch ev-agent.substrate-consolidation.toml-parser is already cut off the updated .plan; phase 2 is marked in-progress on it. The Phase 2 whiteboard (round 1) is DONE — do NOT re-run the phase whiteboard; resume directly at the U1 unit loop.", "Phase 2 required additions from the whiteboard (fold into the unit contracts): (a) U5 bootstrapping conversion script — this project + 5 siblings all carry manifest.json and project.ts:15 hardcodes LOOM_MARKER='manifest.json', so removing manifest.json blinds listProjects; the marker-flip + file-removal + converted on-disk state MUST be atomic in ONE commit. (b) U3 append-only guards: atomic temp+rename + round-trip-verify-before-rename (throw-don't-corrupt) + an explicit single-writer-per-project note.", "5-unit roadmap: U1 generic TOML parser; U2 manifest.toml typing layer + read path (real-artifact regression vs a hand-authored manifest.toml); U3 atomic write + migrate writer verbs (riskiest seam); U4 checkins/sessions as manifest sections + shared parallel-safe verb-test harness (unique temp dir per test, assert other-sections-untouched); U5 dogfood conversion + old-format removal (LAST). Ordering: reader before writer, writer before format-flip, conversion dead-last.", "Cadence question carried from Phase 1 (unresolved): land .plan -> main periodically vs one integration PR at project end. .plan is currently ~10 commits ahead of main, unmerged."]
notes = ["APPROVED U1 CONTRACT — Goal: pure, hand-rolled, zero-dep TOML parser+serializer in plugins/loom/cli/lib/toml.ts covering loom's manifest subset, harvesting jelly-loom/cli/lib/manifest.ts's parse/serialize MECHANISM + loud-rejection posture (NOT its JellyManifest coupling). Generic value-tree so U2's manifest layer sits on top. ACs: (1) parseToml(raw):TomlTable + stringifyToml(table):string exported, pure, generic (type TomlValue = string|number|boolean|TomlValue[]|TomlTable). (2) Subset: [table] headers, [[array-of-table]] headers, scalars (basic strings/ints/booleans), arrays (of scalars AND of inline tables), nestable inline tables { k=v, ... } (the Checkin/Event.detail encoding), symmetric escaping \\\" \\\\ \\n \\t \\r; unsupported constructs (multiline strings, floats/dates, dotted keys) throw a LoomError naming the line. (3) Round-trip: parseToml(stringifyToml(t)) deep-equals t — fixture-pinned nasty cases (# / \" / */ inside a string, empty arrays, inline table holding a string-array, array-of-tables with inline-table fields, deeply-nested inline tables mirroring a real Checkin) PLUS one escaping property test. (4) Strip-only smoke: toml.smoke.ts imports lib directly + round-trips a maximally-nested sample, shelled via spawnSync('node') asserting exit 0 + marker. (5) Strip-only safe: // comments only, no parameter properties, erasable TS. (6) vitest green (new + full loom suite) + standalone node toml.smoke.ts exit 0. Disqualifiers: coupling parser to Manifest type; runtime/npm TOML dep; silent mis-parse (must throw loud); parameter properties or */-in-JSDoc; lossy escaping; gold-plating the subset. Inputs: jelly-loom manifest.ts + manifest.test.ts; loom/cli/lib/types.ts (Checkin/Event shapes); loom/cli/lib/plan.smoke.ts + loom.test.ts:181-212 (smoke idiom); loom/cli/lib/errors.ts.", "Phase 2 whiteboard artifact (FULL design context — read it before building): projects/2026-05-26-substrate-consolidation/whiteboards/2-single-file-toml-state.md (round 1: substrate-engineer + testing-strategy + skeptic on parser shape, append-only integrity, bootstrapping, unit breakdown).", "INSTALLED-VS-SOURCE CAVEAT: the global `loom`/`guild`/`griot` on PATH are the stale marketplace-installed copies. Run new/changed verbs via the LOCAL entry (node plugins/loom/cli/loom.ts ...). Phase 1's parse-plan verb + the migrated ev skills are source-correct but NOT runtime-active until loom+ev are re-installed.", "PR cadence recipe (see memory project-substrate-consolidation-pr-cadence): per-unit PRs into .plan via `gh pr create --base ev-agent.substrate-consolidation.plan`; on merge, discard the orphaned pr-opened append, checkout+pull .plan, cut the next unit branch, re-record pr-opened+pr-merged (idempotent) riding the next unit's commit.", "This commit (Phase 2 setup) carries: the whiteboard artifact, the #71 pr-opened/pr-merged reconciliation, phase-2-in-progress manifest state, and this session handoff."]
