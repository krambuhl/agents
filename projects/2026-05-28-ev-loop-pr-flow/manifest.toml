execution = { actions = ["Added `§ Wait for merge` recipe to `plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md` between `§ Compose PR` and `§ Revise PLAN.md`. 5-field shape: Purpose / Wraps / Idempotency / Failure modes / Used by. Purpose covers the 4 exit reasons + observation-only invariant + per-poll re-resolution + the bolded Silencing-rule paragraph (sub-content of Purpose, not a 6th field). Wraps shows canonical `bin/loom pr wait` invocation with named defaults. Idempotency `safe`. Failure modes table: 6 cases including the explicit `timeout/closed are NOT errors` note. Used by → `/ev-run` step 3.", "Updated `/ev-run` step 3 in `plugins/ev/skills/ev-run/SKILL.md` with explicit 4-branch routing on `exitReason`: (a) `merged` → re-fetch via `loom pr discover` (observation-only) → re-run step 3 from 3.1 → step 4 dispatches the now-unblocked phase; (b) `closed` → surface 'PR closed without merging — investigate; phase stays not-started; resolve and re-run /ev-run' + exit (do NOT dispatch — substrate safety property); (c) `timeout` → surface 'still open after N min — run /ev-run later' + exit cleanly; (d) `gh-failed` → surface 'wait failed: gh CLI not responding (last error: …); check gh auth status' + exit. Auto-mode (`--mode=auto`) propagates `--quiet` to the wait verb so routine per-poll status is silenced; the 4-branch routing is mode-agnostic.", "Renumbered step 3.3 → step 4 (the original 'all phases completed' surface) to make room for the new 3.3 (the wait composition). New step 4 covers the residual no-qualifying-phase + no-OPEN-PR case.", "Manual doc sync via `cp plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md` to the 4 consumer plugins (`ev`, `griot`, `guild`, `loom`) — same workaround as Phase 1 for the pre-existing sync-shared cli/lib drift. `doc-copies-byte-identity.test.ts` confirms byte-identity of the 4 plugin mirrors against commons-canonical.", "Verified: `npm test` → 1034/1034 passing (preserves U1 baseline). No regression. doc-copies-byte-identity test green confirming mirror sync."], files_touched = ["plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md", "plugins/ev/docs/SUBSTRATE-COMPOSITIONS.md", "plugins/griot/docs/SUBSTRATE-COMPOSITIONS.md", "plugins/guild/docs/SUBSTRATE-COMPOSITIONS.md", "plugins/loom/docs/SUBSTRATE-COMPOSITIONS.md", "plugins/ev/skills/ev-run/SKILL.md"], corrections = ["Panel non-blocking observation: the recipe's bolded Silencing-rule paragraph sits between Purpose and Wraps; could be misread as a 6th field by a strict reader. Read by evaluator-contract-fit as Purpose-extension (correct shape; `**Silencing rule**:` is paragraph-bold not `**Field**:`-shape). No code change needed; observation noted for future readers who may want to migrate the Silencing rule into a `### Silencing` sub-heading inside Purpose if the field-count semantics tighten.", "Scope-shift detected at phase boundary (U2 is Phase 2's last unit) + user comments during U1 contract negotiation that refined Decisions (exitReason / CLOSED / gh-failed / mergedAt-on-both / --quiet — 5 substantive Decisions-level changes). Two-signal concurrence per /ev-loop-interactive § Scope-shift detection. Operator declined inner-RPI revise — codified recipe + /ev-run step 3 are the operational source of truth; PLAN.md catches up at archive retro. PLAN.md § Decisions list is behind by 5 refinements: (1) exitReason enum replaces timedOut boolean; (2) CLOSED-without-merge is a distinct router exit (surfaces 'investigate' rather than dispatching); (3) gh-failed exit at K=3 consecutive failures breaks --quiet; (4) mergedAt added to both prWait AND prDiscover (substrate-shape consistency); (5) --quiet flag explicit (not implicit-from-caller-context per PLAN Decision 123)."] }
