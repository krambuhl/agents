notes_for_pr = ["Codifies a 3-layer composable PR body spec (Core / Body / Coda) preceded by a required top-level `> [!NOTE]` project-context callout. Per-layer required-vs-conditional rule becomes a property of the layer, not annotation on individual sections — closer to the s-expression / composable-primitive shape Evan's CLAUDE.md favors.", "Substrate-default Checklist (verified-solution-works / added-tests / sync-shared-ran / npm-test-green) replaces the previously-planned universal-Patreon-items-with-strikes after whiteboard skeptic flagged confessional-drift risk: i18n + a11y would N/A on ~every substrate PR, generating either silent strikes (spec is partly fictional) or N/A-with-explanation prose (the exact confessional voice WHY-over-HOW is trying to kill). Patreon-extras (`**Checklist-extras**: i18n, a11y`) override block lets product-flavored projects opt in.", "`Subject` over `Target` for the action table column: semantic over literal. `Target` reads as a slot for file paths (fighting the spec's own 'no exhaustive file lists' guidance); `Subject` names what the action is about conceptually (a recipe, a verb, a section), self-discouraging path-dump drift.", "Advisory ~300-word target framed as voice-proxy not enforced: terse-third-person prose tends to hit it; confessional prose busts it. Cut-priority list named for when over budget (per-unit prose action-table-covers > Verification-duplicating-table > Motivation-as-exit-criteria-prose).", "Don't-re-narrate-the-diff rule includes BOTH sentence-scale good/bad examples AND a paragraph-scale anti-pattern — the failure mode is asymmetric (the dominant drift is paragraph-scale exit-criteria-as-prose that reads WHY-shaped). Spec calls this out by name with the test: if Motivation could have been written from PLAN.md alone without the diff, it has drifted.", "Verification rule: names observable claims a reviewer can re-run. Tests-as-test (we wrote tests for X) belong in Checklist `Added tests`, NOT in Verification section. Pre-empts skeptic's prediction at unit 01 whiteboard about the Phase 2 PR Verification duplicating the action table when prWait has unit tests.", "Tightened `[meta]` title fallback: only when PR touches no plugin-authoritative content AND no shared `commons/` source. Pre-empts the trapdoor failure mode (every substrate PR could be argued meta if the bar isn't named).", "Coda allow-list explicit disposition for ad-hoc headings: `## What's next` and `## Substrate notes` are the canonical two; other headings (`## Process notes`, etc) strike before merge with their content folding into one of the canonical codas or Motivation.", "Spec lives inside the recipe's 5-field template: extends Purpose with 6 `###` sub-headings (Title, Body shape, Per-section content, Voice and length, Archetype, After open). Wraps / Idempotency / Failure modes / Used by sections unchanged. Honors the 5-field invariant at `SUBSTRATE-COMPOSITIONS.md:17-44`.", "Default archetype Architectural with substrate-shading note: 'most substrate PRs land Architectural — substrate work is shape-defining by default; Refactor and Dependency apply on the margins; Migration and Bug fix are rare here.' Override via `**Archetype**: <name>` PLAN.md block stays convention-only — `loom parse-plan` does not consume this block today (deferred to whenever a programmatic consumer like `loom pr compose-body` or `evaluator-pr-body` lands).", "Stale-doc fix at the prior `:291-293` (`--pr-state=open` flag reference) replaced with derive-on-demand-from-`gh pr view` via `loom pr discover` posture. Doesn't just delete the wrong instruction — names the right substrate posture explicitly so the next sub-agent reading the recipe doesn't write the same wrong thing back.", "Operator add-on (mid-contract-negotiation): required top-level `> [!NOTE]` project-context callout on the first line of every PR body, with markdown link to project PLAN.md and one-sentence how-this-PR-slots-into-broader-goal. Fallback for one-off non-loom PRs: orientation sentence alone, no broken link. New top-level element above the 3-layer Core/Body/Coda.", "Inner-RPI accepted (2-signal concurrence: phase-boundary + user-comments-changing-Decisions). Used `--flavor=mechanical` path directly: spec refinement of existing decisions, no new research warranted. The skill's default `--flavor=research` would re-run the research dossier that's still accurate. Substrate paper-cut: the inner-RPI sub-sequence assumes new research drives revision; the spec-refinement case wants a leaner mechanical-only path.", "Substrate paper-cut surfaced: `node scripts/sync-shared.ts` triggers known cli/lib drift — deletes plugin-authoritative `manifest-toml.ts` / `plan.ts` / `toml.ts` / `commit-discipline.ts` from `plugins/loom/cli/lib/` because they don't exist in commons. Worked around by reverting + manual docs-only sync via `cp`. Phase 1 PLAN.md § Risks names this as future-phase concern; substrate-followups-shaped issue tracked separately.", "L-004 session-boundary override applied to the whiteboard panel: `whiteboard-design-systems` substituted for the session-uncached `whiteboard-naming`. Design-systems brought the semantic-vs-literal lens that drove the `Subject` over `Target` rename and the 3-layer composable reframing — the substitution worked.", "Recipe panel verdict: approved on first run by `evaluator-contract-fit` (single-evaluator panel auto-derived for markdown-only artifact). 5-field template invariant spot-checked by counting `**Field**:` patterns inside § Compose PR. All 7 ACs pass, all 7 disqualifiers clean, original-ask alignment confirmed (Phase 1 covers Friction 2; Phase 2 covers Friction 1 — referenced in the [!NOTE] worked example).", "PLAN.md revision committed via `loom revise-plan` absorbing the 5+ refinements. Two rationale-worthy adds beyond the 5: substrate-shading note for archetype + explicit 'spec lives inside 5-field template' Decision."]

