ad examples AND a paragraph-scale anti-pattern naming the exit-criteria-as-prose failure mode, (e) `| Action | Subject |` action table spec with one-row-per-unit + concept-not-path guidance, (f) title shape `[<area>] <descriptive verb>` with tightened `[meta]` fallback rule (only when PR touches no plugin authoritative content and no shared commons/ source), (g) default Architectural archetype with substrate-shading note + `**Archetype**: <name>` PLAN.md override syntax (convention-only, sub-agent reads from PLAN.md prose), (h) substrate-default Checklist (verified-solution-works / added-tests / sync-shared-ran-if-commons-touched / npm-test-green) and Patreon-extras Checklist override (`**Checklist-extras**: i18n, a11y` for projects that need them), (i) Patreon-shape Rollout items (rollback-safe-48h / feature-flag / experiment) with adapt-at-compose-time strike rule, (j) Coda allow-list `## What's next` (forward-pointing) or `## Substrate notes` (cross-cutting impact) with explicit guidance on where other ad-hoc coda content (`## Process notes`, etc) belongs instead, (k) Verification rule: 'Verification names observable claims a reviewer can re-run; tests in Checklist (`added tests`) not Verification.'", "Spec adds a required TOP-LEVEL element above the Core layer: a `> [!NOTE]` callout (GitHub alert syntax) on the first line of the PR body, containing (i) a markdown link to the project's PLAN.md (`[project name](path/to/PLAN.md)` — relative path to the file in the repo) and (ii) one sentence describing how this PR slots into the broader goal (which phase, which unit if applicable, what gets unblocked next). Spec text gives a worked example. Adapt-at-compose-time rule: for PRs not tied to a loom-managed project (rare: a one-off `[meta]` PR with no PLAN.md), the callout falls back to a one-sentence orientation alone, no broken link.", "Stale-doc text at the prior lines 291-293 (`--pr-state=open` flag reference) replaced with accurate post-open posture naming derive-on-demand-from-`loom pr discover` so the next sub-agent reading the recipe doesn't emit the rejected verb call.", "All new spec content sits inside the recipe's five-field template — extends Purpose (and/or Wraps) with sub-headings; does NOT add a sixth field. The other four fields (Idempotency, Failure modes, Used by) are unchanged.", "`node scripts/sync-shared.ts` ran clean; downstream `docs/SUBSTRATE-COMPOSITIONS.md` copies in `plugins/{griot,guild,loom,ev,agent-loop-full}/docs/` reflect canonical update.", "`npm test` → all tests green; no test deletion or skip.", "Other recipes in `SUBSTRATE-COMPOSITIONS.md` (§ State refresh, § Phase update, § Checkin write, § ADR-emit hook, § Revise PLAN.md, § Capture finding, § Triage PR comments, § Derive panel, § Append finding, § Save session, § Retro write) unchanged — diff scope confined to the body-shape spec rewrite + stale-doc fix."], rules_applied = ["PLAN.md § Phase 1 In/Exit (lines 41-58) + § Decisions (108-128) — the 20+ locked decisions covering archetype default + override, title shape, action table, length, voice, WHY-over-HOW, etc.", "Whiteboard round 1 refinements at `projects/2026-05-28-ev-loop-pr-flow/whiteboards/1-codify-pr-body-shape.md`: 3-layer Core/Body/Coda reframe (design-systems), `Subject` over `Target` column rename (design-systems), 300-word as advisory (skeptic), substrate-default + Patreon-extras Checklist split (skeptic), `**Archetype**:` stays convention-only (substrate-engineer), 'land spec inside Purpose not as sixth field' (substrate-engineer), paragraph-scale don't-re-narrate anti-pattern (skeptic), tightened `[meta]` fallback (skeptic), coda allow-list disposition (skeptic), Verification-tests-belong-in-Checklist rule (skeptic).", "Operator add-on (mid-contract-negotiation): required `> [!NOTE]` project-context callout at top of PR body with PLAN.md link + one-sentence how-this-PR-slots-into-broader-goal. New top-level element above the 3-layer Core/Body/Coda.", "CLAUDE.md § PR convention