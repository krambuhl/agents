contract = { goal = "Rewrite § Compose PR's body-shape paragraph (SUBSTRATE-COMPOSITIONS.md:286-289) and adjacent stale-doc fix (:291-293) to codify a 3-layer composable PR body spec — Core (Motivation/Rollout/Checklist always), Body (Solution/Verification when substantive), optional Coda (What's next or Substrate notes for phase-transition PRs) — preceded by a required top-level `> [!NOTE]` project-context callout linking to the project's PLAN.md and naming in one sentence how this PR slots into the broader goal. Plus terse third-person voice rule, load-bearing don't-re-narrate rule with sentence + paragraph anti-patterns, advisory ~300-word target framed as voice-proxy, markdown action table `| Action | Subject |`, `[<area>]` title prefix with tightened `[meta]` fallback, default-Architectural archetype with PLAN.md `**Archetype**:` override convention-only (no parser change), substrate-default Checklist (verified-solution-works / added-tests / sync-shared-ran / npm-test-green) + Patreon-extras override via `**Checklist-extras**:` for i18n / a11y, and Patreon-shape Rollout items (rollback-safe-48h / feature-flag / experiment) all with adapt-at-compose-time strike rule. Folds the stale `--pr-state=open` flag reference fix to name the derive-on-demand-from-`gh pr view` posture via `loom pr discover`. Land all spec content inside the recipe's existing five-field template (Purpose / Wraps / Idempotency / Failure modes / Used by) — extending Purpose with sub-headings rather than adding a sixth field. Single-PR phase: this unit closes Phase 1.", acceptance_criteria = ["`plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md` § Compose PR body-shape paragraph at the prior lines 286-289 rewritten to carry: (a) the 3-layer Core/Body/Coda framing with per-layer required-vs-conditional rules, (b) voice rule (terse, direct, third-person), (c) advisory ~300-word target framed as voice-proxy not enforced, (d) load-bearing 'don't re-narrate the diff' rule with both sentence-scale good/bad examples AND a paragraph-scale anti-pattern naming the exit-criteria-as-prose failure mode, (e) `| Action | Subject |` action table spec with one-row-per-unit + concept-not-path guidance, (f) title shape `[<area>] <descriptive verb>` with tightened `[meta]` fallback rule (only when PR touches no plugin authoritative content and no shared commons/ source), (g) default Architectural archetype with substrate-shading note + `**Archetype**: <name>` PLAN.md override syntax (convention-only, sub-agent reads from PLAN.md prose), (h) substrate-default Checklist (verified-solution-works / added-tests / sync-shared-ran-if-commons-touched / npm-test-green) and Patreon-extras Checklist override (`**Checklist-extras**: i18n, a11y` for projects that need them), (i) Patreon-shape Rollout items (rollback-safe-48h / feature-flag / experiment) with adapt-at-compose-time strike rule, (j) Coda allow-list `## What's next` (forward-pointing) or `## Substrate notes` (cross-cutting impact) with explicit guidance on where other ad-hoc coda content (`## Process notes`, etc) belongs instead, (k) Verification rule: 'Verification names observable claims a reviewer can re-run; tests in Checklist (`added tests`) not Verification.'", "Spec adds a required TOP-LEVEL element above the Core layer: a `> [!NOTE]` callout (GitHub alert syntax) on the first line of the PR body, containing (i) a markdown link to the project's PLAN.md (`[project name](path/to/PLAN.md)` — relative path to the file in the repo) and (ii) one sentence describing how this PR slots into the broader goal (which phase, which unit if applicable, what gets unblocked next). Spec text gives a worked example. Adapt-at-compose-time rule: for PRs not tied to a loom-managed project (rare: a one-off `[meta]` PR with no PLAN.md), the callout falls back to a one-sentence orientation alone, no broken link.", "Stale-doc text at the prior lines 291-293 (`--pr-state=open` flag reference) replaced with accurate post-open posture naming derive-on-demand-from-`loom pr discover` so the next sub-agent reading the recipe doesn't emit the rejected verb call.", "All new spec content sits inside the recipe's five-field template — extends Purpose (and/or Wraps) with sub-headings; does NOT add a sixth field. The other four fields (Idempotency, Failure modes, Used by) are unchanged.", "`node scripts/sync-shared.ts` ran clean; downstream `docs/SUBSTRATE-COMPOSITIONS.md` copies in `plugins/{griot,guild,loom,ev,agent-loop-full}/docs/` reflect canonical update.", "`npm test` → all tests green; no test deletion or skip.", "Other recipes in `SUBSTRATE-COMPOSITIONS.md` (§ State refresh, § Phase update, § Checkin write, § ADR-emit hook, § Revise PLAN.md, § Capture finding, § Triage PR comments, § Derive panel, § Append finding, § Save session, § Retro write) unchanged — diff scope confined to the body-shape spec rewrite + stale-doc fix."], rules_applied = ["PLAN.md § Phase 1 In/Exit (lines 41-58) + § Decisions (108-128) — the 20+ locked decisions covering archetype default + override, title shape, action table, length, voice, WHY-over-HOW, etc.", "Whiteboard round 1 refinements at `projects/2026-05-28-ev-loop-pr-flow/whiteboards/1-codify-pr-body-shape.md`: 3-layer Core/Body/Coda reframe (design-systems), `Subject` over `Target` column rename (design-systems), 300-word as advisory (skeptic), substrate-default + Patreon-extras Checklist split (skeptic), `**Archetype**:` stays convention-only (substrate-engineer), 'land spec inside Purpose not as sixth field' (substrate-engineer), paragraph-scale don't-re-narrate anti-pattern (skeptic), tightened `[meta]` fallback (skeptic), coda allow-list disposition (skeptic), Verification-tests-belong-in-Checklist rule (skeptic).", "Operator add-on (mid-contract-negotiation): required `> [!NOTE]` project-context callout at top of PR body with PLAN.md link + one-sentence how-this-PR-slots-into-broader-goal. New top-level element above the 3-layer Core/Body/Coda.", "CLAUDE.md § PR conventions — Architectural archetype as the borrowed-vocabulary the substrate inherits.", "SUBSTRATE-COMPOSITIONS.md:17-44 — the 5-field recipe template constraint.", "L-004 session-boundary override: whiteboard panel substituted `whiteboard-design-systems` for the session-uncached `whiteboard-naming`."], disqualifiers = ["Parser-extension for `**Archetype**:` block — defer to whenever a programmatic consumer (e.g. `loom pr compose-body` or `evaluator-pr-body`) needs it.", "Adding a sixth field to the recipe template — spec lives inside Purpose with sub-headings per the recipe-template constraint.", "New `bin/loom pr compose-body` verb — deferred per PLAN.md § Out.", "PR-body lint evaluator — deferred per PLAN.md § Out.", "Touching any other recipe in `SUBSTRATE-COMPOSITIONS.md` (§ Wait for merge is Phase 2 territory).", "Substantive rewrite of CLAUDE.md PR conventions — recipe references but does not modify the operator's PR archetype definitions.", "Modifying any test file to make `npm test` pass — if the rewrite breaks a test, the rewrite is wrong, not the test."], inputs = ["projects/2026-05-28-ev-loop-pr-flow/PLAN.md (§ Phase 1 lines 41-58; § Decisions 108-128; § Risks 94-101).", "projects/2026-05-28-ev-loop-pr-flow/RESEARCH.md (§ Thread 2 touch-point inventory, recommendation, gap analysis).", "projects/2026-05-28-ev-loop-pr-flow/whiteboards/1-codify-pr-body-shape.md (round 1: substrate-engineer + skeptic + design-systems).", "plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md (recipe template 17-44; § Compose PR 265-315; body-shape spec at the paragraph that was :286-289; stale-doc at :291-293; sibling recipes § Phase update 87-136 + § Checkin write 138-180 for cohesion reference).", "/Users/krambuhl/.claude/CLAUDE.md (§ PR conventions for the borrowed Architectural archetype + Patreon checklist/rollout items).", "plugins/loom/cli/lib/plan.ts:60 + plugins/loom/cli/lib/types.ts:584-592 (parser shape — `ParsedPhase.whiteboard` reference for the disqualifier about not parsin