 verb with `--quiet` when in auto-mode.", "Sync sleep via `execSync('sleep N')` in production; injected `ctx.sleepMs` stub in tests. The CLI dispatch path returns `DispatchResult` (not `Promise<DispatchResult>`), so prWait must be sync. Trade: `/bin/sleep` blocks for real seconds in production; tests don't actually sleep.", "CliContext extended with `nowMs?: () => number` and `sleepMs?: (ms: number) => void` injection points. Other verbs ignore them; tests inject scripted stubs to drive deterministic polling timelines without real wall-clock delays.", "Implementation correction during execution: initial prWait used `fetchPrForBranch` which catches gh exceptions internally and returns null. This made `lastError` on gh-failed always 'gh pr view returned null...' instead of the actual gh error. Fixed by inlining the gh call inside the loop. fetchPrForBranch's null-swallowing is correct for prDiscover (no PR → marker_state=new); just lossy for prWait's needs.", "Whiteboard round 1 surfaced 5+ substantive findings absorbed pre-execution: exitReason enum (all 3 engineers converged), CLOSED handling (skeptic + design-systems), gh-failed exit at K=3 (skeptic), mergedAt on both verbs (substrate), force-push re-resolve (skeptic), `--quiet` for explicit mode propagation (design-systems). Operator confirmed all 5 via grill. L-004 session-boundary override: design-systems substituted for session-uncached naming engineer (same as Phase 1).", "Substrate paper-cuts tracked for follow-up: (1) dense-packet pattern under-shapes when the artifact is large TypeScript code — evaluators burn maxTurns budget on file exploration even with the dense-packet shape; re-spawning with full source inlined converges. (2) evaluator-react-api auto-derives for `.ts` files in `cli/verbs/`; same Node-.ts mis-derivation flagged in jelly-loom retro. Dropped manually per substrate convention.", "Tests: 12 prWait + 2 prDiscover.mergedAt = 14 new tests. All use ghRunner + sleepMs + nowMs injection — no real gh CLI invocation, no real sleep, no real wall-clock. Covers all 4 exit reasons, counter reset, pr-not-found-first-poll, force-push re-resolve, flag validation (3 cases), --quiet, --json field list. 1034/1034 passing.", "Panel verdict: approved on first run (after re-spawn with inlined source). Single advisory was packet-excerpt artifact, not a real code issue (the `if (!quiet)` gates exist in the real source; I elided them when condensing for the packet)."]

