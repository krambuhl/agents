notes_for_pr = ["U2 closes Phase 2 with the recipe + router half. `§ Wait for merge` lives in `plugins/commons/docs/SUBSTRATE-COMPOSITIONS.md` between `§ Compose PR` and `§ Revise PLAN.md`; 5-field shape (Purpose / Wraps / Idempotency / Failure modes / Used by); no 6th field. `/ev-run` step 3 routes the wait verb's 4-value `exitReason` discriminant.", "**The substrate's load-bearing safety property**: `closed` does NOT dispatch the next phase. A PR closed without merging means the parent didn't ship; auto-dispatch against an unmerged parent would build downstream phases on a broken foundation. The router surfaces 'PR closed — investigate' and exits, leaving the operator in the loop. Skeptic predicted this would be the first way a naive 'state != OPEN → dispatch' implementation breaks; the 4-branch routing makes the mistake impossible to make silently.", "`merged` → re-fetch via `loom pr discover` (observation-only — `pr discover` doesn't write to manifest as a side effect) → re-run step 3.1 to find the now-unblocked phase → step 4 dispatches it. One re-fetch, one re-evaluation, one dispatch — no retry loop within a single /ev-run invocation past this re-run.", "`timeout` → clean handoff: 'still open after Nmin — run /ev-run later'. Each timeout is a clean exit; no auto-re-wait. Operator decides when to come back.", "`gh-failed` → breaks `--quiet` silence by design. Auth expiry, rate limit, persistent gh non-responsiveness would otherwise burn the full 30min timeout invisibly. K=3 consecutive failures (~90s at 30s interval) catches the failure mode fast; the router surfaces 'check gh auth status'.", "Auto-mode (`--mode=auto`) propagates `--quiet` through the recipe to silence routine per-poll status. The 4-branch routing is identical across interactive and auto modes; only routine-poll output differs.", "**PLAN.md is now behind by 5 Decisions-level refinements** (per the operator-declined inner-RPI offer): exitReason enum replaces timedOut boolean; CLOSED is a distinct router exit; gh-failed at K=3 breaks --quiet; mergedAt on both prWait AND prDiscover (substrate-shape consistency); --quiet flag is explicit (overriding PLAN Decision 123's implicit-from-caller-context). The codified recipe + /ev-run step 3 are the operational source of truth from this commit on; PLAN.md catches up at archive retro.", "Recipe text follows Phase 1's codified body-shape spec: terse third-person, no diff narration in Purpose, observation-only / no-event-emission invariant cited explicitly (LOOM-CONVENTIONS.md:255-263), force-push re-resolution documented as load-bearing rationale (not as implementation trivia).", "Manual doc sync via `cp` to the 4 consumer plugins (substrate-followups cli/lib drift workaround from Phase 1 carried forward — `node scripts/sync-shared.ts` would delete plugin-authoritative lib files that don't exist in commons). `doc-copies-byte-identity.test.ts` confirms mirror byte-identity.", "Panel verdict: approved on first run by `evaluator-contract-fit` (markdown-only artifact → single-evaluator panel auto-derived). All 12 ACs pass, all 8 disqualifiers clean, original-ask alignment confirmed (Phase 2 covers Friction 1 from the user's original ask). One non-blocking observation: the bolded Silencing-rule paragraph in Purpose could be misread as a 6th field by a strict reader; read correctly as Purpose-extension (the bolded prefix is paragraph-bold not `**Field**:`-shape).", "Substrate paper-cuts carried forward from Phase 1 + new ones: (1) `sync-shared` cli/lib drift still requires manual `cp` workaround for docs; (2) inner-RPI's default `--flavor=research` mismatches the spec-refinement-only case (used `--flavor=mechanical` directly in Phase 1; declined in Phase 2); (3) dense-packet pattern needs full source inlined for TypeScript code panels (U1 saw 3 evaluators stall mid-exploration; converged after re-spawn with source inline); (4) `evaluator-react-api` auto-derives for Node `.ts` files (dropped manually per established convention from jelly-loom retro)."]

