contract = { goal = "Implement `bin/loom pr wait <slug> --branch=<branch> [--interval=30] [--timeout=1800] [--quiet]` verb in `plugins/loom/cli/verbs/loom/pr.ts` that polls `gh pr view <branch>` until terminal state, timeout, or gh-failure threshold. Returns JSON `{number, url, state, exitReason, mergedAt?, lastError?}` where `exitReason` is one of `'merged' | 'closed' | 'timeout' | 'gh-failed'`. State is gh's authoritative field (`OPEN | MERGED | CLOSED`); exitReason is the discriminant for the calling router. The verb re-resolves PR-from-branch on each poll (no caching from first poll — force-push edge from skeptic's prediction). Tracks consecutive gh failures; on K=3 (~90s at 30s interval) exits with `exitReason: 'gh-failed'` regardless of `--quiet`. Extends `prDiscover` to expose `mergedAt` in its return JSON (substrate-shape consistency — a field on one PR-state-observing verb belongs on all). Wires `wait: prWait` into `PR_VERBS` registry. Single-PR phase: this unit + U2 close Phase 2.", acceptance_criteria = ["`prWait(rest, ctx): DispatchResult` exported from `plugins/loom/cli/verbs/loom/pr.ts`. Follows family pattern: parseArgs, positional slug, --branch required, ghRunner injected via ctx. Required args: `<slug>` positional, `--branch=<name>`. Optional: `--interval=<seconds>` (default 30, must be >0), `--timeout=<seconds>` (default 1800, must be >0), `--quiet` (boolean; default false). `--pretty` flag included for parity with siblings.", "Return JSON shape: `{number, url, state, exitReason, mergedAt?, lastError?}` — `state` is the gh authoritative value at the moment of exit (`OPEN | MERGED | CLOSED`); `exitReason` is `'merged' | 'closed' | 'timeout' | 'gh-failed'`; `mergedAt` is the ISO timestamp from `gh pr view --json mergedAt` and is present when `exitReason === 'merged'`; `lastError` is the gh error message string and is present when `exitReason === 'gh-failed'`. Verb exits 0 in all four cases (timeout, closed, and gh-failed are not non-zero errors — they're terminal exit reasons).", "Polling loop: re-resolves PR via `fetchPrForBranch(ghRunner, branch)` on EACH poll (not cached from first call). Wall-clock timeout via `Date.now()` (not poll-count, so interval changes don't break timeout semantics). After K=3 consecutive `fetchPrForBranch` returning null OR gh throwing, exits with `exitReason: 'gh-failed'`. Successful poll resets the consecutive-failure counter to 0.", "Failure modes: `missing-slug` (no positional), `missing-args` (missing --branch), `invalid-interval` (--interval is non-positive integer or non-integer), `invalid-timeout` (--timeout is non-positive integer or non-integer), `pr-not-found` (first poll returns null — PR doesn't exist for this branch; verb assumes PR already opened, not its job to open). All named via `LoomError`; exit code 1.", "Auto-mode behavior via `--quiet`: when --quiet is set, suppress per-poll status output (stderr or stdout); emit only single entry line on start and single exit line. When --quiet is NOT set, emit a status line per poll (stderr) `still OPEN, polled at <iso>, next in <Ns>`. `--quiet` does NOT silence the gh-failed exit — terminal failures break silence by design.", "Extends `prDiscover` return JSON to include `pr.mergedAt` (ISO string from gh) when present; absent otherwise. `PrViewResponse` type extended with `mergedAt?: string`. `fetchPrForBranch` now requests `--json number,url,body,state,mergedAt`.", "Wired into `PR_VERBS` registry in `plugins/loom/cli/verbs/loom/pr.ts:386-392`: add `wait: prWait` (alphabetic between `update` and `comments` or end of list — pick what fits the existing ordering; current ordering is discover/open/update/comments/respond, suggests insertion order not alphabetic).", "Tests in `plugins/loom/cli/verbs/loom/pr.test.ts` (extend existing file): (a) merged on poll N → exitReason='merged' + mergedAt populated; (b) closed-unmerged → exitReason='closed' + no mergedAt; (c) timeout → exitReason='timeout', state='OPEN', no mergedAt; (d) K=3 consecutive gh failures → exitReason='gh-failed' + lastError populated; (e) successful poll resets failure counter (gh fails twice, succeeds, fails twice → no gh-failed exit); (f) pr-not-found on first poll fails loud (LoomError code='pr-not-found', exit 1); (g) re-resolves PR on each poll — gh stub returns different PR numbers on successive polls, verb returns the LAST observed PR number not the first; (h) flag validation (--interval=0 → invalid-interval; --timeout=-5 → invalid-timeout; missing --branch → missing-args; missing slug → missing-slug); (i) quiet mode suppresses per-poll output; non-quiet emits status line per poll; (j) prDiscover now returns mergedAt when present from gh.", "Tests use the existing `ctx.ghRunner` injection pattern (same as `prDiscover` tests) — no real gh CLI invocation. Mock returns scripted sequence of stdout strings (or throws) to drive each scenario.", "Implementation includes a comment block above `prWait` documenting: (a) values for `--interval`/`--timeout` are SECONDS (no unit suffix); upgrade path is `30s`/`30m` duration parsing once a second time-based flag lands somewhere in the CLI; (b) verb is read-only against gh + manifest; writes nothing, emits no events; (c) re-resolves PR on each poll to survive force-push.", "`npm test` → all tests green; new tests added; no existing test modified to make pass.", "Diff confined to: `plugins/loom/cli/verbs/loom/pr.ts` (prWait handler + prDiscover/PrViewResponse/fetchPrForBranch extension + PR_VERBS registry entry), `plugins/loom/cli/verbs/loom/pr.test.ts` (new test cases). No other files in this unit."], rules_applied = ["PLAN.md § Phase 2 (lines 60-80) + § Decisions (108-138, includes verb namespace + polling defaults + wait-timeout exit + mode flag decisions).", "Whiteboard round 1 at `projects/2026-05-28-ev-loop-pr-flow/whiteboards/2-pr-wait-verb.md`: exitReason enum replacing timedOut boolean (all three engineers converged); CLOSED handling distinct from MERGED; gh-failed exit at K=3 with break-silence-on-terminal; mergedAt on both pr wait AND pr discover; force-push re-resolve on each poll; pr-not-found on first poll fail-loud; --quiet flag for explicit mode propagation (design-systems' lean-toward-explicit recommendation).", "Family pattern from `plugins/loom/cli/verbs/loom/pr.ts:74-116` (prDiscover shape — positional slug, --branch flag, ghRunner injection, LoomError vocabulary).", "Existing `fetchPrForBranch` (pr.ts:52-72) — extend the --json fields list; preserve null-on-error semantics.", "Substrate convention: timeout / closed / gh-failed are NOT errors; they're terminal exit reasons returned cleanly. Errors (missing-slug, missing-args, pr-not-found, invalid-interval) exit 1."], disqualifiers = ["No `--condition=` / `--until=` flag (design-systems flagged as configuration-creep beachhead). If future caller wants different waited-on thing, ship new sibling verb.", "No `--show-cadence` flag (PLAN decision 123 → superseded by explicit `--quiet` per whiteboard).", "No manifest writes; no event emission. Verb is purely gh-observational. (No `pr-wait-started`/`pr-wait-merged`/`pr-wait-timeout` events — would re-open the closed 'no pr-* event' argument from Phase-6 U1 of substrate-consolidation per LOOM-CONVENTIONS.md:255-263.)", "No `--mode=auto` flag — mode propagates via the explicit `--quiet` flag; no implicit env-channel read inside the verb.", "No mergeability detection (`mergeable` / `mergeStateStatus`) — deferred per skeptic's flag as Phase 3 follow-up.", "No duration-suffix parsing (`30s`/`30m`) in this verb — bare integer seconds with source comment naming upgrade path. (Promote to shared lib helper if a second duration flag lands.)", "No caching of PR number from first poll — force-push edge case requires re-resolution every poll.", "No § Wait for merge recipe writing (U2 territory).", "No /ev-run skill body update (U2 territory).", "No modification of any other pr verb (prOpen, prUpdate, prComments, prRespond) — only prDiscover's mergedAt extension."], inputs = ["projects/2026-05-28-ev-loop-pr-flow/PLAN.md (§ Phase 2 lines 60-80; § Decisions 108-138; § Risks 94-101).", "projects/2026-05-28-ev-loop-pr-flow/RESEARCH.md (§ Thread 1 candidate (f) — loom pr wait recommendation; current state).", "projects/2026-05-28-ev-loop-pr-flow/whiteboards/2-pr-wait-verb.md (round 1: substrate-engineer + skeptic + design-systems).", "plugins/loom/cli/verbs/loom/pr.ts (sibling verbs — prDiscover at :74-116, prOpen at :125-177, prUpdate at :185-220; fetchPrForBranch at :52-72; PrViewResponse type at :42-50; PR_VERBS registry at :386-392).", "plugins/loom/cli/verbs/loom/pr.test.ts (existing test patterns for ctx.ghRunner injection and LoomError assertion).", "plugins/loom/cli/lib/gh.ts (GhRunner type; defaultGhRunner pattern).", "plugins/loom/cli/lib/errors.ts (LoomError shape).", "plugins/commons/docs/LOOM-CONVENTIONS.md:255-263 (no-pr-event design decision)."] }
