notes_for_pr = ["Flips `loom retro write` from file-per-record (retros/<name>.json) to the manifest's [[retros]] section; retro read/list are now manifest-first with file fallback so old file retros still resolve (forward-only). The retro-written event is preserved.", "The create-once guard moved from writeRetro's filesystem check into the verb (appendRetro is a plain append). KNOWN forward-only edge: the guard checks only manifest.retros, not the legacy file store, so a retro that exists ONLY as a legacy file could be (re)written into the manifest. Deliberate: coupling the guard to the file store would re-introduce the dependency Phase 3 deletes.", "lib/retro.ts is untouched (writeRetro now dead-but-present; removed in Phase 3, where it carries a commons-sync wrinkle since lib/retro.ts is mirrored).", "Recorded advisory (evaluator-naming): retroList tags entries with `source` while retroWrite's result uses `section` — adjacent 'where does it live' concepts with different keys. Watch for a consistent result envelope when the pr-respond (D2) and findings (D3) writers land."]

