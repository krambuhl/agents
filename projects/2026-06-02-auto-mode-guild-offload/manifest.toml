contract = { goal = "Add a `## Guild-offload posture` section to plugins/commons/docs/AGENT-CONVENTIONS.md defining, as a backward-compatible convention with nothing yet wired to it, the five seams both ev loops will lean on: armed-trigger seam, gate-to-resolver routing table, fork-to-panel convergence rule, release-boundary semantics, and escape hatch. Sync to consumers; keep the drift check green.", acceptance_criteria = ["New `## Guild-offload posture` section positioned right after `## Auto-mode and the two-budget shape`; extends it (cites, does not restate the budget numbers).", "Armed-trigger seam: loom --mode=auto is the primary/only trigger; harness coupling deferred behind an absent-by-default probe returning 'unknown', gating nothing today.", "Gate-to-resolver routing table mapping each in-loop touchpoint to a resolver, covering the 7-item gap inventory, tagged divergent->plan-panel / convergent->evaluator / autonomous, marking covered vs new.", "Fork-to-panel convergence rule: fork->guild-plan round; caller applies convergence (silent->take; else round, budget 3; exhaust->escape hatch); guild-plan collects never synthesizes; operator-judgment-required breaks to PR; no panel raiseable -> escape hatch, never self-decide.", "Release-boundary: default phase-at-a-time normal PR + park; --phases=all draft PR per phase + auto-advance + drafts->ready; state derived from gh, never cached.", "Escape hatch: reuses budget-exhausted recovery (UNRESOLVED.md + RECOVERY-STATUS.json + auto-mode-budget-exhausted) plus a draft-PR-with-work-so-far step; no-panel fallback lands here.", "Accounts for both loops: notes confidence-loop divergences (tiers vs deliverables, gate-and-ratchet stop, delegation ON vs OFF).", "sync-shared run; mirrored to all consumers; drift check + full test suite green."], rules_applied = ["Canonical source is plugins/commons/docs/ — edit there then sync (ADR-0007); never edit a synced copy directly.", "Semantic over literal: seams named by what they