contract = { goal = "Make the existing per-unit `Panel:` override affordance in `plugins/guild/docs/PANEL-COMPOSITION.md` discoverable as the answer to verdict-padding heaviness on judgment-heavy units. The affordance already exists (lines 284-299) but reads as future-reference; this unit promotes it to a top-level section that names the symptom, points at the mechanism, and provides a copy-pasteable contract snippet. Plus one captured learning demonstrating real or representative usage.", acceptance_criteria = ["plugins/guild/docs/PANEL-COMPOSITION.md gains a new top-level section `## When to opt out: per-unit Panel: override` positioned immediately after the existing `### Override and opt-out` subsection (today at lines 284-299).", "The new section contains: (a) one paragraph naming verdict-padding as the symptom (judgment-heavy units where each evaluator cycles its full rubric for 2-3 in-scope dimensions); (b) one paragraph naming the per-unit `Panel:` override affordance; (c) a copy-pasteable contract snippet showing `Panel: [evaluator-contract-fit]` for a mechanical-unit example; (d) a cross-reference back to `### Override and opt-out` for the underlying spec.", "The existing line 297-299 hedge ('This is a Phase 4-shaped concern... not required for D7's MVP') is updated: replace the hedge sentence with a sentence pointing forward to the new `## When to opt out` section, so the spec subsection no longer reads as future-reference-only.", "A captured learning at `learnings/session-notes/2026-05-29-panel-override-affordance.md` exists with: (a) the verdict-padding symptom named + RESEARCH.md citation; (b) the per-unit Panel: override affordance named + new PANEL-COMPOSITION.md section cited; (c) one concrete (real or representative) usage example; (d) shape conforming to existing files in `learnings/session-notes/` (H1 title, bold metadata for Date/Source/Status, intro paragraph, H2 sections).", "No semantic changes to PANEL-COMPOSITION.md's existing content beyond