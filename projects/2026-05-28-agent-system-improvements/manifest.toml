contract = { goal = "Ship a standalone `scripts/check-conventions.ts` that defines a typed Convention interface, exposes a runner over `plugins/*/agents/{retained,generated}/evaluator-*.md`, and implements ONE convention at MVP — rubric-body coherence — using a heuristic that extracts check-verb noun phrases from the frontmatter `description` and verifies each appears in the body. The script reports drift findings to stdout, exits 0 (advisory) on findings, and is reachable via `npm test` (since the repo has no CI today). Framework is structured so future conventions land additively via new `Convention` objects.", acceptance_criteria = ["New `scripts/check-conventions.ts` file with: (a) typed `Convention` interface; (b) `runConventions(files, conventions)` runner that walks files × conventions, collects findings, returns the findings list; (c) CLI entry walking `plugins/*/agents/{retained,generated}/evaluator-*.md`, running registered conventions, printing a per-finding report, exits 0 regardless (advisory at MVP).", "One registered `Convention` named `rubric-body-coherence` with `appliesTo` matching `plugins/*/agents/{retained,generated}/evaluator-*.md` (NOT whiteboard-*, NOT personalities), and `check` that parses YAML frontmatter, extracts the `description` field, pulls noun-phrases following check verbs (verifies/checks/asserts/flags), and case-insensitive-substring-searches the body for each, emitting one advisory finding per missing target.", "New `scripts/check-conventions.test.ts` (vitest) with at least three tests: Convention interface + runConventions shape (zero-finding case); positive case (clean evaluator yields zero findings); negative case (drifted evaluator with missing body reference yields exactly one advisory finding naming the missing target).", "`npm test` runs the new test file and passes.", "The Convention framework's extension pattern is documented inline in `scripts/check-conventions.ts` (top-of-file comment block) showing: how to define a new Convention object, where to register it, and the lifecycle (no separate registration file)."], rules_applied = ["PLAN.md § Phase 2 (Convention-drift detector: rubric-body coherence) + § Open questions (Phase 2 MVP = one check; whiteboard-* deferred).", "INTERVIEW.md Decision 3 (Phase 2 MVP scope = one check + extension pattern).", "RESEARCH.md § Constraints — substrate self-observation/evaluation (convention-drift as the smallest highest-leverage observation primitive).", "whiteboards/research-shift-03-*.md (substrate-engineer: 'convention-drift first, one afternoon'; testing-strategy: 'rubric-body coherence is tier-one, load-bearing').", "Standalone script over sync-shared.ts extension (decided unit-contract-time; sync-shared is 417 lines focused on file-mirror invariants between commons and consumers, behavioral invariants are a separate concern).", "Panel: [evaluator-contract-fit, evaluator-test-unit] — narrowed from auto-derived contract-fit+react-api+test-unit+naming using the per-unit Panel: override affordance shipped in Phase 1 (PANEL-COMPOSITION.md § When to opt out). React-api inapplicable (no React); naming low-leverage for internal script API surface. First in-the-wild dogfood of the Phase 1 affordance.", "Pattern A for checkin lifecycle (single unit closes the phase)."], disqualifiers = ["Implementing convention checks beyond rubric-body coherence for evaluator-* (whiteboard-* checks, sibling-ref resolution, frontmatter-key coherence, events-import-path enforcement are all explicitly deferred to Phase 2.1 or later).", "Extending scripts/sync-shared.ts instead of creating a new standalone script.", "Adding GitHub Actions workflow or other CI config (the repo has no CI today; 'advisory wiring' means 'reachable via npm test').", "Exit code 1 on findings (advisory at MVP per PLAN's 'start advisory, escalate after corpus stabilizes' guidance).", "Applying the rubric-body convention to personality-base or personality-* files (those are mixin/cross-cutting, not standalone agents with their own rubric)."], inputs = ["plugins/guild/agents/retained/evaluator-contract-fit.md (sample evaluator agent for parser planning).", "plugins/guild/agents/generated/evaluator-*.md (the 8 generated evaluators — the corpus the check runs against).", "scripts/sync-shared.ts (template for script shape: Node CLI, typed, vitest-tested).", "scripts/sync-shared.test.ts (template for vitest test shape).", "projects/2026-05-28-agent-system-improvements/PLAN.md § Phase 2 (Goal + AC + Risks).", "projects/2026-05-28-agent-system-improvements/RESEARCH.md § Constraints — substrate self-observation.", "projects/2026-05-28-agent-system-improvements/whiteboards/research-shift-03-substrate-self-observation-and-evaluation.md (substrate-engineer + testing-strategy perspectives)."] }
execution = { actions = ["Wrote scripts/check-conventions.ts (~310 lines): top-of-file doc block with extension pattern; typed Finding + Convention interfaces; pure runConventions runner; splitFrontmatter + extractDescription + extractCheckTargets helpers; rubric-body-coherence Convention impl with appliesTo regex limiting to plugins/*/agents/{retained,generated}/evaluator-*.md and case-insensitive substring check heuristic; CONVENTIONS registry export; collectMarkdownFiles recursive walker; printReport human-readable output; CLI main() that always exits 0.", "Wrote scripts/check-conventions.test.ts (~225 lines, 14 tests across 4 describe blocks): Convention framework (runner shape, registry export); frontmatter helpers (splitFrontmatter, extractDescription folded-scalar handling, inline description); extractCheckTargets (comma-and list splitting, multiple verbs, empty case); rubric-body-coherence convention (appliesTo matching evaluator-* + rejecting personalities/whiteboards/non-md, positive case zero findings, negative case exactly one finding naming the missing target).", "Iteration during implementation: first regex pass had `\\s+(?:and|but|so)\\b` in the lookahead, which truncated list-shaped targets like 'verifies acceptance criteria and disqualifiers' to just 'acceptance criteria'. Removed the and/but/so terms from the lookahead so the captured phrase fans out via the existing split-on-comma-and logic. 3 of 14 tests went from red to green; the other 11 stayed green throughout.", "Verified: `npx vitest run scripts/check-conventions.test.ts` shows 14 pass, 0 fail, 75ms. `npm test` (full suite) shows 1048 pass, 0 fail, 3.53s — no regressions in any of the existing 1034 tests. `node scripts/check-conventions.ts` against the live corpus surfaces 1 advisory finding on plugins/guild/agents/retained/evaluator-contract-fit.md (description's 'whether a unit of work meets its agreed contract' phrase isn't literally in the body — heuristic edge case, working as designed).", "Panel: [evaluator-contract-fit, evaluator-test-unit] both returned VERDICT: approved with zero blocking and zero advisory findings. First in-the-wild dogfood of the Phase 1 Panel: override affordance — narrowed from auto-derived contract-fit+react-api+test-unit+naming."], files_touched = ["scripts/check-conventions.ts", "scripts/check-conventions.test.ts"], corrections = ["correction (resolved): first regex pass for extractCheckTargets included `\\s+(?:and|but|so)\\b` in the lookahead, which truncated multi-target lists. Fixed by removing those terms; the captured phrase fans out via comma/and splitting downstream. Three test failures went green.", "deviation from /ev-loop-interactive skill body: wrote the checkin ONCE (post-execution + post-evaluator) rather than contract-only-first, sidestepping the create-once substrate gap surfaced in Phase 1's checkin 01 corrections. The skill body says 'write contract-only first' but `loom checkin write` enforces create-once on (branch, number). Until the substrate aligns (skill writes-once-at-end OR CLI gains --update), writing once at end is the cleaner pattern."] }
