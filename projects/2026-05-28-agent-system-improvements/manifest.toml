-once CLI gap from Phase 1. The skill body and CLI still need to align; until then, write-once-at-end is the honest pattern.", "signal: phase-boundary: U1 is the only + last unit in Phase 2 (single signal; no revise offered).", "Phase 2 complete. Phase 3 (cross-project event aggregation via `loom events aggregate --cross-project`) is the next phase per PLAN.md sequencing."]
