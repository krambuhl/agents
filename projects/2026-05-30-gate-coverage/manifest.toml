notes_for_pr = ["The probe caught a REAL skew on first run: the on-PATH (cached) guild exposes only {derive-panel, findings, parse-and-aggregate, whiteboard}, missing source's {compile, recipe}. loom doctor now surfaces this as an advisory with a re-sync-and-restart remediation - directly the friction (cached guild predating verbs, silent stale-state codegen/spawn) the PLAN cited from guild-workflow-coverage P2.", "Signal = verb-list probe only (operator decision). The agent-cache-vs-source signal is DEFERRED (the PLAN's other option) - flake-prone given cache-path variance across install modes; a candidate follow-up if a robust signal emerges.", "Advisory (warning) severity: guild cache-skew is environment-freshness, not corrupt project data, so it reports + remediates but keeps doctor's exit 0 - matching the existing warning/error tier semantics.", "Reused commons-sync #159's lesson proactively: the probe parses guild's unknown-verb candidates from subprocess stderr, so NODE_NO_WARNINGS keeps that stderr clean JSON across node versions (the exact fragility that bit the new CI gate)."]
