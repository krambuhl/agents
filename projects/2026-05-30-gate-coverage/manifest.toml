contract = { goal = "Add a guild cache-skew check to loom doctor: a verb-list probe comparing the verbs guild SOURCE declares vs what the resolvable on-PATH guild exposes; when the resolvable guild is missing source-declared verbs, doctor reports an advisory (warning) with remediation.", acceptance_criteria = ["detectGuildSkew(sourceVerbs, resolvableVerbs) is pure + returns a warning/guild-cache-skew issue naming the missing verbs + remediation when resolvable lacks any source verb; null when resolvable covers source (equal or superset).", "The skew issue is severity:'warning' - report.ok stays true, exit stays 0 (matches doctor's warning/error tiers).", "doctor gathers source verbs (node plugins/guild/cli/guild.ts candidates) + resolvable verbs (on-PATH guild candidates) via the unknown-verb->candidates path; degrades gracefully (null, never error/crash) when guild isn't resolvable or off-repo.", "doctor.test.ts: a simulated stale verb-set pair -> guild-cache-skew warning; fresh/superset -> null.", "npm test green; sync-shared --check clean; loom doctor still does manifest checks."], rules_applied = ["Operator decisions: verb-list probe (not agent-cache, deferred); advisory severity (warning, not error); one unit (D1+D2 merged).", "Reused the gate-coverage P1 / commons-sync #159 lesson proactively: NODE_NO_WARNINGS in the spawn keeps subprocess stderr clean JSON (the probe parses guild's unknown-verb candidates from stderr).", "Probe READS guild's verb-list only; never edits guild source. ADR-0006: node entries for substrate ops.", "Advisory-not-blocking matches the PLAN's risk guidance ('keep advisory if a robust signal proves elusive')."], disqualifiers = ["Making skew an error (operator chose advisory).", "The agent-cache-vs-source signal (deferred - verb-probe only this unit).", "Editing guild's source.", "A non-deterministic check, or one that crashes when guild isn't on PATH."], inputs = ["plugins/loom/cli/verbs/loom/doctor.ts (+ doctor.test.ts) - DoctorIssue/Report, checkProject, exit semantics", "plugins/guild/cli/guild.ts (VERBS + the unknown-verb->candidates mechanism)", "the live skew (resolvable guild missing compile/recipe vs source)"] }
execution = { actions = ["Added detectGuildSkew(sourceVerbs, resolvableVerbs) to doctor.ts: pure; warning/guild-cache-skew naming the missing verbs + a re-sync-cache-and-restart remediation when sourceVerbs not-subset-of resolvableVerbs; null otherwise (equal/superset/empty-source).", "Added queryGuildVerbs(cmd, args): spawns a guild CLI with a bogus verb (NODE_NO_WARNINGS for clean stderr), parses the unknown-verb candidates; returns null on any failure (never throws).", "Added checkGuildSkew(repoRoot): queries source (node plugins/guild/cli/guild.ts) + resolvable (on-PATH guild) verbs; null if guild source absent or either query fails; else detectGuildSkew.", "Wired into doctor() as a workspace-level check (repoRoot = resolve(projectsRoot,'..')): pushes the warning + recomputes report.ok (a warning never flips ok).", "Added 6 tests to doctor.test.ts (detectGuildSkew stale/equal/superset/empty; queryGuildVerbs nonexistent-cmd->null; doctor off-repo degrades -> no skew issue, ok:true exit 0).", "Verified: npm test 1104 green; sync-shared --check ok; LIVE loom doctor gate-coverage flags guild-cache-skew (warning, names compile+recipe, ok:true, exit 0)."], files_touched = ["plugins/loom/cli/verbs/loom/doctor.ts", "plugins/loom/cli/verbs/loom/doctor.test.ts"], corrections = [] }
