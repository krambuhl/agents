notes_for_pr = ["Scope: generalizes ADR-0005 (titled for docs) to .ts lib files - the marker + fail-safe-preserve now cover every sync-managed tree (cli/lib + docs), since loom's lib was the actual victim of the destructive sweep.", "--check flags UNMARKED orphans (operator decision): the gate forces every plugin-local file to declare itself, so the fork cannot silently recur. Marked files pass clean.", "Phase 1 clears the 10 orphan records; --check now shows 5 divergent + 4 missing remaining (loom's forked types.ts + adopt/config/project, and loom's missing checkin/events/manifest/session). That is phase 2 (reconcile) + phase 3 (resync) - phase 1 does NOT turn --check green.", "Substrate drift surfaced (forensics, not fixed here): (a) the real Agent registry uses guild:generated:* / guild:retained:* names (contract-fit = guild:retained:evaluator-contract-fit) - neither the ev-loop whiteboard glob (.claude/agents/whiteboard-*.md, returns zero) nor guild derive-panel's bare names match it; (b) the evaluator-base contract path .claude/agents/evaluator-base.md does not resolve (it is plugin-namespaced at plugins/guild/agents/evaluator-base.md), so the contract-fit evaluator ran without its base; (c) /ev-loop-interactive step 2.1 still says write a contract-only checkin, contra ADR-0002 (full-schema-at-close); (d) ADR-0002 and ADR-0005 carry unfilled TODO Consequences sections.", "Cached binaries lag source (ADR-0006): used node plugins/<plugin>/cli/<cli>.ts for all loom/guild ops; loom doctor reported ok:true on the stale cached binary.", "ADR-0005's Consequences section is still TODO - deferred to phase 4's ADR work to keep this PR's scope to code + marks.", "Branch gt-tracked (parent main); PR opened via gh per the cadence (Graphite server-sync pending). Phase left in-progress; advances to completed on merge (reconcile pattern)."]

