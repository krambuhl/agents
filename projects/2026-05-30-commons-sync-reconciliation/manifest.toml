notes_for_pr = ["Premise correction: PLAN Phase 2 framed reconciliation as 'lift loom's types out so the mirrored files become clean commons-mirrors.' Orientation found loom forked AHEAD of commons (the manifest.toml consolidation + PR-state-derived-not-stored), so adopt/config/project/types can't become clean mirrors without regressing loom. Operator chose 'loom owns its diverged lib': planner excludes the 8 (4 missing + 4 diverged) via LIB_MIRROR_ALLOWLIST; loom mirrors only the 5 byte-identical utilities; the 4 it has on disk are marked plugin-local. The PLAN's goal (clean shared lib + loom-specific content in loom-local files) holds; the method is own-wholesale, not extract-a-few-types.", "Zero loom lib logic changed - only the planner (allowlist) + 4 marker lines. loom runs identically (parse-plan/project read/checkin/doctor all clean).", "loom drift cleared: 4 divergent + 4 missing -> 0. Only guild PANEL-COMPOSITION.md remains, reconciled in D2.", "Possible ADR (operator's call, flagged not auto-emitted): the 'partial lib-consumer' model - a consumer mirroring only an allowlisted subset of commons/cli/lib and owning the rest as plugin-local - is a substrate-shaping pattern future consumers may follow. Candidate for a standalone ADR or folding into Phase 4's enforcement ADR. Documented for now in the LIB_MIRROR_ALLOWLIST doc-comment + this note.", "Branch gt-tracked (parent main). Phase 2 PR planned to open after D2 (guild doc) so one PR covers the whole 'reconcile forked files' phase."]
