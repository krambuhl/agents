contract = { goal = "Reconcile loom's architecturally-forked cli/lib. loom forked AHEAD of commons (consolidated the manifest stack into a TOML model and derives PR state from gh instead of storing it), so adopt/config/project/types.ts diverged for loom-specific reasons and checkin/events/manifest/session.ts were consolidated away. Teach the sync planner that loom is a PARTIAL lib-consumer (mirrors only the 5 byte-identical shared utilities errors/gh/git/pr-marker/retro) and mark loom's forked files plugin-local so the now-orphaned files survive the sweep. Clears all 8 of loom's drift records without changing a line of loom's lib logic.", acceptance_criteria = ["LIB_MIRROR_ALLOWLIST (per-consumer Partial<Record<PluginName, ReadonlySet<string>>>); loom mirrors only {errors, gh, git, pr-marker, retro}; consumers absent from the map (griot, guild) mirror ALL of commons/cli/lib.", "planForPlugin('loom') emits commons->loom lib specs for exactly those 5; none for adopt/config/project/types/checkin/events/manifest/session.", "planForPlugin('griot') and ('guild') still emit specs for ALL commons/cli/lib files (full-mirror regression guard).", "loom's adopt.ts/config.ts/project.ts/types.ts carry the // sync-shared: plugin-local marker (line 1).", "node scripts/sync-shared.ts --check reports ZERO records for loom; only guild's PANEL-COMPOSITION.md remains (-> D2).", "Tests cover loom's restricted plan (only 5), griot+guild full plan (regression), and loom's forked files unflagged (excluded+marked => neither divergent nor orphan; no missing).", "loom CLI intact (parse-plan, project read, checkin list, doctor); npm test green."], rules_applied = ["Operator decision: loom forked ahead, so 'loom owns its diverged lib' (Strategy 2) - exclude the 8 from loom's plan + mark the 4 it has on disk; loom mirrors only the 5 byte-identical utilities. No content change to loom's forked files; nothing promoted to commons.", "ADR-0002: checkin written in full at unit close; contract negotiated in conversation.", "ADR-0006: substrate ops via node plugins/<plugin>/cli/<cli>.ts.", "Reuses phase 1's plugin-local marker (ADR-0005): the plan-excluded forked files become orphans, and the marker preserves them.", "scripts/sync-shared.ts is repo-root (not commons-synced) - edits land directly; no sync-shared run needed."], disqualifiers = ["Changing the CONTENT of loom's adopt/config/project/types (mark + plan-exclude only - loom owns their bodies as-is).", "Promoting loom content to commons.", "Touching guild's PANEL-COMPOSITION.md (D2) or plugins/commons/**.", "Running the real destructive sync."], inputs = ["scripts/sync-shared.ts (COMMONS_CONSUMERS ~107-110; lib flow ~218-233; phase-1 marker helpers ~147-173)", "scripts/sync-shared.test.ts (plan-shape tests ~110-159; PR2 b ~386-401)", "the --check record list (4 divergent + 4 missing for loom; 1 divergent doc for guild)", "loom's 4 forked files (adopt/config/project/types.ts)"] }
execution = { actions = ["Added LIB_MIRROR_ALLOWLIST to scripts/sync-shared.ts after COMMONS_CONSUMERS, mapping loom to {errors, gh, git, pr-marker, retro} with a doc-comment explaining loom's partial-consumer status (the manifest.toml fork + PR-state-derive).", "Added the lib-flow guard: `const allowlist = LIB_MIRROR_ALLOWLIST[plugin];` then `if (allowlist && !allowlist.has(fileTail)) continue;` - partial consumers mirror only their allowlisted files; full consumers (no allowlist) unchanged.", "Marked loom's adopt.ts/config.ts/project.ts/types.ts plugin-local (line-1 prepend; content otherwise untouched - git diff --numstat is 1 0 per file).", "Narrowed two existing plan-shape tests from PLUGINS_WITH_CLI to ['griot','guild'] (loom is now partial, covered separately).", "Added a 'Phase 2: loom is a partial lib-consumer' describe block: loom mirrors only allowlisted; griot/guild mirror all; a non-mirrored commons file yields no 'missing' for loom; loom's excluded+marked forked file is neither divergent nor orphan.", "Verified: npm test 1093 green; --check shows loom 0 records (only guild PANEL-COMPOSITION.md remains); loom parse-plan/project read/checkin list/doctor spot-run clean."], files_touched = ["scripts/sync-shared.ts", "scripts/sync-shared.test.ts", "plugins/loom/cli/lib/adopt.ts", "plugins/loom/cli/lib/config.ts", "plugins/loom/cli/lib/project.ts", "plugins/loom/cli/lib/types.ts"], corrections = [] }
