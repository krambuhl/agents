contract = { goal = "Implement accepted ADR-0005 orphan-preservation in scripts/sync-shared.ts: a plugin-local marker convention exempting marked files from the orphan-sweep; the default orphan behavior flips to fail-safe-preserve (delete nothing); --strict-orphan opts back into deleting UNMARKED orphans; --check flags unmarked orphans (mark-or-remove) while passing marked ones. Then apply the marker to the 10 existing plugin-local files. Generalizes ADR-0005 (titled for docs) to .ts lib files per the PLAN.", acceptance_criteria = ["isPluginLocal() recognizes the line-comment marker (.ts) and the HTML-comment marker (.md) in the head region (first ~20 lines); unmarked files are not recognized.", "Default applySync deletes nothing - all orphans preserved, removed===0.", "applySync(root,{strictOrphan:true}) deletes unmarked orphans and preserves marked ones.", "detectDrift reports an unmarked orphan as an orphan record whose message names BOTH remedies (add the marker OR --strict-orphan); a marked orphan yields no record.", "main() parses --strict-orphan; default = copy + preserve all; --strict-orphan = copy + delete unmarked. --check reports unmarked orphans regardless of the flag.", "The 10 plugin-local files carry the marker: loom cli/lib {manifest-toml,plan,toml,commit-discipline}.ts + manifest-toml.{smoke,harness}.ts + {plan,toml}.smoke.ts; guild cli/lib/toml.ts; guild docs/AGENT-CODEGEN.md.", "Tests cover marker detection (pos/neg/out-of-window), default-preserve, strict-removes-unmarked, strict-preserves-marked, check-flags-unmarked, check-passes-marked; existing tests still pass.", "npm test green. Non-destructive real-file check: after marking, --check lists none of the 10 as orphan (missing/divergent remain - phase 2/3)."], rules_applied = ["ADR-0005: marker convention + fail-safe-preserve default + --strict-orphan opt-in.", "ADR-0002: checkin written in full at unit close (not contract-first); the contract was negotiated in conversation.", "ADR-0006: substrate ops via node plugins/<plugin>/cli/<cli>.ts, not cached binaries (loom doctor false-greened ok:true on the cached binary).", "Operator decisions: marker form is namespaced-terse; --check flags unmarked orphans (gate stays honest).", "scripts/sync-shared.ts is repo-root (not commons-synced) - marking edits land directly in consumer trees; no sync-shared run needed."], disqualifiers = ["Running the real destructive applySync/--strict-orphan against the repo (phase 3; would copy loom's 4 missing commons files in).", "Reconciling the forked/divergent/missing files (types.ts, adopt/config/project.ts, loom's missing checkin/events/manifest/session) - phase 2.", "Implementing ADR-0005's optional per-plugin manifest (deferred; marker-only).", "Editing plugins/commons/** or implementing ADR-0004's per-tier verbs.", "Adding .smoke.ts/.harness.ts to isExcluded instead of marking them (the PLAN says mark)."], inputs = ["scripts/sync-shared.ts (detectDrift orphan loop ~294-329; applySync orphan-sweep ~351-362; main ~377-404; walkFiles/isExcluded ~125-148)", "scripts/sync-shared.test.ts (temp-dir fixture patterns; orphan test ~225-239)", "projects/adr-log/0005-preserve-plugin-local-docs-from-sync-orphan-removal.md; 0002; 0006", "projects/2026-05-30-commons-sync-reconciliation/PLAN.md (phase 1 goal + marking list)", "The 10 plugin-local files (inventory verified against commons/cli/lib + commons/docs)"] }
execution = { actions = ["Added marker helpers to scripts/sync-shared.ts after isExcluded(): PLUGIN_LOCAL_MARKER_TS/MD constants, pluginLocalMarkerFor(path) (form by extension), MARKER_SCAN_LINES=20, and isPluginLocal(absPath) which scans only the first ~20 lines so the literal marker string lower in a file (this script, a fixture, a doc quoting the convention) cannot false-positive.", "applySync gained opts={strictOrphan?} + a preserved counter; the orphan branch is now: skip+preserve when not strict OR when the file is plugin-local, else rmSync+removed. Return shape adds preserved.", "detectDrift orphan loop now skips marked files before pushing a record, and the unmarked-orphan message names both remedies (the marker via pluginLocalMarkerFor, and --strict-orphan).", "main() parses --strict-orphan, passes it to applySync, and reports preserved (with a --check/--strict-orphan nudge in the default branch). Updated the header doc-comment Modes section and added a plugin-local-marker note.", "Added 10 tests to scripts/sync-shared.test.ts in two describe blocks (applySync preservation; detectDrift marker-respecting reporting), testing through the public applySync/detectDrift surface with the empty-commons fixture.", "Marked the 10 plugin-local files with a line-1 marker (9 .ts line-comment form, AGENT-CODEGEN.md HTML-comment form) via an idempotent prepend.", "Verified: npm test 1089 green; node scripts/sync-shared.ts --check shows 0 orphan records (5 divergent + 4 missing remain); loom parse-plan + project read + guild derive-panel spot-run clean (proves the marker prepend did not break the marked lib)."], files_touched = ["scripts/sync-shared.ts", "scripts/sync-shared.test.ts", "plugins/loom/cli/lib/manifest-toml.ts", "plugins/loom/cli/lib/plan.ts", "plugins/loom/cli/lib/toml.ts", "plugins/loom/cli/lib/commit-discipline.ts", "plugins/loom/cli/lib/manifest-toml.smoke.ts", "plugins/loom/cli/lib/manifest-toml.harness.ts", "plugins/loom/cli/lib/plan.smoke.ts", "plugins/loom/cli/lib/toml.smoke.ts", "plugins/guild/cli/lib/toml.ts", "plugins/guild/docs/AGENT-CODEGEN.md"], corrections = [] }
