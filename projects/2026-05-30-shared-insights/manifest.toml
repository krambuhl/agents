unit = "D1 — agent-cache-vs-source skew signal wired into loom doctor"
contract = { goal = "Wire the existing `guild compile --check` content-drift signal into `loom doctor` as an advisory `guild-codegen-drift` issue, and close the `checkGuildSkew` absent-vs-unqueryable gap so deep staleness stops reporting green. Reuse the committed, colocated `.cache.toml` rather than a new stamp. Prerequisite: fix `guild compile --check` to self-compute its prompt-hash from fusion-prompt.md when `--prompt-hash` is omitted (it defaulted to '' and false-flagged every cell, making `--check` unusable standalone).", acceptance_criteria = ["loom doctor runs `guild compile --check` bootstrapped from SOURCE (node plugins/guild/cli/guild.ts), never the cached `guild` (ADR-0006), folding a non-ok result into report.issues as {code:'guild-codegen-drift', severity:'warning'}.", "The detail names the specific drifted cells + a copy-pasteable remediation command.", "The resolvable-side probe distinguishes three states: absent (skip), queryable (compare), present-but-unqueryable (warning — never null/green).", "Advisory stays advisory: report.ok flips false only on severity:'error'; codegen-drift is warning.", "Tests both directions: drift detected / clean → no issue; the absent/queryable/unqueryable trichotomy; verdict sourced from the source entry, not the cached binary."], rules_applied = ["Read-only: no write path in the freshness check.", "Source-not-cache (ADR-0006): the freshness verdict is bootstrapped from guild source, never the resolvable cached binary.", "Pure/effectful split preserved (detect* pure, run*/probe*/query* effectful), matching detectGuildSkew/queryGuildVerbs siblings.", "loom→guild boundary kept a process boundary (JSON contract via subprocess), not a source import."], disqualifiers = ["Making the gate blocking (flipping report.ok on drift).", "Any write path in the check (no auto-recompile).", "Querying the cached `guild` for the freshness verdict.", "Overselling: claiming detection of Claude Code's loaded-registry skew.", "A new committed stamp artifact (reuse .cache.toml)."], inputs = ["projects/2026-05-30-shared-insights/whiteboards/1-freshness-gate.md (substrate-engineer, skeptic, a11y sections)", "plugins/loom/cli/verbs/loom/doctor.ts (detectGuildSkew, queryGuildVerbs, checkGuildSkew, doctor)", "plugins/guild/cli/verbs/guild/compile.ts (check), compile-cli.ts (--check)", "plugins/guild/agents/.cache.toml (the colocated committed cache)", "projects/adr-log/0006 (source-not-cache mandate)"] }
execution = { actions = ["guild fix (commit 1): added createHash import + FUSION_PROMPT_RELPATH + computeFusionPromptHash(pluginRoot) to compile-cli.ts; the --check branch now uses an explicit --prompt-hash when given (wins, including empty for legacy) else self-computes sha256(fusion-prompt.md). Added 2 compile-cli tests (self-compute when template present → ok; explicit empty overrides → prompt-drift).", "loom wiring (commit 2): added ResolvableProbe union + probeResolvableGuild (absent/unqueryable/ok trichotomy via spawn r.error ENOENT vs parse-failure); refactored checkGuildSkew to surface a guild-cache-skew warning on the unqueryable state instead of null; added GuildCheckResult structural process-boundary type, runCodegenCheck (effectful, spawns node sourceEntry compile --check from repoRoot), detectCodegenDrift (pure, folds all 6 drift axes into a Map-deduped cell list, warning severity, names cells + remediation). doctor() tail folds both freshness probes and recomputes report.ok once.", "Added 11 doctor tests: probeResolvableGuild trichotomy (4 spawn shapes), detectCodegenDrift both directions + dedupe + >6 truncation (5), runCodegenCheck off-repo null + real-repo parse-contract (2).", "Verified: npm test → 1146 passed; npm run check → sync ok; live loom doctor shared-insights → ok:true with a guild-cache-skew warning (the cached guild is genuinely missing compile,recipe — a live instance of the papercut) and NO codegen-drift (source tree internally fresh); live guild compile --check → ok:true self-computed vs ok:false (prompt_drift:21) with explicit empty hash."], files_touched = ["plugins/guild/cli/verbs/guild/compile-cli.ts", "plugins/guild/cli/verbs/guild/compile-cli.test.ts", "plugins/loom/cli/verbs/loom/doctor.ts", "plugins/loom/cli/verbs/loom/doctor.test.ts", "projects/2026-05-30-shared-insights/whiteboards/1-freshness-gate.md"], corrections = ["Prose-vs-CLI drift (Phase 6 fuel): the ev-loop skill body says 'write a checkin with the Contract section only, fill execution later', but `loom checkin write` is create-once (appends the whole checkin atomically, rejects a duplicate (branch, number)). Adapted by negotiating the contract in conversation and writing one complete checkin after evaluation. Reconcile in Phase 6.", "Self-correction mid-build: initially planned to have doctor exclude prompt-drift; corrected to include all 6 axes once Option C (fix --check to self-compute the prompt-hash) made result.ok honest — excluding prompt-drift would have ignored the axis the guild fix just repaired."] }
scope = ["compile --check prompt-hash self-compute (guild)", "codegen-drift advisory + resolvable-probe trichotomy in loom doctor", "tests for both"]
changes_since_previous = "First checkin of the phase."
verdict = { result = "approved", reasons = ["Antagonist panel (evaluator-contract-fit + evaluator-naming) → approved, zero blocking/advisory findings. All 5 ACs met with code-level evidence; no disqualifier fired; new identifiers honor the pure/effectful + guild-<surface>-<condition> conventions."] }
notes_for_pr = ["Single scope signal (no inner-RPI offer): D1 expanded within-unit to two commits when the prompt-hash footgun surfaced — a tactical refinement of the contract, not a PLAN structure change. Recorded, not acted on.", "Deferred follow-up (per operator decision at contract time): converge the griot/loom `doctor` output contract (griot doctor returns a plain string; loom doctor returns structured {ok,issues}) — a separate setup PR, not Phase 1.", "Latent footgun fixed at source: `guild compile --check` without --prompt-hash previously defaulted to '' and false-flagged every cell as prompt-drifted — it was unusable for CI / loom doctor. Now self-computes from fusion-prompt.md. Any other standalone --check caller benefits.", "Performance note (for D3): loom doctor now spawns 3 node processes (source verbs, resolvable verbs, compile --check). Acceptable once-per-dispatch (<1s) but D3 should decide whether to gate/cache.", "The live guild-cache-skew warning on `loom doctor shared-insights` is real — the cached guild binary on PATH predates compile/recipe. Expected to clear on a plugin-cache re-sync + restart; it validates the trichotomy 'ok' path end-to-end."]

