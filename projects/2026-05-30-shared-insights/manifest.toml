notes_for_pr = ["Advisory (non-blocking, kept by choice): the exhaustive test's failure condition is `status !== 0 || stderr matches SyntaxError|ERR_UNSUPPORTED_TYPESCRIPT_SYNTAX`. The stderr disjunct is redundant (a strip-only failure already exits non-zero) but harmless — node --check is silent on success so it cannot misfire, and it drives the readable per-file failure message. Left as defensive breadth.", "derive-panel under-returned again (only contract-fit) for a .test.ts that spawns processes; manually added evaluator-test-integration. Same substrate glob bug PLAN Phase 3 targets.", "Cost note: the exhaustive gate runs ~1s in the vitest suite (CONCURRENCY=8 over ~99 files). If it grows, consider a separate CI job (performance lens) — but it is comfortably within budget today."]

