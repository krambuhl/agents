contract = { goal = "Wire the existing `guild compile --check` content-drift signal into `loom doctor` as an advisory `guild-codegen-drift` issue, and close the `checkGuildSkew` absent-vs-unqueryable gap so deep staleness stops reporting green. Reuse the committed, colocated `.cache.toml` rather than a new stamp. Prerequisite: fix `guild compile --check` to self-compute its prompt-hash from fusion-prompt.md when `--prompt-hash` is omitted (it defaulted to '' and false-flagged every cell, making `--check` unusable standalone).", acceptance_criteria = ["loom doctor runs `guild compile --check` bootstrapped from SOURCE (node plugins/guild/cli/guild.ts), never the cached `guild` (ADR-0006), folding a non-ok result into report.issues as {code:'guild-codegen-drift', severity:'warning'}.", "The detail names the specific drifted cells + a copy-pasteable remediation command.", "The resolvable-side probe distinguishes three states: absent (skip), queryable (compare), present-but-unqueryable (warning — never null/green).", "Advisory stays advisory: report.ok flips false only on severity:'error'; codegen-drift is warning.", "Tests both directions: drift detected / clean → no issue; the absent/queryable/unqueryable trichotomy; verdict sourced from the source entry, not the cached binary."], rules_applied = ["Read-only: no write path in the freshness check.", "Source-not-cache (ADR-0006): the freshness verdict is bootstrapped from guild source, never the resolvable cached binary.", "Pure/effectful split preserved (detect* pure, run*/probe*/query* effectful), matching detectGuildSkew/queryGuildVerbs siblings.", "loom→guild boundary kept a process boundary (JSON contract via subprocess), not a source import."], disqualifiers = ["Making the gate blocking (flipping report.ok on drift).", "Any write path in the check (no auto-recompile).", "Querying the cached `guild` for the freshness verdict.", "Overselling: claiming detection of Claude Code's loaded-registry skew.", "A new committed stamp artifact (reuse .cache.toml)."], inputs = ["projects/2026-05-30-shared-insights/whiteboards/1-freshness-gate.md (substrate-engineer, skeptic, a11y sections)", "plugins/loom/cli/verbs/loom/doctor.ts (detectGuildSkew, queryGuildVerbs, checkGuildSkew, doctor)", "plugins/guild/cli/verbs/guild/compile.ts (check), compile-cli.ts (--check)", "plugins/guild/agents/.cache.toml (the colocated committed cache)", "projects/adr-log/0006 (source-not-cache mandate)"] }
