cs/ file as belonging to commons; a docs-local convention (e.g. a manifest of which files are plugin-local) would prevent the silent-deletion class entirely. ADR-worthy because it shapes how guild and other plugins evolve their docs trees.", "Substrate follow-up — panel-spec-unreadable fallback continues: this is the SIXTH consecutive checkin in this project recording the same fallback condition (Phase 1, P2D1, P2D2, P3D1, P3D2, P3D3). guild derive-panel still emits `derive-panel-error: panel-spec-unreadable (using fallback)` on stderr. Worth a substrate fix at this point.", "Pre-existing test failure carried forward: plugins/loom/cli/lib/plan.real.test.ts ENOENT against archived 2026-05-26-substrate-consolidation/. Same as every prior checkin in this project.", "L-004 session-boundary observation: step 5.5 of ev-loop-interactive SKILL.md (D1's surface) STILL did not auto-fire for this unit close. The session's active skill body predates D1. D4 remains the first in-practice execution.", "Forward note for D4 meta-dogfood: P3D1's two [adr-candidate] markers (loom-checkin-write full-schema enforcement; 'just-committed' vs 'just-written' vocabulary) plus D3's two new markers (sync-shared all-or-nothing scope; sync-shared orphan-removal-of-plugin-local-docs) — D4 will exercise the hook against four real markers from this project's recent units. No synthetic markers needed.", "signal: phase-boundary: D3 is 3-of-4 unit of Phase 3. The next unit (D4) is the last in the phase — phase-boundary signal will fire there."]

