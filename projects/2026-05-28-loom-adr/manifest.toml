notes_for_pr = ["Antagonist panel: evaluator-contract-fit only (single-evaluator panel per substrate-only-files rule from PANEL-COMPOSITION.md). VERDICT: approved on first run, zero blocking or advisory findings.", "[adr-candidate] Substrate friction — `loom checkin write` rejects checkin files missing the [execution] table with `manifest-schema-invalid: [[checkins]] #N is missing required table [execution]`. The ev-loop-interactive skill body's step 2.1 (negotiate) says 'write it into a new numbered checkin (Contract section only)' but the substrate enforces a full-schema shape, so the contract-only intermediate-write the skill body describes is not a supported substrate shape today. The friction has two possible resolutions: (a) loosen `loom checkin write` to accept partial checkins (contract-only initial write + execution/verdict append at close), or (b) tighten the skill body to acknowledge full-schema-at-close as the convention and rephrase the negotiate step. Decision: option (b) is the load-bearing direction — the skill body should describe the actual substrate behavior (the contract lives in conversation until close; the checkin is a closing artifact). Option (a) adds substrate complexity for a benefit (intermediate persistence) that conversation already provides. Worth recording as an ADR.", "[adr-candidate] Textual ambiguity — step 5.5 uses 'just-committed checkin' to mean 'the manifest entry written by loom checkin write, before the operator's git commit fires.' The verb writes to manifest.toml but does not auto-commit to git; the git commit lands at step 7 (checkpoint) and captures the manifest.toml + SKILL.md + any ADR file together as a single bundle. The 'just-committed' framing collapses two different commit boundaries (manifest-write vs git-commit) into one word. Decision: clarify in a follow-up (D2 or D3) to use 'just-written' (to manifest.toml) for the scan-trigger framing, reserving 'committed' for the git-commit at step 7. The bundle-with-checkin behavior is preserved regardless of wording — the ADR file rides the same git commit as the manifest update. Worth recording as an ADR for the substrate-wide commit-boundary vocabulary.", "Panel composition substrate condition: `guild derive-panel` continues to emit `derive-panel-error: panel-spec-unreadable (using fallback)` on stderr. Same substrate condition observed in Phase 1, P2D1, P2D2, now P3D1. Fourth consecutive checkin recording the same condition — worth a separate substrate follow-up to fix the panel-spec read path or document the fallback as expected behavior.", "Pre-existing test failure carried forward: plugins/loom/cli/lib/plan.real.test.ts ENOENT against archived 2026-05-26-substrate-consolidation/. Unchanged from Phase 1's checkins, P2D1, and P2D2. Still on the substrate follow-up list.", "Cached-PATH-binary lag: the substrate convention of invoking `node plugins/loom/cli/loom.ts <verb>` rather than bare `loom` is now load-bearing in two places — P2D2's dogfood (recording the workaround) and P3D1's new step 5.5 (encoding the workaround in the hook's invocation pattern). This is a substrate-wide pattern worth a CONVENTIONS.md note: 'For new ev-loop-interactive surfaces invoking loom verbs, prefer `node plugins/loom/cli/loom.ts` over bare `loom` until the cached-plugin-lifecycle issue is resolved.' Not in scope for D1; flagging as a Phase 4+ candidate.", "Evaluator advisory observation (non-flag): substep (e) writes to /tmp/loom-adr-<slug>-<n>.md with <n> as the per-unit match index. If a unit re-opens and emits markers across multiple invocations of step 5.5, the index resets and the temp filename could collide with a prior write. The temp file is consumed immediately by substep (f) so the collision window is microseconds, but a unit-scoped or timestamp suffix would harden it. Not load-bearing for D1; flagging as a possible D2 test scenario (or D3 docs note) if the meta-dogfood (D4) surfaces it in practice.", "L-004 session-boundary observation: 