l {slug, phase, unit, marker_excerpt} fires when the operator picks 'skip this marker'.", "Step 5.5 body explicitly cites: (i) the operator-opt-in posture (the hook never auto-emits without an AskUserQuestion accept); (ii) the --no-commit rationale (the verb's default auto-commit would race the checkin commit; the bundle-with-checkin shape is the intentional substrate convention); (iii) the post-commit positioning (the scan runs on the committed checkin so the marker only counts once the operator has approved the unit, not on a draft).", "Idempotency posture documented: step 5.5 runs once per unit close. The hook does not re-scan prior checkins, and re-running the loop on the same already-committed unit does not re-surface markers.", "No other steps in the unit loop are reordered, renumbered, or rephrased beyond a one-line forward-reference update if step 6's intro mentions 'after step 5'. All existing § step N citations elsewhere in the SKILL.md remain valid.", "npm test green; no regression in existing ev-loop-interactive tests.", "biome lint clean on the SKILL.md (markdown lint surface, if any) and on no other file."], rules_applied = ["PLAN.md § Phase 3 exit criterion #1 (the hook in SKILL.md) + exit criterion #2 (event vocabulary additions)", "Operator-opt-in posture inherited from the loop's § Rules ('The human co-pilots', 'Contract before execution') and from ADR-0001 § Decision (operator-paired concurrency assumption)", "Substrate command pattern matches Phase 2's P2D2 dogfood: invoke `node plugins/loom/cli/loom.ts adr ...` from local source (the cached PATH binary lag pattern is documented in P2D2's notes_for_pr and the SKILL.md should not encode the bare `loom` invocation)", "Substrate-only-files rule from docs/PANEL-COMPOSITION.md (this unit touches one .md SKILL surface; antagonist panel is evaluator-contract-fit only)"], disqualifiers = ["Auto-emitting ADRs without an operator AskUserQuestion accept (the offer is mandatory; the loop never decides for the operator)", "Using `loom adr` without --no-commit (the verb's auto-commit would race the checkin commit; bundle into the checkin commit instead)", "Scanning notes_for_pr BEFORE the checkin is committed (the hook runs against the committed checkin, not a draft, so the marker only counts once the operator has approved the unit)", "Touching any file other than plugins/ev/skills/ev-loop-interactive/SKILL.md (the test is D2, cross-skill docs are D3, the meta-dogfood is D4)", "Renumbering existing steps (5.5 is the chosen policy per operator decision; step 6/7/8 stay as-is)", "Encoding the bare `loom adr` invocation in the SKILL.md (cached-PATH-binary lag documented in P2D2; use `node plugins/loom/cli/loom.ts adr ...` to match the substrate's working invocation path)"], inputs = ["plugins/ev/skills/ev-loop-interactive/SKILL.md (the SKILL.md being edited; the new step 5.5 inserts between current step 5 scope-shift detection and step 6 phase update)", "projects/2026-05-28-loom-adr/PLAN.md § Phase 3 (the spec: marker convention, operator-opt-in posture, --no-commit + bundle-with-checkin rationale, event vocabulary, body-composition shape)", "plugins/loom/skills/loom-adr/SKILL.md (the verb's discoverability surface; the new step's calling pattern should match the skill's documented --body-file + --no-commit invocation)", "projects/adr-log/0001-introduce-loom-adr.md (the substrate's own decision about ADRs; the hook's behavior must be consistent with the ADR's operator-paired posture, freeform status, and max+1 numbering invariants)", "projects/2026-05-28-loom-adr/manifest.toml checkin loom-adr.skill-and-dogfood/02 § notes_for_pr (P2D2's cached-PATH-binary lag entry — the substrate justification for the `node plugins/loom/cli/loom.ts adr ...` invocation pattern)"] }
