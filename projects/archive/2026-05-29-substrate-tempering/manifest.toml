notes_for_pr = ["loom plan now backfills PLAN phases into the manifest at adopt time via a reconcile (preserves status/branch); idempotent; fresh-adopt-only so recovery manifests are untouched.", "This project's manifest was repaired out-of-band (loom plan cannot re-run on a committed PLAN) using the shipped backfillPhases - all 5 phases now tracked.", "[adr-candidate] The cached loom/guild binaries lag repo source and there is no guard against it: phase add existed in source but not the cached binary (which fooled the re-scope into 'phase add does not exist'), and parse-plan / derive-panel also needed the source entry to reflect edits; loom doctor passed ok:true without detecting any of this. Decision worth a durable record: prefer node plugins/<plugin>/cli/<cli>.ts (source) over the cached binary during substrate development, and/or extend loom doctor to detect cache-vs-source verb skew. This lag bit the same session three times and put a wrong fact into a committed PLAN before it was caught.", "Advisory (evaluator, not blocking): backfill is adopt-time-only; any future manifest written before this wiring would need the same one-off repair. Out of this unit's scope.", "Process note (evaluator): plugins/commons/agents/evaluator-base.md was not found on disk; the contract-fit evaluator applied its stance from its system-prompt summary rather than the file. Another cache/source or codegen artifact worth a look.", "Phase-boundary signal (single; no plan revision offered): Unit B is the last unit of the re-scoped Phase 1. Deliverables 1a + 1b done, 1e groundwork done.", "Pairs with Unit A into one PR (shared parse-plan/lib/plan.ts lineage); PR to open at phase close - this also exercises 1e's gt submit --stack."]

