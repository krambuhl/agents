IONS.md:123-128 sync-shared description rewritten for new direction (was 'Reads top-level cli/lib/ + cli/verbs/<family>/ and writes per-plugin subsets under plugins/<name>/cli/'; should become 'Reads plugins/commons/{cli/lib,docs}/ and writes per-plugin subsets under plugins/<name>/{cli/lib,docs}/ for consumer plugins').", "plugins/guild/agents/whiteboard-sketch-ideation.md:87 prose: 'the loom/draft CLIs, scripts' → 'the loom CLI, scripts' (drop '/draft' from the CLI enumeration).", "plugins/ev/skills/ev-loop-confidence/SKILL.md:26 prose: 'No ambient `/loom-*` or `/draft-revise` skills' → 'No ambient `/loom-*` skills' (drop the dead /draft-revise reference — that skill never shipped under that name).", "Final draft-sweep grep returns only intentional content-draft hits (per PLAN PR11's allowlist): `# Learning draft` headers in plugins/<plugin>/cli/verbs/griot/capture.{ts,test.ts}, content-draft prose in plugins/<plugin>/skills/loom-plan/SKILL.md and loom-archive/SKILL.md ('strawman draft', 'opinionated draft', etc.), --pr-state=draft test values (GitHub draft PR state, not the legacy CLI), and slug-fixture references like '2026-05-15-draft-cli' (test data for slug parsing). Project-name historical refs (`loom-absorb-draft`, `2026-05-17-loom-absorb-draft/PLAN.md`) are also preserved — they name an actual past project.", "`npm test` passes.", "`node scripts/sync-shared.ts --check` passes."], rules_applied = ["PLAN.md § PR11 — final 'satisfying close-the-loop' diff. Removes the last traces of the dissolved draft-* CLI shape from prose surfaces.", "PLAN PR11 also called for fixing the bogus 'LOOM-CONVENTIONS § Pairing with draft' cite at cli/lib/project.ts:148-151. That file was deleted in PR9 (root cli/); the post-PR9 file is plugins/commons/cli/lib/project.ts. Verified — no such cite exists there today (it was either dropped during PR3's move to commons, PR6's draft dissolution, or never existed in the post-move version). Strike from PR11 scope.", "Scope additions fro