notes_for_pr = ["PR9 is the substrate-level canonical-root dissolution (PLAN § Q7, the project's defining commitment). Phase 3 continues into PR10 (delete root bin/ shims + .gitignore entry) and PR11 (prose sweep).", "Substrate gap #3 (new this session): `loom pr open` emits the pr-opened event to events.jsonl AFTER the unit commit lands. The event is orphaned outside the originating PR. PR9's first commit bundles PR8's orphan event as bookkeeping carry. Candidate substrate fix: emit pr-opened during the same lifecycle window as the checkin (or have the verb tell the caller to stage events.jsonl before opening the PR).", "Substrate gap #4 (new this session): `guild derive-panel`'s SPEC_PATH was hardcoded to root `docs/PANEL-COMPOSITION.md` — broke when this PR deleted root docs/. Fixed inline (now `plugins/commons/docs/PANEL-COMPOSITION.md`). Deeper gap: the in-repo dev workflow path (process.cwd()-relative) is different from the consumer-project workflow path (plugin-install-relative). Today derive-panel works for the in-repo path only; consumer projects running `guild derive-panel` in their own repo would hit panel-spec-unreadable unless their cwd happens to have plugins/commons/docs/PANEL-COMPOSITION.md (it won't). Candidate substrate fix: resolve SPEC_PATH from the plugin's install root, not process.cwd().", "PLAN scope expansion: PR9 originally was 'rm -rf root dirs' but had to grow to include 4 test relocations to plugins/commons/cli/ (the cross-cutting tests had no per-plugin home). User explicitly authorized via grill at contract-negotiation.", "Consolidation: cli/no-install-sh-refs.test.ts was deleted here instead of moved-then-deleted-in-PR10. PR10's description anticipated this collapse ('removes it from wherever it ended up post-shift' implied single-removal regardless of intermediate state). PR10's scope is now strictly root bin/ shims + .gitignore.", "Developer-environment quirk: the `guild` CLI on system PATH is the installed marketplace plugin (hasn't picked up PR9's SPEC_PATH fix yet). `guild derive-panel` will emit 'panel-spec-unreadable (using fallback)' until PR9 merges and the user runs `claude plugin update`. Local `node plugins/guild/cli/guild.ts derive-panel` works correctly today. Not a code bug — a transient plugin-cache lag.", "Test count drop (1125/75 → 637/39) is expected and clean: root cli/lib/*.test.ts and cli/verbs/*/*.test.ts were duplicates of plugins/<plugin>/cli/<...> tests (the duplication was an artifact of the pre-PR4 sync direction). No semantic test loss; same invariants tested in the authoritative location.", "Panel: evaluator-contract-fit, evaluator-react-api, evaluator-test-unit, evaluator-naming — all approved, zero findings.", "Whiteboard: skipped (Phase 3 precedent + PR-level mechanical change; PLAN.md has no `**Whiteboard**:` override block under Phase 3)."]

