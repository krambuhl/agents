ducing a syntax error. Fixed by switching to parenthesized notation `skills/(plugin-prefix)`.", "Mid-execution: after moving lib tests to plugins/commons/cli/lib/*.test.ts, they couldn't find fixtures (their `../fixtures/` resolution looked at plugins/commons/cli/fixtures/, which didn't exist). Copied cli/fixtures/ → plugins/commons/cli/fixtures/ to restore fixture discovery.", "Mid-execution: pre-existing V10 (a/b/c) tests assumed root claims cli/lib/. Post-PR3 they fail because root no longer does. Fixed via the fixture restructure above + V10 assertion updates. The semantic split is: buildOldDirectionTree = root-only; buildCommonsDirectionTree = commons-only; buildBothDirectionsTree = composition.", "Mid-execution: PR2 (c) FIRES test (asserting the conflict guard fires when root-canonical and commons-canonical both claim cli/lib/) became structurally impossible post-PR3. Removed the FIRES test and acknowledged the coverage gap in a comment on the disjoint-baseline test. The conflict-guard CODE remains intact and ready for future overlapping claims."] }
