unit = "PR3 — Move cli/lib + docs canonical into plugins/commons/; cut over canonical source"
contract = { goal = "Cut over the canonical source for shared lib + cross-substrate docs from the repo root into plugins/commons/. Drop cli/lib/ from sync-shared.ts's root-canonical direction; commons-canonical now exclusively handles lib + docs distribution. Each consumer plugin (griot/guild/loom for lib; griot/guild/loom/ev for docs) gains a synced docs/ tree at install time — closes the long-standing 'docs/ doesn't ship with plugins' gap (RESEARCH § 3). Root cli/lib/ + root docs/ kept as inert copies during the PR3→PR9 window (preserves root cli/verbs/'s import chain until PR4 dissolves it).", acceptance_criteria = ["plugins/commons/cli/lib/*.ts contains byte-equal copies of cli/lib/*.ts (source + test files).", "plugins/commons/docs/*.md contains byte-equal copies of all 4 conventions docs.", "scripts/sync-shared.ts: root-canonical direction no longer walks cli/lib/. Banner comment updated to describe the new shape.", "plugins/commons/docs/AGENT-CONVENTIONS.md § 'Marketplace-rooted doc paths' rewritten.", "After sync, plugins/<consumer>/docs/ populated for griot/guild/loom/ev (16 NEW files).", "Root cli/lib/ + root docs/ UNCHANGED.", "README.md gains a note about the canonical shift + DO NOT EDIT instruction.", "npm test + sync-shared.ts --check pass."], rules_applied = ["PR2's invariant: every destination has exactly one upstream source. Dropping cli/lib/ from root direction preserves this since commons-canonical now claims those destinations exclusively.", "Conservative cutover: COPY into commons; don't delete root. Root stays as inert duplicate for the PR3→PR4 window so root cli/verbs/'s `../../lib/X.ts` imports still resolve.", "Test files move with sources. Fixtures (cli/fixtures/) move alongside the lib tests since the tests depend on fixtures via `../fixtures/` relative paths.", "PLAN.md PR3 deferrals respected: no draft restructure (PR6 scope), no cli/lib/project.ts:148-151 dead-cite fix (PR11 scope)."], disqualifiers = ["Deleting root cli/lib/ or root docs/ in this PR (PR9 scope).", "Modifying root cli/lib/ source files (inert duplicates after this PR).", "Including draft restructure or dead-cite fix.", "Updating root docs/AGENT-CONVENTIONS.md (canonical text now lives at plugins/commons/docs/).", "Skipping the README canonical-shift note.", "Test failures."], inputs = ["projects/2026-05-21-repo-compartmentalize/PLAN.md (§ PR3)", "projects/2026-05-21-repo-compartmentalize/RESEARCH.md (§ 3 docs-doesn't-ship gap)", "projects/2026-05-21-repo-compartmentalize/whiteboards/1-setup.md (substrate-engineer orphan-sweep finding)", "scripts/sync-shared.ts (post-PR2 shape with origin discriminator + COMMONS_CONSUMERS)", "scripts/sync-shared.test.ts (fixture builders + V10 + PR2 tests)", "cli/lib/ (14 source + 7 test files to copy)", "cli/fixtures/ (8 fixture files to copy alongside lib tests)", "docs/ (4 conventions docs to copy)", "README.md (target for canonical-shift note)"] }
execution = { actions = ["Copied cli/lib/*.ts (14 source + 7 test files) to plugins/commons/cli/lib/. Byte-equal at copy time.", "Copied docs/*.md (4 conventions docs) to plugins/commons/docs/. Byte-equal at copy time.", "Copied cli/fixtures/* (8 JSON/JSONL fixtures) to plugins/commons/cli/fixtures/. The lib tests in plugins/commons/cli/lib/*.test.ts resolve fixtures via `../fixtures/` relative path; the fixture copy is necessary for the moved tests to discover their fixtures.", "Modified scripts/sync-shared.ts banner: rewritten to describe the two-direction contract in its post-PR3 shape (root-canonical narrowed; commons-canonical claims cli/lib + docs).", "Removed the cli/lib/ walk from the root-canonical direction in planForPlugin. Left an explanatory comment block in its place documenting the PR3→PR9 transition reasoning.", "Rewrote plugins/commons/docs/AGENT-CONVENTIONS.md § 'Marketplace-rooted doc paths' to describe the new shape (commons is authoritative; each consumer receives a synced copy; no cross-plugin path resolution required).", "Rewrote README.md § 'Authoring against this marketplace' with the two-direction explanation + explicit 'DO NOT edit root cli/lib/ or root docs/' instruction during the PR3→PR9 window.", "Ran `node scripts/sync-shared.ts` to materialize the new sync output. 125 files synced total. NEW: plugins/{griot,guild,loom,ev}/docs/ directories with 4 docs each (16 new files). Existing: plugins/{griot,guild,loom}/cli/lib/ unchanged in content (now sourced from commons-canonical; bytes identical to pre-PR3).", "Restructured scripts/sync-shared.test.ts fixtures post-PR3: buildOldDirectionTree narrowed to root-only content (no lib writes — root no longer claims cli/lib/). buildCommonsDirectionTree enriched with manifest.ts/events.ts/helpers.ts/manifest.test.ts + the existing docs/*. V10 (a/b/c) tests that exercise lib switched from buildOldDirectionTree to buildBothDirectionsTree. Assertions reading 'cli/lib/X.ts' updated to 'plugins/commons