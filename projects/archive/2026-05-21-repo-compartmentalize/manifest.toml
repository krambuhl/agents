asses (no new drift; commons content-empty means no new sync activity).", "Manual smoke note in notes_for_pr: ran `claude plugin install agent-loop-full@krambuhl --scope user` on a fresh dir OR documented why this couldn't be done in this session (e.g., 'V4-style smoke deferred to pre-merge; cascade test invariant covers static manifest correctness'). The smoke gap is acknowledged per testing-strategy whiteboard finding."], rules_applied = ["Closed-set 'exactly 7 plugins' manifest tripwire stays closed (skeptic finding).", "Substrate-first dependency ordering convention (design-systems finding): commons listed FIRST in each consumer's deps array.", "Role-naming description, not inventory (design-systems finding): plugin description survives content-emptiness.", "No content into plugins/commons/ at PR1 (PR3-PR5+ own content moves). The plugin tree contains plugin.json only — no bin/, no skills/, no cli/, no docs/.", "No sync logic extension in PR1 (PR2 owns that). Only the PLUGINS list and PLUGIN_CONTENT_RULES entry land here.", "Per the cascade-wiring interview decision (option a, confirmed post-whiteboard): wire all 5 eventual consumers at PR1 even though commons is content-empty. review-skill is excluded (its content folds INTO commons at PR8).", "Family-shape consistency (substrate-engineer finding): commons plugin.json matches the other 5 — {name, description} only. No version field. No version-special-case carve-out."], disqualifiers = ["Any content (skills, agents, lib, docs, bin) inside plugins/commons/ beyond plugin.json itself. PR1 is skeleton-only.", "Any modification to scripts/sync-shared.ts beyond extending PLUGINS and PLUGIN_CONTENT_RULES (sync-direction extension belongs to PR2; planner refactor belongs to PR2).", "Loosening the closed-set 'exactly N plugins' manifest invariant in marketplace-manifest.test.ts.", "Any plugin-name reference still saying 'shared' in marketplace.json or plugin.json. The rename must be consistent across all wired files thi