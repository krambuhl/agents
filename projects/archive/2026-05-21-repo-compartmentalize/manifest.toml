s/<plugin>/skills/<...>/).", "Root agents/ directory deleted entirely (~20+ .md files duplicating plugins/<plugin>/agents/<...>.md).", "Root docs/ directory deleted entirely (4 .md files duplicating plugins/commons/docs/<...>.md).", "`find . -maxdepth 1 -type d \\( -name 'cli' -o -name 'skills' -o -name 'agents' -o -name 'docs' \\)` returns nothing.", "`npm test` passes (test count drops by the now-deleted duplicates; relocated tests still pass after their REPO_ROOT updates; skill-bodies test still passes after iterating plugins/<plugin>/skills/).", "`node scripts/sync-shared.ts --check` passes (no drift; root paths weren't claimed by any active sync direction since PR4).", "README.md updated if any reference to root cli/skills/agents/docs/ paths survived PR4's earlier edits (grep for `cli/`, `skills/`, `agents/`, `docs/` in README and update or remove any stale path references)."], rules_applied = ["PLAN.md § PR9 — substrate-level canonical-root dissolution (Q7). Complement to PR10's dev-loop shim deletion (Q6b). Scope intentionally split per PLAN's 'asymmetric rollback profiles' rationale.", "User decision (this session's grill) — option A: move the 4 cross-cutting tests to plugins/commons/cli/ first, then delete root cli/. Preserves coverage; commons is the substrate-foundation that cross-cutting marketplace tests belong to.", "Scope consolidation — cli/no-install-sh-refs.test.ts is deleted here rather than moved-then-deleted-in-PR10. PR10's description anticipated this collapse ('removes it from wherever it ended up post-shift' implies single-removal regardless of intermediate state).", "Substrate hygiene — root cli/lib/draft-* relics get deleted here as a side effect of removing root cli/. PR6 partially dissolved draft (in plugins/commons/cli/lib/) but didn't touch root; this completes that cleanup mechanically.", "skill-bodies-call-bare-commands.test.ts gets a real algorithm update (not just path recalc) — its SKILLS_ROOT pointed at root skills/ which is being