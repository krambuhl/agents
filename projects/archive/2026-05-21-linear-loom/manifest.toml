notes_for_pr = ["First Phase 3 unit. Builds the substrate-shared LinearClient + auth + errors foundation that U2/U3/U4 will consume. The dependency-injection pattern (LinearClient takes fetchFn + sleepFn; verb handlers take ctx with optional client + resolveAuthFn) keeps tests mock-friendly and matches loom's ghRunner pattern.", "configure v1 scope is auth-and-existence-check only. The 'bootstrapped' payload field names each piece of § 10's nominal scope (labels, custom fields, Document templates) with an explicit deferral rationale string — this is the substrate's first 'in-band deferral marker' shape. Phase 4 (mirroring verbs) might harden these from human-readable strings into a typed {status: 'deferred', reason: string} enum; v1 keeps them as strings to surface intent without committing to a schema until there's a real consumer (observation surfaced by contract-fit evaluator).", "Linear's API was reached via built-in fetch + raw GraphQL strings — no SDK dependency. Matches the family's zero-runtime-deps posture. The minimal client surface (`query<T>` method, exponential backoff on transient failures) is intentional — the broader Linear SDK surface (Issue, Project, Label-specific helpers) would be premature.", "Substrate-followup candidate: derive-panel keeps returning evaluator-react-api on the .ts files in this artifact (none of which import React). Per PANEL-COMPOSITION.md row 42, react-api applies to .ts only when the file imports React — so the script doesn't check imports and over-applies. The L-004-style manual override path (the skill body's auto-derivation step's import-checking) is the right substrate fix.", "events.jsonl in this unit's commit carries the orphan pr-updated event from U3 of Phase 2's loom pr update call (the same pr-opened/pr-updated lag pattern documented in the substrate memory). Forward-only carry: no retroactive bookkeeping."]

