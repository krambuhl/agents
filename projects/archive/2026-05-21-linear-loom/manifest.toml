notes_for_pr = ["The composed-key header (`**Composed key**: <key>` as the first line of every linear-loom-authored description) is the lookup mechanism for identity across re-runs. Operator-edited descriptions that preserve this header round-trip cleanly; descriptions that drop it become orphans on the next generate (the diff will emit a fresh create at the same composed key + an archive of the orphan).", "DiffOpUpdate asymmetry observation (non-blocking, surfaced by naming evaluator): title gets a narrative pair (`title_before` / `title_after`); body gets a predicate (`body_changed`). Intentional — title diffs are short enough to display inline in a summary, bodies are long. Worth a near-future code comment to preserve the design intent. Recorded as a Phase 6 polish candidate.", "ArchivePartition pair naming observation (non-blocking): `safe_to_archive` (action-readiness) vs `in_flight` (state) is mildly asymmetric. Intentional — communicates the gating purpose better than a symmetric `safe`/`unsafe` would. Punted to a future polish revision; recording the design choice here.", "Composer dependency injection on computeDiff is a deliberate seam: the diff doesn't bake in the exact title/body format. U3 wires the production composers (slug-prefixed titles + composeLinearDescription-wrapped bodies); tests use identity-style stubs. This keeps the diff logic testable without recreating the full title/body shape per test.", "No Linear writes anywhere in this unit. The verb in U3 takes the DiffOp[] from computeDiff and applies each op via the appropriate Linear API mutation. partitionArchiveOps surfaces the in-flight ones so U3 can gate them behind --prune (DESIGN.md § 12.4)."]

