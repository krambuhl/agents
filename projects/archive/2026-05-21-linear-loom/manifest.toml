e evaluator packet's pre-computed-verification section calls for separate lint/build lines per docs/SUBSTRATE-COMPOSITIONS.md § Compose dense packet. The fallback is to note 'not available' in the packet; longer-term, either ship the scripts or update the substrate's packet guidance to be repo-tolerant.", "Substrate follow-up: the loom checkin-write substrate enforces append-once immutability (writeCheckin throws checkin-already-exists on overwrite), which conflicts with the ev-loop-interactive skill body's 'write contract-only at unit start, append execution at unit end' framing. This unit followed Pattern A (per the substrate's memory feedback_loom_phase_and_checkin_gaps): held contract in chat, wrote the complete checkin once at unit end. Cleaner than Pattern B (write twice with manual file edit), no event-trail noise."]

