notes_for_pr = ["Provenance header verified empirically: `\\n\\n---\\n\\n` between the last bold line and the body — one blank line on each side of the divider, matching DESIGN.md § 13's literal example. The composeDocumentBody concatenates header + file body verbatim.", "Git resolver lives in this verb's territory rather than in cli/lib/auth or cli/lib/marker because the provenance header is the only consumer today. plan + retro verbs (U2) will reuse it; ev-linear (Phase 7) inherits it through composition.", "parseGitHubRemote handles the two URL shapes operators actually use (SSH git@github.com:..., HTTPS https://github.com/...). A non-GitHub remote surfaces as a structured remote-not-github error rather than silently writing a broken Source URL. Operators on non-GitHub hosting will need a follow-up to make the source-URL pattern pluggable; out of scope for v1 personal-CLI.", "Partial-success path on the second Document upload (research succeeded, notes failed): the error message names the already-uploaded URL so the operator can either delete it via Linear UI or re-run after fixing the notes-side cause. No automatic rollback in v1.", "Substrate-followup: derive-panel continues to over-apply evaluator-react-api to .ts files that don't import React. Same gap as Phase 3; same workaround (manually verify via grep that no react/react-dom imports exist). Substrate-fix candidate is adding an import-checking step to derive-panel."]

