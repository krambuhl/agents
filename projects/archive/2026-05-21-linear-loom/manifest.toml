notes_for_pr = ["Confidence loop is lighter to port than the interactive loop (619 → 533 lines in U2). The confidence loop has no Step 4.5 equivalent in source (no recurring-threshold mechanism — that lives only in the interactive loop) and a simpler scope-shift step (no inner-RPI sub-sequence — just a § Revise PLAN.md recipe call). Mostly mechanical substrate-reference swaps with U2's disclaimer shape as the template for the cases that DO need a disclaimer.", "§ Retro write stays a REAL call site, not a disclaimer. Phase 4 shipped the linear-loom retro verb, so tactical retros between tiers use the real surface. This is the one place where parity-with-loom holds without modification.", "Three different patterns surfaced across U1/U2/U3 for handling the ev → ev-linear port:\n  (a) Real call site swap (bin/loom → bin/linear-loom) — most things.\n  (b) Excision via disclaimer (griot / sessions / pr-events) — where Linear-native concept doesn't exist.\n  (c) Cross-plugin reference (AGENT-CONVENTIONS, PANEL-COMPOSITION) — where the doc is substrate-shared and duplication would create drift.\nThe pattern set is now stable enough that future ev-* plugin work (if any) can follow the precedent.", "scope-shift signals: phase-boundary fires (this unit is the last in Phase 7). Single signal — no two-signal concurrence — so no inner-RPI offered. Phase 7 closes cleanly.", "Lagged event note: this commit carries U2's pr-opened event for #50 (substrate-known gap). Same pattern throughout Phase 6 + Phase 7.", "Substrate follow-up still standing: bin/guild derive-panel returns 'panel-spec-unreadable (using fallback)' under the marketplace-installed CLI. Used node plugins/guild/cli/guild.ts locally throughout Phase 7.", "Phase 8 (Dogfood) starts after #51 merges. Per PLAN.md Phase 8 scope, the dogfood project exercises every linear-loom verb at least once + both ev-linear loops at least once. The substrate is v1-complete once dogfood completes without substrate-side blockers."]

