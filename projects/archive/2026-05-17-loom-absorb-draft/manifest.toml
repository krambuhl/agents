notes_for_pr = ["`bin/loom plan` and `bin/loom revise-plan` use the verbless-namespace dispatch flow (same pattern doctor uses). No changes to loom's dispatch logic were required — the flow already supported single-handler namespaces.", "`revise-plan` (not `revise`) is the verb name. PLAN.md lines 75-77 and 153-154 dictate this explicitly: a top-level `revise` would have been ambiguous (loom's `project` namespace also exposes verbs that act on projects), and the explicit `revise-plan` makes the subject of the action obvious without needing context.", "`bin/loom --help` formats `revise-plan` (11 chars) slightly off-grid: the `padEnd(8)` in `formatHelp()` produces two spaces between `revise-plan` and its description rather than the four-to-five spaces every other namespace gets. Cosmetic only; help text is still parseable. Out of scope for D2; a follow-up could widen the padEnd to 12 if the namespace list grows more long names.", "Handler identifier `reviseVerb` keeps its existing name even though the verb at the CLI surface is now `revise-plan` rather than `revise`. The disqualifier rule against renaming the handler is intentional: it's a public identifier from D1's `cli/verbs/plan.ts` exports, and renaming it would touch D1's already-merged commit's diff for no behavioral benefit. The connection from `reviseVerb` → `loom revise-plan` is one grep away.", "Both `bin/draft plan/revise` (D1's compat surface) and `bin/loom plan/revise-plan` (D2's new surface) work end-to-end with the same handler bodies. Phase 8 owns the eventual deletion of `bin/draft`."]

