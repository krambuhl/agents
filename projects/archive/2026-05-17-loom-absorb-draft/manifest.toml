, rules_applied = ["PLAN.md Phase 5 lines 379-416 dictates the inner-RPI flow verbatim — including the 'Do not re-execute the unit' constraint.", "Substrate composition: Agent tool for fresh-context sub-agent spawns; Skill tool for inherited-context composition.", "Sub-agent failure recovery is the SUB-agent's responsibility (it writes RECOVERY-STATUS.json); the parent surfaces and exits — different shape from /loom-plan where the parent owns recovery for its spawn of /loom-research.", "CLAUDE.md: keep the load-bearing existing behavior unchanged (two-signal rule); only modify the accept path."], disqualifiers = ["Changing the two-signal-concurrence rule.", "Modifying production code outside skills/ev-loop-interactive/SKILL.md.", "Writing the parent's own RECOVERY-STATUS.json on sub-agent failure.", "Re-executing the current unit after the inner-RPI sequence."], inputs = ["projects/2026-05-17-loom-absorb-draft/PLAN.md:379-416 (Phase 5 spec)", "skills/ev-loop-interactive/SKILL.md (pre-change at lines 269-307: the existing scope-shift step)", "skills/loom-research/SKILL.md + skills/loom-revise-plan/SKILL.md (sub-agent targets)", "cli/lib/types.ts (D1 of this phase — the 4 event types this step emits)"] }
