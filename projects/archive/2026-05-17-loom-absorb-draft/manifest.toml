notes_for_pr = ["Every Phase-5-and-6 event that PLAN.md flagged as 'hardcoded griot write' now has a § Capture finding paragraph wired at the emission point. The wiring is documentation-shaped — the verb extension (bin/griot capture's classification surface adding precise classifications for these capture types) is still pending. The skill bodies document this gap consistently across all 5 capture sites; intent recorded; verb extension is the natural downstream work alongside the broader griot classification expansion.", "Cross-skill rollup-load brief audit: /ev-loop-interactive's two sub-agent spawns (inner-RPI: /loom-research and /loom-revise-plan) now both explicitly mention 'bin/griot use --as=llm' in their spawn brief paragraphs. /loom-plan and /loom-revise-plan's /loom-research spawns already had the mention from prior phases.", "/loom-archive's NEW [portable] scan paragraph at retro close is the substrate's first retro-tier griot integration. Project-tier retros are project-scoped; the [portable] scan extracts cross-project signal into the substrate-wide learnings pool. Scan runs in both modes — operators can flag findings as [portable] in their AskUserQuestion responses just as easily as the panels can in auto-mode.", "/ev-run's drift-detection capture is the substrate-wide signal that complements the per-skill budget-exhausted captures (research-, plan-, plan-revise-, auto-mode-). Drift is the router-level concern; budget-exhausted is the in-flight-skill concern. Together they answer: 'when does the substrate's auto-mode posture fail to converge, and where in the substrate does the failure tend to surface.'"]

