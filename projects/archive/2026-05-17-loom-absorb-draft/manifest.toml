k-spawned, research-fact-check-verdict, research-budget-exhausted) at the corresponding decision points; the CLI-owned events (research-started, research-completed) are explicitly noted as not the skill's responsibility.", "Documents griot integration explicitly via § Capture finding for both the per-shift [portable]-marker scan AND the hardcoded research-budget-exhausted write. The verb-shape gap (the current classification surface of `bin/griot capture` doesn't have a clean form for these captures) is named as a Phase 7 follow-up rather than papered over.", "Cites `bin/loom research` for the deterministic file IO; explicitly forbids writing into `projects/<slug>/` directly."], rules_applied = ["CLAUDE.md: prefer citation over restatement — the RECOVERY-STATUS.json shape and the two-budget defaults live in docs/AGENT-CONVENTIONS.md; the skill cites both, drift-proofing the skill against future schema updates.", "CLAUDE.md: don't add features beyond the task — the skill DOES NOT add a `--mode=auto` arg to `bin/loom research`; auto-mode is a skill-runtime concern, the CLI stays auto-agnostic.", "PLAN.md Phase 3 sub-section 3.2 dictates the skill's behavior verbatim; sub-section 3.4 dictates the griot integration.", "Substrate composition contract: invoke `/guild-whiteboard` for the per-shift panel and `/guild-validate` for the fact-check gate. Never call the Agent tool directly from skill body."], disqualifiers = ["Re-implementing the RECOVERY-STATUS.json shape (it's documented in docs/AGENT-CONVENTIONS.md; the skill cites it).", "Adding `--mode=auto` to the CLI verb — auto-mode is skill-side only.", "Modifying any production code outside `skills/loom-research/SKILL.md`."], inputs = ["projects/2026-05-17-loom-absorb-draft/PLAN.md:255-321 (Phase 3 spec; 3.2 = skill behavior; 3.4 = griot integration)", "docs/AGENT-CONVENTIONS.md:130-296 (Recovery + Auto-mode + two-budget conventions; canonical RECOVERY-STATUS.json shape lives here)", "docs/SUBSTRATE-COMPOSITIONS.md:273