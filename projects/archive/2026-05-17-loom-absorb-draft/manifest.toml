changes_since_previous = "First unit on this branch. Phase 2 closed on the prior branch (merged via PR #2). The phase-2 close substrate updates (manifest status `completed`, PR #2 state `merged`, phase-completed event) ride into main with this PR — they were applied locally after the phase-2 push and so didn't ship with PR #2's snapshot."
verdict = { result = "approved", reasons = [] }
notes_for_pr = ["The `loom research` verb is the first loom CLI handler to emit domain events (research-started, research-completed) from its body, beyond the standard substrate vocabulary (project-initialized, phase-*, checkin-created, pr-*, session-saved, retro-written, archived, note). PLAN.md 3.3 explicitly dictates this. Pattern: emit started after file writes but before the commit; emit completed after the commit succeeds. On commit failure the verb returns with an error and completed never fires, leaving a started without a matching completion in events.jsonl — that's the correct partial-failure signal for forensics.", "Event emission is gated on loom-presence: either (a) the verb auto-adopted loom this run, or (b) a manifest.json already existed (the recovery/coexistence path). The --no-loom + no-pre-existing case is the only one that skips emission — there's no events.jsonl to write into.", "Contract phrasing nit (caught by the contract-fit evaluator): the contract said `started before file write` but the code emits started AFTER the writes. The phrasing should have read `started before the commit, completed after the commit` — the writes happen first because, in the fresh-adopt path, the events.jsonl doesn't exist yet until writeLoomSubstrate runs. Comment at cli/verbs/research.ts:212-217 documents this gating. Evaluator approved with the refinement noted.", "The `research-exists-committed` error message points users at the Deferred `loom revise-research` verb (PLAN.md `**Deferred:**` section). No deprecation shim; just a clean signpost.", "8 event types declared in D1; only 2 are emitted by the CLI verb. The other 6 (research-shift, research-panel-spawned, research-panel-verdict, research-fact-check-spawned, research-fact-check-verdict, research-budget-exhausted) are declared here so D2's skill code can emit them via the existing appendEvent helper without re-extending the type union.", "Phase-2-close substrate sync rides into this PR: phase 2 PR #2 was merged before the local manifest+events post-close updates were pushed, so they were stashed off phase-2-branch and re-applied on phase-3-branch. The current state on origin/main has phase 2 in `in-progress`; this PR flips it to `completed` with PR state `merged`. A future `bin/loom pr reconcile` verb (mentioned in the router rules) would automate this kind of out-of-band sync.", "Calling `bin/loom phase update --status=completed` on an already-completed phase re-fires the `phase-completed` event in events.jsonl. Minor substrate idempotency quirk — events.jsonl is append-only by design, but the verb could check current state and skip the event emission when no transition occurred. Not blocking this PR; flagged for a future substrate hardening pass.", "Same fallback-panel observation as Phase 1 + Phase 2: `bin/guild derive-panel` runs in fallback mode from the marketplace cwd because `.claude/agents/PANEL-COMPOSITION.md` isn't symlinked there (the spec lives at `agents/PANEL-COMPOSITION.md`). Not in scope; flagged once more for a future cross-cutting workstream.", "ResearchShiftEvent's name breaks the `<subject>-<verb-past>` cadence of its siblings (`shift` is a noun, not a past-tense verb). The naming evaluator flagged this as a soft observation; the design choice was deliberate — `shift` IS the event (a discrete moment in the research arc, not an action taken on it). The string literal `'research-shift'` and the type name `ResearchShiftEvent` parallel cleanly, which is what the naming convention is ultimately preserving."]

