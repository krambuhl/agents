ll-slug passthrough, dir-exists-no-RESEARCH, committed-RESEARCH refuses with `research-exists-committed`, missing-positional + missing-flag + missing-source-file error paths, registry shape.", "cli/loom.test.ts adds a dispatch test verifying `research` routes through the verbless-namespace dispatch (missing-args surfaces, not unknown-verb or missing-verb).", "`npm test` green at 485 tests (was 468 after Phase 2; +17 = 16 in research.test.ts + 1 in loom.test.ts dispatch).", "Smoke: `bin/loom research <topic> --research-file=… --notes-file=… --no-commit --pretty` against a scratch projects root: exit 0, writes RESEARCH.md + RESEARCH-NOTES.md, auto-adopts loom substrate, emits project-initialized + research-started + research-completed in events.jsonl.", "Substrate reconciliation: phase 2 manifest+events updates (phase 2 status `completed`, PR #2 state `merged`, phase-completed event recorded) land in this commit. These updates happened locally after the phase-2 branch was pushed and so didn't ship with PR #2 — they ride into main with the phase-3 PR."], rules_applied = ["CLAUDE.md: pure-pattern relocation of the plan.ts shape into research.ts — same args parsing, same loom-adopt branching, same git-runner seam. Differences are intentional and minimal: the second file pair (RESEARCH.md + RESEARCH-NOTES.md instead of PLAN.md + INTERVIEW.md), the event emission gating, and the up-front source-file existence check (fail-fast before mkdir).", "CLAUDE.md: don't add features beyond the task — the verb is intentionally narrow. The skill is D2's concern. The deferred `revise-research` verb is NOT implemented here.", "PLAN.md Phase 3 sub-section 3.1 dictates the verb interface verbatim; sub-section 3.3 dictates the 8 event names verbatim.", "LOOM-CONVENTIONS verbless-namespace pattern: `loom <namespace>` where the namespace IS the only verb (sibling: doctor, plan, revise-plan).", "Three-phase pattern (CLAUDE.md): D1 grounds the CLI surface that D2's skill orchestrates. D2 will 