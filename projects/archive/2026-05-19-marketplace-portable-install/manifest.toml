notes_for_pr = ["V1 outcome (documented-behavior method): Claude Code's --scope local writes enabledPlugins entries to .claude/settings.local.json. The file is gitignored by Claude Code convention but not enforced by the tool. If accidentally committed, a colleague's clone WILL surface the enabledPlugins entry at local-settings precedence — the docs explicitly state --scope project (same key, different file) 'makes the plugin available to everyone who clones the project repository,' and the same key at local scope follows the same hierarchical-settings semantics on whoever loads the repo. The marketplace must be registered on the colleague's machine for resolution to succeed; without registration the entry is dead, but at Patreon where colleagues share repos and may share marketplaces over time, the failure mode is real. Ground-truth empirical check happens in V7 (Patreon-machine smoke test).", "V1 implication for install-scope guidance: recommend README primary install command use --scope user (writes to ~/.claude/settings.json, never lands in any repo) for the Patreon 'invisible to colleagues' use case. Document --scope local as a per-project variant — explicitly conditioned on adding .claude/settings.local.json to the consumer repo's .gitignore as a load-bearing mitigation. This is a refinement of PLAN's current --scope local default in the install instructions; W8 (README rewrite) is the workstream that adopts it.", "OQ2 generated-tree size estimate: per-plugin trees sum to ~908 KB / ~125 files across loom (~436K/55), griot (~244K/35), guild (~228K/35). ev, review-skill, and agent-loop-full ship no CLI tree. First-commit diff: ~12k-30k added lines (bytes-per-line varies; TS averages 30-80). Consistent with OQ2's 'commit generated trees' decision and R6 ('PR is large') risk; R7 (review-time duplication) is the binding cost and the PR description must explicitly name which files are sync-script output ('generated by scripts/sync-shared.ts, do not review line-by-line; review the script + the source instead'), per R7 mitigation.", "Sync-script subset rule clarification surfaced during sizing: the existing cli/verbs/ layout has loom verbs at the top level (cli/verbs/*.ts) and griot+guild verbs in subdirs (cli/verbs/griot/, cli/verbs/guild/). For the sync script to filter cleanly, W7 (sync script) likely either (a) refactors loom verbs into cli/verbs/loom/ for layout symmetry, or (b) hardcodes the loom-verb file list. Decision lives in W7's contract; surfacing here so W7 inherits the context."]

