EM_NODE = existsSync('/usr/bin/node') resolved at module load. The skip is now explicit in test output (vitest reports skipped tests) rather than silent. On this host (no /usr/bin/node) all 15 tests run; on a host with system node, the 3 missing-node tests skip visibly."], files_touched = ["plugins/griot/bin/griot", "plugins/guild/bin/guild", "plugins/loom/bin/loom", "cli/plugin-bin-shims.test.ts"], corrections = [] }
