notes_for_pr = ["Loom-verb subdir refactor is mechanical: cli/verbs/*.ts → cli/verbs/loom/*.ts. git mv preserves history (the follow-up PR's diff will show as renames). Internal cross-imports between loom verbs are sibling-relative so they don't need updating; the only depth-sensitive imports were (a) the top-level cli/loom.ts → cli/verbs/loom/<name>.ts paths and (b) the verb files' '../lib/' → '../../lib/' paths and (c) the test fixture paths.", "scripts/sync-shared.ts is pure copy — no header injection, no content modification. Line-number diagnostics in the synced cli/<plugin>.ts map 1:1 to the canonical source. Future-self reading a stack trace inside plugins/loom/cli/verbs/loom/checkin.ts can match the line directly to cli/verbs/loom/checkin.ts.", "Drift detection: --check reports 3 record kinds — divergent (per-plugin file edited away from source), missing (source exists, dest doesn't), orphan (dest exists, source doesn't). The orphan case catches stale files after an upstream rename/delete. The error message names the source path, plugin path, and 'Run node scripts/sync-shared.ts to resync' as the one-shot remedy. CI integration (pre-commit hook / GitHub Action) is follow-up.", "First sync run produced 69 files / ~452 KB across the 3 plugins. W0 estimated ~908 KB / ~125 files; the actual is smaller because runtime-only excludes test files. This is the bulk of the W7 diff and lands per OQ2's commit-generated-trees decision. R7 mitigation: the PR description for the follow-up should explicitly name plugins/<plugin>/cli/ as sync-script output (reviewer skips line-by-line in favor of reviewing the script + canonical source).", "Manifest update at branch-cut time updated phase.branch from marketplace-portable-install.migration to marketplace-portable-install.followup. The checkin file for this unit lands in the new branch's partition (checkins/marketplace-portable-install.followup/08.json).", "V10 coverage: 12 tests across the 3 PLAN-named cases. The 'orphan' branch of drift detection isn't named in PLAN explicitly but emerged naturally from the design — when an upstream file is renamed or deleted, the script must catch the stale generated copy or risk shipping zombie code. Tested.", "After W7 lands, the plugins are minimum-viable installable: marketplace.json + per-plugin plugin.json + bin shim + cli/ tree all in place. W8 (README rewrite) and W9 (install.sh deletion + grep tripwire) are the remaining workstreams in this follow-up PR."]

