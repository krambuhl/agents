execution = { actions = ["Added check() function (~80 lines) at the end of plugins/guild/cli/verbs/guild/compile.ts. Function composes parse → validate → derive → resolve (same shape as compileThroughResolveCore), then per-cell compares against readCache(opts.cacheToml). Six drift classifications: per-axis source drift (phase/personality/domain fragment hash mismatch), output drift (sha256(on-disk-body) != cache.output_hash), prompt drift (entry.prompt_hash != promptHash), missing cache entry (derived id not in cache), missing on-disk body (agentBodyReader returns undefined), stale cache entry (cache has id not in derivedIds). missing-cache subsumes per-cell other categories via continue after push. ok = AND-of-empties across all six lists.", "Added CheckOptions, CheckResult, CheckSourceDrift, AgentBodyReader exports to compile.ts (PascalCase + camelCase, matching the CompileOptions/CompileReport/FragmentReader/FileWriter sibling family).", "Added --check boolean flag to compile-cli.ts OPTIONS. Updated the values type. Added mutual-exclusion guard: --check + --stage → bad-args 'mutually exclusive'. Added check-mode handler before the THROUGH_RESOLVE_STAGE branch: builds an agentBodyReader from fs.readFileSync (ENOENT → undefined → missing-on-disk classification), calls check(), emits JSON stdout, exits 0 on ok=true / 1 on ok=false.", "Added compile: --check smoke (Phase 2.1 exit criteria 4 + 5) describe block to compile.test.ts with 8 tests: fresh compile + check → ok=true all drift empty; no-source-change re-run → cache_misses.length===0 (skill body's no-op invariant); source drift on mutated a11y.md → cells_with_source_drift contains evaluator-a11y AND whiteboard-a11y (both have a11y domain) with axis='domain'; prompt drift on mismatched promptHash → cells_with_prompt_drift contains every cell (count matches .md file count); output drift on tampered body → cells_with_output_drift contains tampered cell; missing on-disk body distinct from output drift; stripped cache entry → cells_missing_cache_entry; injected phantom cache entry → stale_cache_entries; pure-deterministic-check timing assertion (elapsed < 2s).", "Added compile CLI: --check describe block to compile-cli.test.ts with 5 tests: fresh sandbox + --check → exit 0 ok=true; tampered evaluator-a11y.md → exit 1 ok=false with output_drift; --check + --stage → bad-args mutual exclusion; no .cache.toml → every cell missing-cache-entry exit 1; --prompt-hash baseline vs different → exit 1 with prompt drift.", "Addressed advisory from test-unit evaluator: the prompt-drift test had a tautology assertion (length === length). Replaced with a meaningful comparison against the written .md file count (which is the cell count).", "Smoke-ran the real CLI: fresh compile against the seed axes.toml (19 cells) followed by `guild compile --check` → ok=true exit 0 with all drift lists empty. Tampering one body (echo tampered > evaluator-a11y.md) → ok=false exit 1 with cells_with_output_drift=['evaluator-a11y'].", "Test suite: 1052/1052 passing (66 test files). Baseline pre-U4 was 1038 — +14 net new tests (8 smoke + 5 CLI + 1 from the corrected prompt-drift assertion which now meaningfully counts cells)."], files_touched = ["plugins/guild/cli/verbs/guild/compile.ts", "plugins/guild/cli/verbs/guild/compile.test.ts", "plugins/guild/cli/verbs/guild/compile-cli.ts", "plugins/guild/cli/verbs/guild/compile-cli.test.ts"], corrections = ["Addressed advisory from evaluator-test-unit: replaced tautological `expect(prompt_drift.length).toBe(prompt_drift.length)` with `expect(prompt_drift.length).toBe(writtenAgentCount)`. The original would have passed for any value; the corrected assertion meaningfully verifies every cell drifts when prompt_hash is global to the cache."] }
