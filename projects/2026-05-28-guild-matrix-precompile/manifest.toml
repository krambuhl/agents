notes_for_pr = ["U2 of Phase 1.0 (Rewrite fragments as labeled-section markdown). Normalizes 12 domain fragments to U1's canonical 6-heading set. 6 files actually changed (nextjs reorder, test-integration / test-unit rename, tokens fold, substrate / performance stubs); the other 6 (a11y, abstraction, composition, css-architecture, naming, react) were already conformant. 9 committed agent files mechanically regenerated via guild generate to keep generated-panel.test.ts freshness gate green. Panel: evaluator-contract-fit, approved on first run.", "Lagged pr-merged event for #109 (U1's PR) — merged at the GitHub web UI in a brief window between this session's U1 checkpoint and U2 negotiation. No bin/loom pr merge verb today (per /ev-run § PR-merged reconciliation, the loom emits pr-merged only from explicit reconciliation, not via a CLI verb). This checkin's notes_for_pr is the substrate trace; events.jsonl shows pr-merged for #109 only after a future reconciliation flow lands.", "Substrate hygiene signal (single signal — no scope-shift offer): the installed guild CLI cache (af4bc8193088) returned 'unknown verb: generate' on guild generate. The Tier 2 preflight in /ev-loop-interactive checks loom doctor readability but doesn't probe guild's verb table for completeness against repo expectations. Fell back to plugins/guild/bin/guild (repo-local) per the Tier-2-on-failure path. Worth a follow-up: either teach Tier 2 to also probe `guild --help` for expected verb names against the repo's plugins/guild/cli/guild.ts VERBS table, or document a stronger 'guild snapshot may be stale; prefer repo-local bin/guild for codegen operations' in /ev-loop-interactive's preflight section. The substrate inconsistency is contained but invisible to operators who don't already know about Tier 2.", "Substrate flake (persisted from U1): npm test still has 1 pre-existing failure unrelated to this unit. plan.real.test.ts:67 reads hardcoded projects/2026-05-26-substrate-consolidation/PLAN.md which is under projects/archive/. Confirmed unchanged by U2 (same failure, same line). Still worth a tiny follow-up — see U1's notes_for_pr.", "Mid-execution contract adjustment (folded into AC #6): the original U2 contract disqualifier ('no file outside plugins/guild/modes/domains/') was naive about the agents/ regen consequence. The freshness gate generated-panel.test.ts asserts byte-identity between committed agents/*.md and a fresh regen from the source fragments; editing a source fragment necessarily invalidates the regen unless agents/ is also refreshed. Updated AC #6 to explicitly carve out 'mechanically-regenerated agent outputs gated by generated-panel.test.ts' as in-scope substrate-coherence consequences. This shape (the disqualifier carving out the necessary regen) should propagate to U3's contract — phase-fragment + personality-fragment edits will trigger the same regen cascade.", "Expectation-setting for U3 (carrying U1's panel advisory through): the phase-axis canonical set drops ## Combining with domain + personality from all four phase fragments. U3's reviewer should expect content deletion (the cross-axis composition guidance moves to Phase 2.1's fusion-prompt.md) alongside ## Stance addition in implementer/planner/researcher.", "U3 will also touch the agents/ regen surface (every phase + personality fragment edit cascades through guild generate). The regen footprint will be larger than U2's — 19 generated agents inline at least one phase fragment + at least one personality fragment each. Plan for the diff to span ~5-10 source edits + ~19 regenerated agent files.", "Migration map status update: 6 of 12 rows in U1's Domain table now read effectively-✓ (nextjs / test-integration / test-unit / tokens / substrate / performance are conformant post-U2). The map's information value evaporates further with U3 (phase + personality rows). Confirming U1's panel advisory: a cleanup unit at end of Phase 1.0 (rolled into U4 or as a tiny U5) should delete the migration tables once every row is ✓."]

