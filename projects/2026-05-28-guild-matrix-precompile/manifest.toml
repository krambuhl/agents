OSITION.md — fragment-only source-edit unit; evaluator-contract-fit only with the documented panel-spec-unreadable fallback (matches U1's panel pattern)."], disqualifiers = ["Modifying phase fragments (U3), personality fragments (U3), the schema test (U4), or plugins/guild/docs/AGENT-CODEGEN.md (U1's spec is fixed).", "Modifying axes.toml / panel.manifest.toml / tools-map.toml / generator code.", "Adding or removing fragment files.", "Stylistic prose rewrites — bodies move verbatim between headings; only the heading string and surrounding structure changes."], inputs = ["plugins/guild/docs/AGENT-CODEGEN.md § Fragment heading sets (the U1 spec — especially the per-fragment migration map).", "plugins/guild/modes/domains/*.md (12 files — read each at full for the transformation; per U1 migration map, 6 are ✓ and 6 need targeted edits)."] }
execution = { actions = ["Batch A (mechanical edits, 3 files): (a) plugins/guild/modes/domains/nextjs.md — cut ## Detection block from between ## Scope and ## Concerns; paste it between ## Antipattern catalog (catalog entry 15) and ## Good patterns. Body preserved verbatim; only block location changes. The new position is also more logical — Detection references 'entries 1-6' and 'entries 7-15', so it reads more naturally AFTER the catalog. (b) test-integration.md + (c) test-unit.md — renamed ## Shared testing concerns → ## Concerns. Three-line transitional paragraph body identical in both files; only the heading string changed.", "Batch A verification: grep '^## ' across all 12 domain fragments. nextjs, test-integration, test-unit all now expose canonical 6-required + optional ## Detection at canonical position. Mid-execution checkpoint reported to operator before Batch B.", "Batch B (judgment-heavy edits, 3 files): (a) plugins/guild/modes/domains/tokens.md — deleted the ## Project context heading line; the body (the intro sentence about three load-bearing pieces, the three bullets for design-tokens.json/generate:tokens/token() PostCSS function, the bridge sentence 'The antipattern catalog references these names directly.') flows as a continuation of ## Scope, with only one blank line connecting it to the existing 'advisory by default' paragraph. Verbatim body preservation. (b) substrate.md — added ## Antipattern catalog between ## Concerns and ## Good patterns; body explains 'No reviewer-cell catalog — this is a design-phase domain (researcher and planner only). The contract-fit lens covers after-the-fact correctness of substrate changes, and the concerns above shape the contract before code is written. See § Cross-domain notes for the boundaries that downstream reviewer-cell domains (naming for verb names, test-unit / test-integration for verifying substrate verbs) own once a substrate change ships.' (c) performance.md — same shape, body adapted: 'No reviewer-cell catalog — this is a design-phase domain (researcher and planner only). Framework-correctness on shipped code (an unneeded use client, a raw img) is the nextjs domain's reviewer lane; the concerns above shape the contract before code is written. See § Cross-domain notes for the boundaries that downstream reviewer-cell domains (nextjs) own once a performance-shaped recommendation lands as code.' Both stubs cite the specific downstream owners per U1's spec.", "Final verification: grep '^## ' across all 12 domain fragments shows canonical 6 in order in every file; optional ## Detection appears in nextjs / test-integration / test-unit at canonical position; optional ## Carve-outs appears in css-architecture / tokens at canonical position. No non-canonical headings present.", "npm test surfaced an unexpected regression in plugins/guild/generated-panel.test.ts: the committed plugins/guild/agents/*.md files (the runtime panel) inline fragment content at generate-time, and they were now stale relative to a fresh regen from the modified source fragments. This is exactly what the freshness gate exists to enforce; correct response is regenerate the committed agents, not bypass the test. Note: the installed guild CLI (af4bc8193088 cache) returned 'unknown verb: generate' because its VERBS table predates a substrate change; switched to the repo-local plugins/guild/bin/guild shim which carries the current generate verb.", "Ran plugins/guild/bin/guild generate --source-dir=plugins/guild --out=plugins/guild/agents — 19 files emitted, 9 of which changed on disk (the 4 reviewer-cell evaluators tied to my edited domain sources: evaluator-{nextjs,test-integration,test-unit,tokens}; and the 5 whiteboards tied to my edited domain sources: whiteboard-{performance,substrate,test-integration,test-unit,tokens}; nextjs doesn't have a separate whiteboard cell, performance/substrate don't have evaluator cells). Spot-checked git diff plugins/guild/agents/evaluator-tokens.md — the only change is the removed ## Project context heading, body unchanged. Mechanical and faithful.", "Final npm test: 804 passed, 1 pre-existing unrelated failure (plan.real.test.ts substrate-consolidation flake; same as U1). generated-panel.test.ts now passes. Panel: evaluator-contract-fit, approved on first run.", "Recorded the lagged pr-merged event for #109 in this checkin's notes_for_pr per substrate convention (no bin/loom pr merge verb shipped today; the lagged-event pattern lands the signal in the next commit's checkin)."], files_touched = ["plugins/guild/modes/domains/nextjs.md", "plugins/guild/modes/domains/test-integration.md", "plugins/guild/modes/domains/test-unit.md", "plugins/guild/modes/domains/tokens.md", "plugins/guild/modes/domains/substrate.md", "plugins/guild/modes/domains/performance.md", "plugins/guild/agents/evaluator-nextjs.md", "plugins/guild/agents/evaluator-test-integration.md", "plugins/guild/agents/evaluator-test-unit.md", "plugins/guild/agents/evaluator-tokens.md", "plugins/guild/agents/whiteboard-performance.md", "plugins/guild/agents/whiteboard-substrate.md", "plugins/guild/agents/whiteboard-test-integration.md", "plugins/guild/agents/whiteboard-test-unit.md", "plugins/guild/agents/whiteboard-tokens.md"], corrections = ["Forgot to budget for the agents/ regen consequence in U2's contract. Disqualifier #6 ('no file outside modes/domains/') was naive about the freshness test — source-fragment edits are inlined into the committed agents at generate-time, so the freshness gate fires on EVERY source-fragment edit. The 9 regen file modifications are the right response (substrate-coherence), and the contract's AC #6 was updated mid-execution to explicitly carve out 'mechanically-regenerated agent outputs gated by generated-panel.test.ts.' Not a scope drift — these regens have no semantic content unique to U2; they're a substrate consequence the gate enforces.", "Installed guild CLI (af4bc8193088, cached) returned 'unknown verb: generate' on `guild generate`