contract = { goal = "Decide the canonical heading sets for guild's three fragment axes (domain, phase, personality) and document them in plugins/guild/docs/AGENT-CODEGEN.md, so Phase 1.0 U2-U4 + Phase 1.2's compose-dedup operate on a stable, unambiguous heading vocabulary.", acceptance_criteria = ["plugins/guild/docs/AGENT-CODEGEN.md gains a new section listing required + ordered heading sets per axis.", "Headings are concrete strings (no 'e.g.' escape hatches) — the U4 schema test will assert on exact strings.", "Canonical sets are informed by a skim of existing fragment shapes; deviations from common existing shapes carry a one-line rationale in the doc.", "Sets are mutually disjoint across axes (no heading shared between axes with different body semantics) — supports heading + body mechanical dedup in Phase 1.2's compose.", "Heading order within each axis is canonical (U4 will assert order, not just presence).", "Doc names which fragments deviate from the canonical set (per-file migration map for U2/U3 input)."], rules_applied = ["PLAN.md § Phase 1.0 exit criteria 1-3 + 5 — heading sets per axis + mechanical-dedup-supporting shape.", "PLAN.md's proposed example headings (## Identity / ## Watch for / ## Posture / etc.) are illustrative; AC #3 explicitly invites grounding in the actual fragment shape.", "docs/SUBSTRATE-COMPOSITIONS.md § Substrate compositions — write goes via Edit on the live doc (no detour through a generator).", "Loom checkin shape per docs/LOOM-CONVENTIONS.md § checkins/<branch>/<NN>.json (schema_version 1; immutable once written).", "Panel auto-derivation per docs/PANEL-COMPOSITION.md — for a substrate-doc artifact with no specialist evaluators applicable, derive-panel returns evaluator-contract-fit only."], disqualifiers = ["Rewriting any fragment file under modes/{domains,phases}/*.md or agents/personalities/*.md (those rewrites are U2 and U3).", "Adding new code — the schema test belongs to U4.", "Restructuring the rest of plugins/guild/docs/AGENT-CODEGEN.md (the historical-mapping table, Phase-7 prerequisites, etc.) — this unit only ADDS a new section; surrounding-doc refactor is out of scope.", "Touching axes.toml / panel.manifest.toml / tools-map.toml (Phase 1.1 + Phase 2.2 territory)."], inputs = ["plugins/guild/docs/AGENT-CODEGEN.md (current state — establishes the doc's voice + the existing 3-axis model description).", "plugins/guild/modes/domains/*.md (12 files — heading inventory across all to ground the canonical domain set).", "plugins/guild/modes/phases/*.md (4 files — read all 4 to ground the canonical phase set).", "plugins/guild/agents/personalities/*.md (5 personality fragments + personality-base.md — read all 6 to ground the personality set + the base exemption).", "projects/2026-05-28-guild-matrix-precompile/PLAN.md § Phase 1.0 exit criteria + § Milestones."] }
execution = { actions = ["Cataloged all 22 fragment files' current ## headings (12 domain, 4 phase, 6 personality including base). Findings: 10 of 12 domains carry ## Antipattern catalog; substrate.md and performance.md lack it as explicit 'design-phase domain, no reviewer cell' cases. Reviewer.md has a ## Stance section (lifecycle + skeptical-by-default posture); the other three phases (implementer / planner / researcher) fold stance prose into ## Mandate. All five personality fragments (excluding base) share ## Your disposition + ## How your disposition modulates across the phases. personality-base.md has a distinct shape (## The three-axis identity / ## Tool posture is the phase's call / ## Output contract is the phase's call / ## Isolation / ## What every personality does NOT do) — documentation-root for the personality class, not a personality fragment per se.", "Drafted the canonical sets grounded in the inventory: domain = 6 required headings + 2 optional (## Detection, ## Carve-outs) at canonical positions; phase = 5 required (including ## Stance, made uniform across all phases from reviewer's existing shape); personality = 3 required for the five personality fragments (## Disposition / ## Voice cues / ## Phase modulation), with personality-base.md exempt.", "Wrote the new ### Fragment heading sets H3 section into plugins/guild/docs/AGENT-CODEGEN.md, slotted inside the existing ## The model H2 between the tools-map.toml paragraph and the ### Retained hand-authored agents H3 (the natural place — the model section describes the 3-axis decomposition; the heading sets are the structural detail of that decomposition). Subsections: #### Domain fragments, #### Phase fragments, #### Personality fragments, #### Migration map.", "Composed the migration map (3 tables, one per axis) enumerating all 22 fragments with their current → canonical transformation (✓ when no rewrite needed, explicit one-liner otherwise). This becomes U2/U3's input.", "Verified via npm test: 780 passed, 1 pre-existing failure unrelated to this unit (plugins/loom/cli/lib/plan.real.test.ts:67 reads hardcoded projects/2026-05-26-substrate-consolidation/PLAN.md which is now under projects/archive/; confirmed by stash-and-rerun — same failure on stashed tree). Captured in notes_for_pr as a substrate flake follow-up.", "Panel derivation via guild derive-panel: evaluator-contract-fit only (with documented 'panel-spec-unreadable, using fallback' note — the project lacks a .guild/panel.manifest.toml because this project's whole point is to replace that file with axes.toml in Phase 1.1; the contract-fit fallback is the documented behavior in this case). Single-evaluator panel approved on first run."], files_touched = ["plugins/guild/docs/AGENT-CODEGEN.md"], corrections = ["Expanded canonical domain set from the contract-approved 5-heading straw-man to 6 headings — added ## Antipattern catalog after discovering 10 of 12 domains already have it; the two design-phase-only domains (substrate, performance) gain a stub paragraph in U2 rather than being separately typed. AC #3 explicitly allowed grounding the set in the existing inventory, so this is contract-aligned discovery, not scope drift.", "Expanded canonical phase set from the contract-approved 4-heading straw-man to 5 headings — added ## Stance after discovering reviewer.md already carries it as a distinct section from ## Mandate. Making it required across all phases makes structure uniform and pulls the stance prose out of Mandate in implementer/planner/researcher (a U3 split). Same AC #3 grounding.", "PLAN.md exit criterion 1 cites 'docs/AGENT-CODEGEN.md' but the doc actually lives at plugins/guild/docs/AGENT-CODEGEN.md (plugin-canonical, since the guild plugin owns this doc). Wrote to the actual path; PLAN's path is a pre-loom-adoption-era reference. Surfacing as a notes_for_pr follow-up — a later revise-plan pass could update PLAN.md, or the path can stand as a known equivalence."] }
