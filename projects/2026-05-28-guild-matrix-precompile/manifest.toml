notes_for_pr = ["U1 of Phase 1.0 (Rewrite fragments as labeled-section markdown). Defines the canonical heading sets that U2 (domain normalizations, 12 files), U3 (combined phase + personality normalizations, 10 files), and U4 (fragment-schema test) build on. Panel: evaluator-contract-fit, approved on first run.", "Advisory from the panel (non-gating, recorded for downstream): the #### Migration map subsection inside ### Fragment heading sets is a transient U2/U3-input artifact; once Phase 1.0 closes and every row reads ✓, the tables' information value evaporates. Consider a small cleanup unit at the end of Phase 1.0 (or rolled into U4's checkin) to delete the migration tables once they're all satisfied. Not a contract violation — AC #6 just requires naming deviations at this point in time.", "Advisory from the panel (non-gating, expectation-setting for U3): the canonical phase set drops ## Combining with domain + personality from all four phase fragments. That's real content deletion in U3, not just structural rename — the cross-axis composition guidance moves to Phase 2.1's fusion-prompt.md, where it lives in one place for the LLM to absorb at fusion time. U3's reviewer should expect content loss alongside ## Stance addition + ## Output contract rename on reviewer.md.", "Substrate quirk: the always-on whiteboard step (per /ev-loop-interactive § Whiteboard) was skipped via its bootstrapping case — the skill's glob (.claude/agents/whiteboard-*.md) is empty in this repo because the guild plugin holds whiteboard engineers at plugins/guild/agents/whiteboard-*.md (plugin-canonical, not project-canonical). The runtime registry carries an older 8-engineer snapshot from a prior guild install; the repo HEAD has a 12-engineer roster (the matrix-precompile cell-based shape, ironically). Design pressure on the heading-set choice came from this contract's negotiation grill + the in-execution inventory rather than a parallel whiteboard panel. Worth surfacing: either /ev-loop-interactive's whiteboard glob should accept plugin-canonical paths, or this project's PLAN.md should carry a **Whiteboard**: engineers=... override with the explicit runtime-registered set, before Phase 1.2 (which has real design calls).", "Substrate flake (single signal — no scope-shift offer): npm test has 1 pre-existing failure unrelated to this unit. plugins/loom/cli/lib/plan.real.test.ts:67 reads a hardcoded path to projects/2026-05-26-substrate-consolidation/PLAN.md which is now under projects/archive/. Verified by git stash + npm test → same failure on stashed tree. Worth a tiny follow-up unit on a separate branch (or rolled into Phase 3.1 retro): update the test to either read from archive/, parameterize the project path, or delete the test if substrate-consolidation's PLAN no longer carries the structural facts the test asserts.", "PLAN.md path correction (single signal — no scope-shift offer): PLAN.md Phase 1.0 exit criterion 1 says 'docs/AGENT-CODEGEN.md' but the actual location is plugins/guild/docs/AGENT-CODEGEN.md (plugin-canonical). Wrote to the actual path; the PLAN path is pre-loom-adoption-era. Worth a revise-plan touch-up on the path string (cheap), or stand as a known equivalence. Not blocking U2/U3 — they reference the actual file.", "PR #106 (plan adoption) merged at 2026-05-28T08:28:13Z; branch fast-forwarded from 5cbcac4 onto post-merge main 424773c at the start of this session — clean, no replays needed.", "Decomposition adjustment (operator decision during /ev-loop-interactive Step 1): combined the originally-decomposed U3 (4 phase fragments) and U4 (6 personality fragments) into a single U3 (10 small files); the U4 slot now holds the fragment-schema test. Phase 1.0 lands as 4 deliverables: U1 (this) → U2 (12 domains) → U3 (4 phases + 6 personalities) → U4 (schema test)."]
