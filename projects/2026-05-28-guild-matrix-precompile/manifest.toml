contract = { goal = "Implement Phase 1.2's derive + resolve stages. derive walks recipes + singletons and produces the deterministic ordered list of Cells to emit. resolve reads the 3 source fragments for a Cell + computes the tool fold (verification phases get phase.base_tools ∪ domain.tool_grants; non-verification phases get phase.base_tools only).", acceptance_criteria = ["types.ts extended with Cell + ResolvedCell interfaces + DeriveError + ResolveError classes.", "derive.ts exports derive(data: AxesData): Cell[]. Cells come from recipes (one per recipe×domain) + singletons (one per singleton). Deterministic order. Duplicate cell ids throw DeriveError. Unsupported phase prefix (today: reviewer→evaluator, planner→whiteboard; implementer/researcher throw) throws DeriveError.", "derive.test.ts covers seed-based ordering + ID-shape + 3 error cases.", "resolve.ts exports resolve(data, cell, fragmentReader). fragmentReader is injected (relPath: string) => string for testability.", "resolve computes tool fold per verification-phase set ({reviewer, implementer}). Singletons (no domain) skip the fold and get phase.base_tools only.", "resolve.test.ts covers seed cells + minimal-data per-phase tool fold + 2 error cases.", "No edits to: axes.toml, scripts, fragment files, agents/, AGENT-CODEGEN.md, parse.ts, validate.ts. types.ts extension authorized for new types."], rules_applied = ["PLAN.md § Phase 1.2 exit criteria 4 (cross-product derive) + 5 (resolve fold).", "Phase-prefix convention from existing codegen: reviewer → evaluator, planner → whiteboard.", "Verification-phase definition: reviewer + implementer per existing codegen behavior (tools-map.toml § Phase posture).", "Fail-loud-on-duplicate substrate principle: dedup-without-asking is silent corruption; DeriveError on collision is the right shape.", "Injected fragmentReader keeps resolve pure-ish: real I/O lives in compile.ts (U4); tests use in-memory readers.", "Operator-approved tentative bundling: all 4 Phase 1.2 units in PR #121."], disqualifiers = ["Implementing compose / emit / compile.ts (U3-U4 scope).", "Wiring guild compile CLI verb (U4).", "Modifying axes.toml or the seed conversion artifacts.", "Adding new dependencies."], inputs = ["plugins/guild/axes.toml (seed; cells derived from its recipes + singletons; resolved with real fragments).", "PLAN.md § Phase 1.2 exit criteria 4-5.", "Existing types.ts (extended with new types).", "Existing parse.ts + validate.ts (consumed indirectly via tests parsing the seed; not modified)."] }
execution = { actions = ["Extended types.ts with Cell + ResolvedCell + DeriveError + ResolveError. Cell carries id, phase, personality, domain (null for singletons), source ('recipe' | 'singleton'), source_name. ResolvedCell extends Cell with phase_fragment / personality_fragment / domain_fragment (empty for singletons) / tools. Per-interface comments explain the phase-prefix mapping + singleton special-case.", "Wrote derive.ts (~85 lines): PHASE_PREFIX = {reviewer: evaluator, planner: whiteboard}; prefixForPhase throws DeriveError for missing prefix (with the actual phase name). derive() walks recipes in axes.toml order; for each recipe, emits one cell per declared domain with id = '<prefix>-<domain>'; maintains a `seen` Map for collision detection. Then walks singletons in axes.toml order; emits one cell per singleton with id = singleton.name (already pre-shaped). Order is deterministic: recipes-then-singletons; within recipe, declared domain order. Top-of-file comment documents the convention.", "Wrote derive.test.ts (8 it()s): 5 seed-based (deterministic via JSON.stringify equality; reviewer-default cells have phase=reviewer, personality=skeptic, id=evaluator-<domain>; planner cells have id=whiteboard-<domain>; singletons have domain=null and id=source_name; recipes-before-singletons via manual reverse-walk for findLastIndex compatibility — TS lib doesn't include es2023) + 3 error cases (unknown phase prefix via implementer recipe; duplicate cell from two recipes naming the same domain at the same phase; singleton id collides with a recipe-derived id).", "Wrote resolve.ts (~85 lines): VERIFICATION_PHASES = Set(['reviewer', 'implementer']); fragmentRelPath maps kind+name to plugins/guild/-relative path; dedupeAndSort uses Set + sort. resolve() looks up axis.phase + axis.personality (throws ResolveError if missing), reads phase + personality fragments via fragmentReader. For non-singleton cells (cell.domain !== null), looks up axis.domain (throws if missing), reads domain fragment, captures domain.tool_grants for the fold. For singletons, domain_fragment = '' and toolGrants = []. Tool fold: if cell.phase is verification (reviewer + implementer), tools = dedupeAndSort([base_tools, ...toolGrants]); else tools = dedupeAndSort([base_tools]).", "Wrote resolve.test.ts (10 it()s): 4 seed-based (evaluator-a11y resolves with grants including Bash test:a11y; whiteboard-react has just phase base_tools because planner is non-verification; whiteboard-skeptic singleton has domain=null + empty domain_fragment + phase base_tools; all seed cells produce sorted+deduped tools) + 4 per-phase tool fold via minimal in-memory data (reviewer + implementer fold domain grants; planner + researcher don't) + 2 error cases (cell.phase missing; cell.personality missing).", "Verified npm test: 983 passed (was 965 post-U1; +18 from this unit's 8 derive + 10 resolve = 18 new cases). 1 pre-existing failure (plan.real.test.ts:67 substrate flake; unchanged).", "Panel: evaluator-contract-fit (panel-spec-unreadable fallback), approved on first run. Panel surfaced one transparency observation about a self-corrected off-by-one in my test-count narration (claimed 9 derive cases, walked back to 8); the actual count is the right one, and the npm test total (983) matches the math. No findings flagged."], files_touched = ["plugins/guild/cli/verbs/guild/compile/types.ts", "plugins/guild/cli/verbs/guild/compile/derive.ts", "plugins/guild/cli/verbs/guild/compile/derive.test.ts", "plugins/guild/cli/verbs/guild/compile/resolve.ts", "plugins/guild/cli/verbs/guild/compile/resolve.test.ts"], corrections = [] }
