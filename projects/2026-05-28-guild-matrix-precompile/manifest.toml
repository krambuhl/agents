notes_for_pr = ["U3 of Phase 1.0. Normalizes 4 phase fragments + 5 personality fragments to U1's canonical sets. personality-base.md is exempt as documentation root per U1 spec. Cross-axis composition guidance dropped from the 4 phase fragments lands verbatim at plugins/guild/skills/guild-compile/composition-prelude.md, ready for Phase 2.1's fusion-prompt.md author to consolidate. 19 generated agents mechanically regen via guild generate; freshness gate green. Panel: evaluator-contract-fit, approved on first run.", "Scope-shift signal (recorded for posterity, single signal, no scope-shift offer): the contract for U3 added a new directory plugins/guild/skills/guild-compile/ before Phase 2.1 (which formally owns that skill) exists. The composition-prelude.md is genuinely Phase-1.0-scope (it preserves dropped content from the U3 phase normalizations), but its LOCATION anticipates Phase 2.1's skill layout. If Phase 2.1's planning revisits the skill's directory shape, the prelude is a small move; if Phase 2.1 lands as-planned, the prelude is already in the right place. Worth a one-line PR note for the U4 reviewer's awareness.", "Substrate flake (persisted from U1/U2): same plan.real.test.ts:67 failure. Unchanged through three units. The follow-up unit recommendation stands.", "Reviewer one-sentence carve-out (self-disclosed in execution.corrections): rename ## Output contract — verdict format → ## Output contract added 'The verdict format is one of two shapes.' as a body prefix. Panel confirmed in-AC. The em-dash-suffix-as-framing pattern appeared in only one phase fragment (reviewer); the remaining three (implementer, planner, researcher) had bare ## Output contract headings already. So this one-time minimal addition does not propagate.", "Phase 1.0 status (after U3): 3/4 units done. U4 — fragment-schema test — closes the phase. U4's scope: a vitest test under plugins/guild/ that walks plugins/guild/modes/{domains,phases}/*.md and plugins/guild/agents/personalities/*.md (except personality-base.md) and asserts each file exposes the canonical required headings for its axis in canonical order, with allowed optional headings at canonical positions, with no extra ## headings. The test should also clear the way for Phase 1.0's deletion of the migration tables in AGENT-CODEGEN.md once all rows read ✓ (U1's panel advisory + this unit's recurring observation).", "Migration map status update: 11 of 12 domain rows in U1's table now read effectively-✓; 4 of 4 phase rows effectively-✓; 5 of 5 personality rows effectively-✓. After U3 the only non-✓ entry is personality-base (exempt — informational, not a migration). The map's information value is now near-zero; U4 should consider deleting the three migration tables from AGENT-CODEGEN.md as a small cleanup step (consistent with U1's panel advisory + this unit's note).", "PR for U2 (#113) status not reconciled — last seen open at time of this checkin. Will surface in next session's /ev-run preflight if merged in the interim."]

