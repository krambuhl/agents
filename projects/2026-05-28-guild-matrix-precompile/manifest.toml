contract = { goal = "Wire guild compile as a CLI verb supporting partial-stage execution (--stage=parse,validate,derive,resolve emits JSON; --stage=emit consumes JSON). Closes the deferred Phase 1.2 U4 CLI gap + becomes the substrate the U3 /guild-compile skill drives.", acceptance_criteria = ["cli/guild.ts registers compile in VERBS + GUILD_VERBS.", "New cli/verbs/guild/compile-cli.ts exports compileVerb(rest, ctx). compile.ts refactored to expose compileThroughResolve + compileEmitOnly while keeping compile() as the full-pipeline entry.", "Default (no flags): full pipeline against plugins/guild/axes.toml (cwd-relative) + plugins/guild/agents/generated/.", "--stage=parse,validate,derive,resolve: stdout JSON {schema_version, cells: ResolvedCell[], cache_hits, cache_misses}.", "--stage=emit: stdin JSON {schema_version, agents: ComposedAgent[]}; writes files + .cache.toml; non-zero exit on malformed input.", "Flags: --axes-toml, --output-dir, --cache-toml all overridable with sensible defaults.", "compile-cli.test.ts covers full pipeline + through-resolve + emit-only + error cases.", "No changes to: axes.toml, scripts, fragment files, agents/ contents, AGENT-CODEGEN.md, or the 6 stage modules' core logic."], rules_applied = ["PLAN.md § Phase 2.1 exit criterion 1 — skill body shells out to `guild compile --stage=...` for parse..resolve then again for emit.", "Operator-approved 4-unit decomposition: U1 (CLI+stage), U2 (real dedup+prompt_hash), U3 (SKILL+fusion-prompt), U4 (--check+smoke).", "Operator-approved JSON shape: full ResolvedCell[] with fragment bodies (self-contained bundle for the skill).", "Verb-shape convention from existing cli/verbs/guild/: verb files export <name>Verb(rest, ctx): DispatchResult; index.ts maps verb names → handlers; cli/guild.ts VERBS table provides --help text.", "ESM-only imports via node: prefixes; matches the project-wide pattern (no @types/node; project-wide diagnostic noise is accepted)."], disqualifiers = ["Real compose dedup (U2).", "SKILL.md or fusion-prompt.md (U3).", "--check verb mode (U4).", "LLM fusion invocation (the skill drives it; CLI just bridges)."], inputs = ["Existing compile.ts orchestrator (refactored, not rewritten).", "6 stage modules (parse, validate, derive, resolve, compose, emit) — consumed but not modified.", "PLAN.md § Phase 2.1 exit criterion 1.", "Existing verb-dispatch convention from cli/verbs/guild/index.ts + derive-panel.ts (shape reference)."] }
execution = { actions = ["Refactored cli/verbs/guild/compile.ts: extracted compileThroughResolveCore() that runs parse → validate → derive → resolve + computes cache hit/miss buckets. compile() now delegates to it for the through-resolve portion then runs compose + emit. Two new exports: compileThroughResolve(opts) returns ThroughResolveResult ({resolved, cache_hits, cache_misses}); compileEmitOnly(opts) wraps emit(). All existing compile.test.ts assertions still pass — compile()'s external behavior unchanged.", "Wrote cli/verbs/guild/compile-cli.ts (~170 lines). parseArgs via node:util; three branches: --stage=parse,validate,derive,resolve → JSON stdout; --stage=emit → JSON stdin → writes; default (no --stage) → full pipeline. makeFragmentReader roots fragment reads at dirname(axesTomlPath) (the inferred pluginRoot). makeFileWriter uses node:fs writeFileSync + creates parent dirs via mkdirSync recursive. Error path returns {error, message} JSON on stderr with exitCode=1 for: bad-args (parseArgs throw), unknown-stage (unrecognized --stage), missing-stdin (empty stdin on --stage=emit), schema_version mismatch, malformed JSON, ENOENT (axes.toml not found — propagated as-is). parseEmitStdin validates schema_version === 1 + Array.isArray(agents); trusts agent array entries (emit() throws on malformed entries at write time).", "Updated cli/verbs/guild/index.ts: imports compileVerb; adds `compile: compileVerb` to GUILD_VERBS.", "Updated cli/guild.ts: added `compile: 'Run the multi-stage axes.toml → agents pipeline. --stage=<comma list> for partial execution...'` row to the VERBS help table.", "Wrote cli/verbs/guild/compile-cli.test.ts (~150 lines, 8 it()s). Sandbox helper: mkdtemp + copy real axes.toml + modes/* + agents/personalities/* into the tmpdir so the verb runs against real source material. Tests: 1 full-pipeline default (writes evaluator-a11y.md + .cache.toml); 1 through-resolve JSON stdout (cells, cache_hits, cache_misses; cell carries full fragments and tools); 4 emit-only cases (writes from valid JSON stdin; malformed JSON → error; missing stdin → missing-stdin error; wrong schema_version → error); 2 error cases (unknown --stage → unknown-stage; missing axes.toml → ENOENT).", "Discovered the substrate flake (plan.real.test.ts:67) was resolved by substrate-followups.real-test-resilience (visible in the git fetch output before the cherry-pick wasn't needed this time — the fix landed on main in the same merge wave as #124). The full test suite is now 1021 passing / 0 failures.", "Verified npx vitest run on compile-cli.test.ts: 1 file passed, 8 tests passed.", "Full npm test: 1021 passed / 0 failures (was 1013 passed + 1 pre-existing failure pre-Phase 2.1; the resolved flake removes the failure + this unit adds 8 new tests = 1021/1021).", "Panel: evaluator-contract-fit (panel-spec-unreadable fallback), approved on first run. Panel surfaced one transparency observation about literal-string matching on --stage (reordering the comma list would fall through to unknown-stage) — consistent with the contract's literal spec but worth flagging for future flexibility if needed."], files_touched = ["plugins/guild/cli/guild.ts", "plugins/guild/cli/verbs/guild/index.ts", "plugins/guild/cli/verbs/guild/compile.ts", "plugins/guild/cli/verbs/guild/compile-cli.ts", "plugins/guild/cli/verbs/guild/compile-cli.test.ts"], corrections = [] }
scope = []
changes_since_previous = "First unit of Phase 2.1 and the start of M2 (Voice fusion). Composes on M1's complete pipeline (parse + validate + derive + resolve + compose + emit + orchestrator + axes.toml). With this unit committed, the CLI surface the /guild-compile skill needs is in place: guild compile --stage=parse,validate,derive,resolve outputs a self-contained bundle; guild compile --stage=emit consumes the post-fusion bundle. Next: U2 — real compose dedup (replace v0 markers) + cache prompt_hash threading."
verdict = { result = "approved", reasons = [] }
notes_for_pr = ["U1 of Phase 2.1 (/guild-compile skill + LLM fusion). Ships the CLI surface — guild compile verb with --stage filter. The /guild-compile skill (U3) will drive this via the standard skill-shells-out-to-CLI pattern: --stage=parse,validate,derive,resolve produces the bundle; in-session LLM fusion happens in the skill; --stage=emit consumes the fused bundle. 8 new test cases.", "Substrate flake resolved: plan.real.test.ts:67 (the plan-real-test-from-archived-project flake that persisted across all of M1) was fixed by substrate-followups.real-test-resilience, which landed in the same merge wave as #124. The baseline is now 1021/1021 green. No more flake carry-forward.", "Stage-bridge JSON shape: through-resolve outputs {schema_version: 1, cells: ResolvedCell[], cache_hits: string[], cache_misses: string[]}. Each cell carries full phase/personality/domain fragment bodies (self-contained bundle). emit consumes {schema_version: 1, agents: ComposedAgent[]} with composed_body + source_hashes per agent. Round-trip tested: through-resolve → manually compose → emit produces correct file layout.", "Literal-string matching on --stage: '--stage=parse,validate,derive,resolve' is the exact accepted form; reordering or partial subsets fall through to unknown-stage. Matches the contract's literal spec; future flexibility (subset combinations, ordering tolerance) would be an additive change.", "Error semantics: all error paths return {error: <kebab-code>, message} JSON on stderr with exitCode=1. Codes: bad-args, unknown-stage, missing-stdin, schema_version (from parseEmitStdin), Error/SyntaxError (from JSON.parse), ENOENT (from fs reads). Compatible with the existing pattern in other guild verbs.", "compile.ts refactor: extracted compileThroughResolveCore() that compile() now delegates to; added compileThroughResolve + compileEmitOnly public exports. External behavior of compile() unchanged — verified by the full pre-existing test suite passing without modification."]

