notes_for_pr = ["U2 of Phase 1.2 (Multi-stage pipeline skeleton). Ships the derive + resolve stages — the data-assembly pair. 18 new test cases (8 derive + 10 resolve). Panel: evaluator-contract-fit, approved on first run.", "PHASE_PREFIX mapping in derive.ts: reviewer → evaluator, planner → whiteboard. Other phases (implementer, researcher) throw DeriveError when a recipe/singleton references them — PLAN doesn't yet name a prefix for those, and the current axes.toml doesn't instantiate them. Adding implementer support would mean picking a prefix (probably 'generator-' per PLAN's framing) + threading it through; defer to a later phase if cells appear.", "Fail-loud-on-duplicate substrate principle: dedupe-without-asking is silent corruption. derive throws DeriveError on cell-id collision rather than silently merging or dropping — both recipe-recipe and recipe-singleton collisions tested.", "Injected fragmentReader in resolve: keeps resolve pure-ish (no direct I/O coupling). Real fs.readFileSync lives in compile.ts (U4); tests pass in-memory closures. The reader's relPath is rooted at plugins/guild/.", "Verification phases: {reviewer, implementer} per existing tools-map.toml behavior. resolve.test.ts covers all 4 phases (verification + non-verification) via minimal in-memory data.", "PR #121 retitle pending — will reflect U1+U2 once committed; U3 and U4 will follow on the same branch per operator-approved bundling.", "Substrate flake (persisted): plan.real.test.ts:67 unchanged. Carry forward."]
