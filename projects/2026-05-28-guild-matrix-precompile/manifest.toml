contract = { goal = "Replace v0 heading-collision-marker compose with real identical-line dedup (mechanical, deterministic) and thread prompt_hash through the cache entry shape + isCacheHit comparison + .cache.toml shape + readCache + CLI flag so a future fusion-prompt change invalidates every cell. Plumbing only — no SKILL.md, no fusion-prompt.md content, no --check, no LLM fusion.", acceptance_criteria = ["compose.ts emits identical-line dedup: a line (after trim) appearing verbatim in 2+ fragments is emitted only in its first-occurring section (phase > personality > domain ordering) and dropped from the others. `## Heading` lines themselves participate in the same rule — a shared heading is emitted in its first-occurring section, body lines under it are independently deduped.", "compose.ts emits richer dedup-candidate annotations: when at least one line was dropped from a fragment, emit `<!-- DEDUP: dropped N line(s) from <axis> (also present in <axis-list>) -->` just above that fragment's section marker. v0's heading-only marker shape is replaced by this line-level shape.", "ComposeError stays unused for dedup (dedup is best-effort, never throws). Empty fragments after dedup still emit their @section marker and the marker comment naming the drop count, so the bundle shape is uniform.", "CacheEntry type (types.ts) gains `prompt_hash: string` field, sitting alongside source_hashes (not inside it — source_hashes stays the three-fragment shape).", "compileThroughResolveCore / compileThroughResolve / compile accept a `promptHash: string` parameter in their options interfaces. Empty string is allowed and is the default sentinel.", "isCacheHit (compile.ts) compares the entry's prompt_hash against the caller's promptHash; mismatch = miss. Legacy cache entries (no prompt_hash field) read as empty-string and match an empty-string caller (so existing .cache.toml stays valid until U3 ships a real prompt).", "emit.ts writes `prompt_hash` into each .cache.toml `[[cells]]` entry as a string field. readCache (compile.ts) reads it; absence → empty string.", "compile-cli.ts accepts a new `--prompt-hash <hex>` flag, forwarded to compile() / compileEmitOnly. Default: empty string. The --stage=parse,validate,derive,resolve JSON stdout shape adds `prompt_hash` to the top-level. The --stage=emit JSON stdin shape adds `prompt_hash` to the top-level; the flag overrides stdin when both are supplied.", "compose.test.ts updated: existing tests preserved where still applicable; new tests cover identical-line dedup (cross-fragment shared bullet → emitted once); new annotation shape (`DEDUP: dropped N`); first-occurring-section ordering (phase wins over personality wins over domain). v0 heading-only dedup tests rewritten to assert the new line-level shape.", "emit.test.ts updated: prompt_hash round-trips through .cache.toml (write + parse-back); legacy cache entry without prompt_hash reads as empty string.", "compile.test.ts updated: identical sources + same promptHash → cache_hit; identical sources + different promptHash → cache_miss; empty-string promptHash matches empty-string entry (legacy compat).", "compile-cli.test.ts updated: --prompt-hash flag accepted on full pipeline and --stage=emit; missing flag defaults to empty; through-resolve JSON stdout includes prompt_hash; emit-only JSON stdin reads prompt_hash."], rules_applied = ["Operator-approved 4-unit decomposition from U1 checkin: U1 done; U2 = real dedup + prompt_hash; U3 = SKILL + fusion-prompt; U4 = --check + smoke.", "Operator-approved dedup shape: identical-line only (mechanical, deterministic). Semantic overlap stays for the LLM to fuse.", "Operator-approved annotation shape: richer line-overlap markers replace v0 heading-collision markers as fusion annotations.", "Operator-approved prompt_hash fallback: empty-string sentinel when --prompt-hash isn't passed; first run after U3 lands is a global cache miss (acceptable per PLAN's prompt-edit-invalidates-all-cells caveat).", "PLAN.md § Phase 2.1 exit criterion 2: prompt hash is part of every cell's cache entry — changing the prompt invalidates all caches.", "Cache-shape evolution discipline from emit.ts header comment: prompt-hash inclusion was always slated for Phase 2.1.", "Verb-shape convention: --prompt-hash is forwarded as a string from compile-cli to the orchestrator; CLI does not read fusion-prompt.md (that's U3's plumbing)."], disqualifiers = ["SKILL.md content (U3).", "fusion-prompt.md content (U3).", "LLM fusion invocation or any Skill-tool wiring (U3).", "--check verb mode (U4).", "Smoke test that re-running /guild-compile is a no-op (U4).", "Semantic-overlap dedup, paraphrase detection, or any non-identical-line collapse (out of scope for U2's mechanical definition).", "Changes to the 4 non-compose stage modules (parse, validate, derive, resolve) beyond signature changes for promptHash threading.", "Changes to axes.toml, fragment files, AGENT-CODEGEN.md, or any agents/ contents.", "Re-emitting the agents/generated/ tree (that lands in 2.2 Big-bang, not 2.1)."], inputs = ["plugins/guild/cli/verbs/guild/compile/compose.ts (v0 dedup, replaced).", "plugins/guild/cli/verbs/guild/compile/types.ts (CacheEntry, ComposedAgent, SourceHashes).", "plugins/guild/cli/verbs/guild/compile/emit.ts (.cache.toml writer; reads and writes the cache entry shape).", "plugins/guild/cli/verbs/guild/compile.ts (orchestrator: readCache, isCacheHit, compileThroughResolveCore).", "plugins/guild/cli/verbs/guild/compile-cli.ts (CLI verb: --stage flag, JSON stdin/stdout shapes).", "Tests co-located with each source file (compose.test.ts, emit.test.ts, compile.test.ts, compile-cli.test.ts).", "PLAN.md § Phase 2.1 exit criteria 1-2.", "U1 checkin (guild-matrix-precompile.compile-skill #01) for the operator-approved JSON shape conventions."] }
execution = { actions = ["Added CacheEntry.prompt_hash to types.ts as a top-level string field (sibling of source_hashes). Doc-comment updated to record the U2/U3 lifecycle: U2 ships plumbing with empty-string default; U3 wires real fusion-prompt.md hashing.", "Rewrote compose.ts. Introduced AXIS_ORDER = ['phase', 'personality', 'domain'] and Axis type. New dedupFragments(cell): builds a line → axes presence map, then per axis filters out lines whose presence set has size >= 2 unless this axis is the first-occurring axis in AXIS_ORDER (the owner). Returns deduped bodies + per-axis drop count and sharedWith axis list. New dedupAnnotation(axis, drop) emits the line-level DEDUP marker or null. compose() composes frontmatter + provenance + per-axis sections in personality/phase/domain emit order (preserving v0 bundle shape; ownership is a separate ordering). Empty axes after dedup still emit @section marker + annotation. Singletons (null domain) still skip the domain section entirely.", "Added promptHash threading to compile.ts. CompileOptions, ThroughResolveOptions, EmitOnlyOptions all accept optional promptHash: string. compileThroughResolveCore reads opts.promptHash ?? '' and threads to isCacheHit. compile() forwards to emit(). compileEmitOnly() forwards to emit(). isCacheHit now compares entry.prompt_hash against the caller's promptHash in addition to source hashes. readCache reads prompt_hash from each [[cells]] entry; absence or non-string → empty string (legacy compat).", "Added promptHash parameter to emit.ts emit() function (default empty string). Each cache_entries entry records prompt_hash; emitCacheToml writes prompt_hash per [[cells]].", "Added --prompt-hash flag to compile-cli.ts OPTIONS. Threaded through full-pipeline + through-resolve + emit-only paths. Through-resolve JSON stdout grows top-level prompt_hash field (skill can echo it back on --stage=emit). Emit-only stdin parseEmitStdin reads optional top-level prompt_hash. The --prompt-hash flag overrides the stdin value when both are supplied; otherwise stdin wins.", "Rewrote compose.test.ts dedup section: removed v0 DEDUP-candidate marker tests. Added 6 new tests under `compose: identical-line dedup` covering shared-line scenarios, three-way overlap, no-overlap, heading-line dedup, and blank-line preservation.", "Added `emit: prompt_hash` describe block to emit.test.ts with 2 tests (writes promptHash; defaults to empty). Updated existing cache-entry shape test to include prompt_hash.", "Added `compile: prompt_hash threading` describe block to compile.test.ts with 4 tests (same/different/empty promptHash hit/miss; legacy cache entry without prompt_hash field reads as empty string and matches empty-string caller).", "Added compile-cli.test.ts tests: full-pipeline --prompt-hash flag threads to .cache.toml; through-resolve echoes prompt_hash on stdout (default and explicit); emit-stage reads top-level prompt_hash from stdin; --prompt-hash flag overrides stdin; both absent → empty string default.", "Smoke-ran the real CLI against the seed axes.toml with --prompt-hash=smoke. All 19 cells emitted, all .cache.toml entries carry prompt_hash, zero DEDUP annotations fired (expected — Phase 1.0's disjoint heading sets give no identical-line overlap in current sources).", "Test suite: 1036/1036 passing (66 test files). Baseline pre-U2 was 1021 — +15 net new tests."], files_touched = ["plugins/guild/cli/verbs/guild/compile/compose.ts", "plugins/guild/cli/verbs/guild/compile/compose.test.ts", "plugins/guild/cli/verbs/guild/compile/types.ts", "plugins/guild/cli/verbs/guild/compile/emit.ts", "plugins/guild/cli/verbs/guild/compile/emit.test.ts", "plugins/guild/cli/verbs/guild/compile.ts", "plugins/guild/cli/verbs/guild/compile.test.ts", "plugins/guild/cli/verbs/guild/compile-cli.ts", "plugins/guild/cli/verbs/guild/compile-cli.test.ts"], corrections = [] }
scope = ["plugins/guild/cli/verbs/guild/compile/compose.ts", "plugins/guild/cli/verbs/guild/compile/compose.test.ts", "plugins/guild/cli/verbs/guild/compile/types.ts", "plugins/guild/cli/verbs/guild/compile/emit.ts", "plugins/guild/cli/verbs/guild/compile/emit.test.ts", "plugins/guild/cli/verbs/guild/compile.ts", "plugins/guild/cli/verbs/guild/compile.test.ts", "plugins/guild/cli/verbs/guild/compile-cli.ts", "plugins/guild/cli/verbs/guild/compile-cli.test.ts"]
changes_since_previous = "U1 (guild-matrix-precompile.compile-skill #01) landed the guild compile CLI verb + --stage filter. U2 builds on that scaffold by (a) replacing v0 heading-collision-marker dedup with real identical-line dedup in compose.ts, and (b) threading prompt_hash through the full pipeline (types, orchestrator, emit, CLI) so a future fusion-prompt edit invalidates every cell's cache. U2 is the last plumbing step before U3 wires SKILL.md + fusion-prompt.md + the LLM fusion call."
verdict = { result = "approved", reasons = ["evaluator-contract-fit: approved — spot-checked dedupFragments mechanism (AXIS_ORDER ownership), annotation shape, empty-section emission. All 12 acceptance criteria mapped. No disqualifiers in scope. Original-ask alignment confirmed (PLAN § 2.1 exit criteria 1-2 partial coverage; U3 lands the rest).", "evaluator-react-api: approved — no React/JSX surface area in this artifact. Non-applicable.", "evaluator-test-unit: approved — new dedup tests are well-shaped: descriptive names, synchronous, no mocking, specific assertions, no .only/.skip, no snapshot abuse. One non-flagging note on three-way-overlap regex tolerance (intentional, decoupled from alphabetization).", "evaluator-naming: approved — local consistency (AXIS_ORDER ~ PHASE_ROLE; dedupFragments / dedupAnnotation ~ roleForPhase / frontmatter / sha256), cross-file naming (snake_case at TOML/cache persistence; camelCase TS options; kebab-case CLI flags) all match existing conventions. One non-flagging observation on AXIS_ORDER doubling as ordering + canonical list (current usage is unambiguous via local emitOrder)."] }
notes_for_pr = ["U2 implements two surface-disjoint Phase 2.1 capabilities: real identical-line dedup in compose.ts (mechanical, deterministic; semantic overlap deferred to LLM fusion in U3), and prompt_hash plumbing through the cache pipeline so the U3 fusion-prompt.md hash invalidates cells when it changes.", "Zero DEDUP annotations fire against current seed sources — Phase 1.0's disjoint heading sets prevent identical-line overlap in practice. The mechanical dedup is a safety net for future fragment authors who might accidentally share text.", "Legacy .cache.toml files (pre-U2 shape with no prompt_hash field) stay valid: readCache treats absence as empty string, which matches the empty-string default from a pre-U3 caller. First run after U3 ships will be a global cache miss as the prompt_hash becomes non-empty — that is the operator-approved behavior per PLAN's prompt-edit-invalidates-all caveat.", "Panel verdict: approved unanimously (contract-fit, react-api [non-applicable], test-unit, naming). No blocking findings, no advisory findings."]

