notes_for_pr = ["U4 of Phase 1.0 (Rewrite fragments as labeled-section markdown). FINAL unit — closes Phase 1.0. Ships plugins/guild/fragment-schema.test.ts (22 new test cases asserting canonical heading-set conformance across all 22 fragment files) + deletes the migration-map tables from AGENT-CODEGEN.md (rolled in per U1's panel advisory now that every row reads ✓) replacing them with a short Enforcement subsection pointing at the new test. Panel: evaluator-contract-fit, approved on first run.", "Lagged pr-merged event for #113 (U2+U3 bundle PR) — merged at the GitHub web UI just before this unit's execution (signaled in-session as 'pr 113 is merged'). No bin/loom pr merge verb today (per /ev-run § PR-merged reconciliation, loom emits pr-merged only from explicit reconciliation, not via a CLI verb). This checkin's notes_for_pr is the substrate trace.", "Substrate flake (persisted from U1-U3): plan.real.test.ts:67 substrate-consolidation flake unchanged across the entire phase. Worth its own tiny follow-up unit in a separate phase / session: either update the test to read from projects/archive/, parameterize the project path, or delete the test if the substrate-consolidation PLAN no longer carries the structural facts the test asserts. Substrate-flake follow-up has been carried in every U1-U4 checkin and should now graduate to a tracked work item.", "Panel advisory observation (non-blocking, theoretical): assertConforms() doesn't catch the case where a fragment repeats a required heading twice in the same canonical slot (e.g. two ## Scope sections back-to-back). Today no fragment does this, but if Phase 2.1's LLM-driven fusion ever produces duplicate-heading output, the test won't catch it. Two ways to harden in a follow-up: (a) assert no duplicates by checking allHeadings.length === new Set(allHeadings).size, (b) assert exact required-set membership rather than presence-in-order via filter. Not load-bearing today; surfacing as a Phase 2.1 / Phase 2.2 readiness consideration.", "Phase 1.0 closes: status update to completed should land via `loom phase update guild-matrix-precompile 1 --status=completed`. The next /ev-run will see Phase 1.1 (axes.toml schema) as the next actionable phase. Phase 1.1 doesn't depend on Phase 1.0 in PLAN.md, but the canonical-fragment shape Phase 1.0 produced is the substrate Phase 1.1's axes.toml will reference.", "Composition prelude (carried from U3): plugins/guild/skills/guild-compile/composition-prelude.md now sits committed and waiting for Phase 2.1's fusion-prompt.md author. Phase 2.1's first deliverable will read it as input.", "Substrate-hygiene signal (carried from U2/U3): the installed guild CLI cache returning 'unknown verb: generate' surfaced again, expected. Phase 3.1 retro should note: either tighten Tier 2 to probe guild's verb completeness, or document the repo-local fallback expectation more loudly in /ev-loop-interactive's preflight.", "Test count math: pre-U4 baseline was 805 passed (per U3's checkin) + ~24 from the ffaf95b sibling merge (loom-adr.skill-and-dogfood + others) = ~829 = 806 + 22. Final post-U4: 828 passed + 1 failing = 829 reported tests. The 22 new cases land cleanly; no regressions in any sibling test."]

