ing new test files (Phase 2.1 U4's smoke tests already cover the substrate; U2 is the live execution + commit)."], inputs = ["plugins/guild/skills/guild-compile/SKILL.md (U3 — the operational runbook this unit executes).", "plugins/guild/skills/guild-compile/fusion-prompt.md (U3 — the LLM-fusion template).", "plugins/guild/agents/personalities/personality-base.md (read by the skill as opening framing for each fusion).", "plugins/guild/modes/phases/{reviewer,planner}.md (phase fragments; one per cell).", "plugins/guild/agents/personalities/{skeptic,methodical,synthesizer,generative}.md (personality fragments; one per cell).", "plugins/guild/modes/domains/*.md (12 domain fragments; one per recipe-cell).", "plugins/guild/axes.toml (the data model the through-resolve stage reads to derive the 19 cells).", "Phase 2.1 U2 cache-shape: source_hashes + prompt_hash + output_hash + fused_at.", "Phase 2.1 U4 --check verb: post-emit verification that all drift is zero."] }
