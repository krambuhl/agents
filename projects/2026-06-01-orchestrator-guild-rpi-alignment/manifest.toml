contract = { goal = "Add a per-unit implementer-delegation switch to both ev-loops (skill-body only): when ON, the Execute step composes implementer-<domain> via derive-panel --phase=implementer and delegates the write through /guild-spawn. ev-loop-interactive defaults OFF (pairing preserved; opt a unit in); ev-loop-confidence defaults ON (opt a unit out). The evaluator checkpoint fires regardless. Update both Specialist sections to retract the 'no control-flow change' claim for the write side (full prose deletion deferred to Phase 6).", acceptance_criteria = ["ev-loop-interactive Execute step: switch documented, default OFF; opt-in composes implementer-<domain> via Bash(guild derive-panel --phase=implementer) + /guild-spawn (NOT a direct Agent call)", "ev-loop-confidence Execute step: same switch, default ON; opt-out to inline transform", "Switch state recorded per unit in the checkin's existing notes_for_pr; no new schema field, no PLAN.md parse change", "The evaluator checkpoint fires in both loops regardless of switch state (delegation changes who writes, not whether it's gated)", "Both Specialist-evaluator gate-then-review sections retract the 'no control-flow change' claim for the write side and note full deletion lands in Phase 6", "Skill-body tests for per-loop defaults + the delegation mechanism + checkpoint-fires-regardless; bare-command (V11); npm test + check green"], rules_applied = ["Composition over configuration / high-and-low abstractions: delegation is an OPTION reached for per unit, not a forced rewrite — interactive keeps inline drive (the escape hatch) as default", "Incrementalism: skill-body-only switch (operator-approved surface) — no loom checkin-schema or PLAN.md-parse change, staying within the PLAN's stated Files", "Naming/consistency: the same switch shape + mechanism (derive-panel --phase=implementer -> /guild-spawn) across both loops, defaults differing per loop character", "Deliberate seams: route the delegated write through /guild-spawn, not the in-scope Agent tool — loom/ev loops compose guild coordination skills by design"], disqualifiers = ["forcing delegation as the only path (interactive must keep inline drive as default — it's an option)", "removing or bypassing the evaluator checkpoint when delegating", "a direct Agent call for the delegated write instead of /guild-spawn", "touching the loom checkin schema or PLAN.md parse (out of scope per the surface decision)", "bin/guild or node-path in the new skill-body invocations (breaks V11); editing commons/"], inputs = ["plugins/ev/skills/ev-loop-interactive/SKILL.md:203-300 (unit loop + Execute), 703-723 (Specialist section)", "plugins/ev/skills/ev-loop-confidence/SKILL.md:287-386 (unit loop + Execute), 469-486 (Specialist section)", "derive-panel --phase=implementer (shipped Phase 1)", "/guild-spawn (the delegation runner); plugins/guild/modes/axes.toml implementer domains"] }
