notes_for_pr = ["Both ev-loops gain a per-unit implementer-delegation switch: ON composes implementer-<domain> via guild derive-panel --phase=implementer and delegates the write through /guild-spawn (not a direct Agent call, though Agent is in allowed-tools — the guild-coordination seam is deliberate). interactive defaults OFF (keystroke-level pairing intact, opt a unit in); confidence defaults ON (opt a tier/unit out).", "Delegation changes WHO writes, never WHETHER the unit is gated: the evaluator checkpoint fires regardless of switch state.", "Switch surface is skill-body-only per operator decision: per-loop default + per-unit operator opt-in recorded in the checkin's existing notes_for_pr. No loom checkin-schema field, no PLAN.md-parse change.", "Both 'Specialist gate-then-review' sections retract the 'no control-flow change' claim for the write side (it's real wiring now); the remaining prose is slated for deletion in Phase 6.", "While no implementer-* agents are registered (registry-mirror lag), opting in falls back to inline drive with a note. The live-spawn proof of implementer-* is the Phase 6 runtime gate.", "signal: phase-boundary: single-unit Phase 4, last unit (single signal; no revise offered). Phase 4 code-complete pending PR merge; unblocks Phase 5 (fixer delegation, shares this switch shape)."]

