notes_for_pr = ["Schema change: Result.recusals[] REPLACED by Result.agent_signals[] (one {agent, confidence, outcome: gated|recused|operator-judgment, reason} per agent). Recusal is now one outcome value (the literal 'generalize recusals into it'). Per-agent confidence rides on every agent. Verified no .ts consumer read the old Result.recusals field; guild-validate SKILL.md's recused-event loop updated to read agent_signals.", "operator-judgment-required is the HIGHEST-precedence verdict (operator-approved): any agent escalating means the panel cannot auto-gate. Blocking findings still surface in their list under the OJR headline.", "Escalation wire format is uniform: a reviewer pairs VERDICT: operator-judgment-required with an Escalation: line; write phases emit only the line. EITHER routes to operator-judgment, and an Escalation line DOMINATES a contradictory verdict line.", "DEFERRED by design (per PLAN): the cross-stage confidence COMPARISON (implementer->reviewer->fixer) and the loop-layer ROUTING of operator-judgment-required to a human. This unit makes the outcome + per-agent signal EXIST so those consumers can be built without re-touching the verb. Schema round-trip test guards the seam.", "Declined design point (naming advisory): AgentSignal.reason is a single field disambiguated by outcome rather than a discriminated union — the simpler shape, and outcome already discriminates."]

