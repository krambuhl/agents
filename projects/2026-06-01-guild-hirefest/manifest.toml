notes_for_pr = ["D4 fold-in: the implementer and fixer output contracts ALREADY existed and were ALREADY distinct on disk (implementer.md / fixer.md), both already no-self-verdict. PLAN's D4 ('define the distinct contracts') was ~80% shipped; this unit added only the confidence/escalation field + a distinctness test rather than rebuilding. Decomposition fork resolved with the operator (D4 folded into D1, 6 units -> 5).", "Compiled-level body-shape assertion ('every compiled agent carries Constraints/Escalation') is deferred to Phase 1 Unit 5 (recompile) BY DESIGN: agents/*.md only regenerate at recompile, so a compiled-level test would be red until then. Unit 1's test is source-level (fragments + fusion-prompt). fusion-prompt now mandates the headings verbatim so the Unit-5 test has stable anchors.", "Design decisions this session: (1) confidence is a high|medium|low ENUM, not a numeric score (false-precision + parse-fragility); (2) Constraints/Escalation live IN the phase fragments (authorization is a phase property), not fusion-prompt-only or a new shared fragment type.", "Reviewer escalation shape: a new VERDICT: operator-judgment-required token (operator-approved this approach). Write phases (implementer/fixer/planner/researcher) signal escalation with the uniform Escalation: <reason> line. parse-and-aggregate (Unit 2) will consume both.", "No recompile triggered: the fusion-prompt + fragment edits change prompt_hash/source_hashes, so the whole roster will cache-miss at Unit 5's /guild-compile. Deliberately deferred."]

