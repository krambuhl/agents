schema_version = 1

# tools-map: the least-privilege tool allowlist for every generated
# agent, expressed as a fold rather than a 4x12 matrix.
#
# Resolution (Phase 5 `guild generate` applies this):
#
#   agent.tools = phase.<phase>.base  UNION  domain.<domain>.grants
#
# where domain grants apply only at the phases that run verification
# (reviewer, implementer); researcher and planner get the phase base
# alone. The set is deduped; order is normalized by codegen.
#
# NO PERMISSIVE DEFAULT. Two rules the next author must not "helpfully"
# soften:
#   1. Every phase a combination names in panel.manifest.toml MUST have
#      a [phase.<phase>] row here. A missing phase is a generate-time
#      ERROR (fail loud) — never a silent empty/permissive fallback.
#   2. Absence of a [domain.<domain>] row means "phase base only" — the
#      intended state for grep-only domains (css-architecture, naming)
#      and the design-only domains. Absence is a default, not an error.
#      Grants are append-only relative to the phase base: a domain adds
#      Bash, it never removes a base tool.

# ---- Phase posture: the base tool floor per phase ----
# Read-only phases get the inspection trio. Implementer adds write
# capability plus the self-verification quartet so it can leave its
# work checkable. `writes` is the load-bearing least-privilege flag:
# a reviewer agent carries no Write at all.

[phase.researcher]
base = ["Read", "Glob", "Grep"]
writes = false

[phase.planner]
base = ["Read", "Glob", "Grep"]
writes = false

[phase.reviewer]
base = ["Read", "Glob", "Grep"]
writes = false

[phase.implementer]
base = ["Read", "Glob", "Grep", "Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)", "Edit", "Write"]
writes = true

# ---- Domain Bash grants (additive, reviewer + implementer) ----
# Grounded in the baked evaluators' empirical `tools:` lines. A domain
# appears here only if running a command adds signal in its lens. The
# grant is applied at the reviewer phase (matching the baked evaluator
# exactly) and mirrored at the implementer phase (an implementer in the
# domain self-verifies with the same command).
#
# Domains NOT listed inherit the phase base only:
#   - css-architecture: grep-only reviewer lens (its baked evaluator
#     carries Read/Glob/Grep and no Bash — matched here by absence).
#   - composition, abstraction, performance, substrate: design-phase
#     domains with no reviewer cell; planner/researcher base is the
#     whole story.
#
# naming is NOT base-only: although it has no dedicated CLI signal
# (grep + manual inspection), its baked evaluator deliberately carries
# Bash(lint)/Bash(build)/git "so the evaluator can confirm the artifact
# still builds and lints" (per evaluator-naming.md's own rubric). The
# grant is intentional, so naming is listed below to match the baked
# tools exactly.

[domain.a11y]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm run test:a11y:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[domain.nextjs]
grants = ["Bash(npm run lint:*)", "Bash(npm run lint:nextjs:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[domain.react]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[domain.tokens]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[domain.test-unit]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm test:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[domain.test-integration]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm run test:e2e:*)", "Bash(git status:*)", "Bash(git diff:*)"]

# naming has no dedicated CLI signal but its baked evaluator carries the
# generic build/lint/git grants to confirm the artifact still builds and
# lints (see the header note). No test:* grant — naming runs no test.
[domain.naming]
grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]
