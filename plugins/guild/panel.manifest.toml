schema_version = 1

# panel.manifest.toml: the (personality x domain x phase) combinations
# `guild generate` (Phase 5) emits as scoped agent files. This is the
# NEEDED set that reproduces today's roster — NOT the full 5x12x4=240
# cross-product. Codegen reads this file first, then resolves each
# combination's prose (personality + phase + domain fragments) and its
# tools (tools-map.toml), and writes one agent file per combination.
#
# Two things are deliberately NOT generated combinations:
#   - contract-fit: retained hand-authored (the one principled
#     exception — the always-on baseline reviewer is a panel-composition
#     role, not a personality x domain). See [retained] below.
#   - sketch-ideation: a project-local (aart.camp) domain, generated via
#     the off-rails escape hatch from a project-local source, not a core
#     combination here.
#
# Per-domain valid-phase sets are encoded by which combinations list a
# domain: performance and substrate appear ONLY at planner (no reviewer
# cell — their baked sources are design-phase whiteboard engineers, and
# substrate's source states outright there is no substrate evaluator).
# composition and abstraction appear only via the design-systems recipe
# at planner. Codegen MUST NOT invent a reviewer combination for a
# domain that has none here.

# ---- Reviewer combinations (replace the baked evaluator-* agents) ----
# The reviewer phase is skeptical-by-default, and the baked evaluators
# are uniformly skeptical, so every reviewer combination uses the
# skeptic personality. These eight are exactly the domain evaluators in
# PANEL-COMPOSITION.md (contract-fit excluded — it is retained).

[[combinations]]
phase = "reviewer"
personality = "skeptic"
domains = ["a11y", "react", "naming", "tokens", "test-unit", "test-integration", "css-architecture", "nextjs"]

# ---- Planner combinations (replace the baked whiteboard-* engineers) -
# Personality is mapped per-agent from each engineer's disposition:
#   - whiteboard-performance, whiteboard-substrate-engineer -> methodical
#     (analytical, systematic design voices).
#   - whiteboard-react-architect, whiteboard-testing-strategy ->
#     synthesizer (reconcile API shape / tier choices into a coherent
#     whole).
#   - whiteboard-a11y -> generative (design-for-inclusion-from-the-start
#     widens the design space). [authored pick; the operator endorsed
#     per-agent mapping but left a11y unstated — flagged for review.]

[[combinations]]
phase = "planner"
personality = "methodical"
domains = ["performance", "substrate"]

[[combinations]]
phase = "planner"
personality = "synthesizer"
domains = ["react", "test-unit", "test-integration"]

[[combinations]]
phase = "planner"
personality = "generative"
domains = ["a11y"]

# whiteboard-skeptic is the skeptic personality at the planner phase,
# domain-agnostic in the current whiteboard (it pressure-tests whatever
# the brief proposes). It is NOT enumerated as a fixed (skeptic x domain
# x planner) row because it has no fixed domain. Phase 5 resolves whether
# codegen emits a skeptic x <each-design-domain> x planner set or a
# personality-led planner agent that takes the brief's domain at
# dispatch. Recorded here as an open Phase-5 codegen-shape question.

# ---- Recipes (named multi-domain co-dispatch at a phase) ----
# A recipe is a named planner-phase panel spanning several domains under
# one personality. design-systems is a co-dispatch of the four
# vocabulary/structure domains at planner — NOT a 13th domain, because
# it has no antipattern catalog of its own beyond those four. This is
# where composition + abstraction get their planner combinations.

[[recipes]]
name = "design-systems"
phase = "planner"
personality = "generative"
domains = ["composition", "abstraction", "tokens", "naming"]

# ---- Retained hand-authored agents (NOT generated) ----
# contract-fit is the always-on baseline reviewer — a panel-composition
# role, not a personality x domain combination. It stays hand-authored
# at plugins/guild/agents/evaluator-contract-fit.md, the one principled
# exception to the axis collapse.

[retained]
hand_authored = ["contract-fit"]
