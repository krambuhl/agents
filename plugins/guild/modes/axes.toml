schema_version = 1

# axes.toml — declarative cross-product source for guild's antagonist
# panel. Replaces panel.manifest.toml + tools-map.toml; generated by
# scripts/convert-to-axes.ts (Phase 1.1 U1 of guild-matrix-precompile)
# and seed-committed. Phase 1.2's pipeline reads this file; Phase 2.2
# deletes the conversion script + the legacy TOMLs and this becomes
# the long-term source.

# ---------- axis: domain (12) ----------
# Each domain declares which phases it occupies plus the Bash tool
# grants it adds at verification phases (reviewer + implementer).
# Empty tool_grants = phase base only.

[axis.domain.a11y]
phases = ["research", "plan", "reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm run test:a11y:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.abstraction]
phases = ["research", "plan"]
tool_grants = []

[axis.domain.composition]
phases = ["research", "plan"]
tool_grants = []

[axis.domain.css-architecture]
phases = ["reviewer", "implementer", "fixer"]
tool_grants = []

[axis.domain.naming]
phases = ["research", "plan", "reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.nextjs]
phases = ["reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run lint:nextjs:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.performance]
phases = ["research", "plan"]
tool_grants = []

[axis.domain.react]
phases = ["research", "plan", "reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.substrate]
phases = ["research", "plan"]
tool_grants = []

[axis.domain.test-integration]
phases = ["research", "plan", "reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm run test:e2e:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.test-unit]
phases = ["research", "plan", "reviewer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(npm test:*)", "Bash(git status:*)", "Bash(git diff:*)"]

[axis.domain.tokens]
phases = ["research", "plan", "reviewer", "implementer", "fixer"]
tool_grants = ["Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)"]

# ---------- axis: personality (5) ----------
# Each personality declares which phases the voice currently has
# at-least-one cell at, plus the disposition excerpt (first
# paragraph of the fragment's ## Disposition section) for LLM
# fusion input. pragmatist is instantiated at implementer and fixer —
# the implementer-default and fixer-default recipes name it for the
# css-architecture proof domain, matching both write-capable phases'
# pragmatist default_personality.

[axis.personality.generative]
phases = ["plan"]
disposition = "You expand. Your instinct is to find the options nobody listed yet, the more expressive structure, the approach from a different angle. Where critical personalities narrow toward a judgment, you widen toward possibility. You make the design space bigger before anyone collapses it."

[axis.personality.methodical]
phases = ["research", "plan"]
disposition = "You are systematic. You work through the full catalog, every criterion, every sibling case, in order, without skipping. Where the skeptic finds the one sharp flaw fast, you find all of them by leaving nothing unexamined. Completeness is your contribution."

[axis.personality.pragmatist]
phases = ["implementer", "fixer"]
disposition = "You decide. Your instinct is to find the simplest thing that works and reads well, ship it, and move on. You separate what's load-bearing from what's cosmetic and spend judgment only on the former. \"Good enough for now\" is a real answer when it's honestly true."

[axis.personality.skeptic]
phases = ["plan", "reviewer"]
disposition = "You doubt by default. Your instinct is to find what's wrong, what breaks, what was assumed without evidence. You pressure-test; you do not validate. An idea that survives you is stronger for it."

[axis.personality.synthesizer]
phases = ["plan"]
disposition = "You integrate. Your instinct is to take competing constraints, contradictory perspectives, and partial positions, and find the coherent shape that honors what matters in each. Where generative widens and pragmatist picks one, you find the structure that reconciles. You seek cohesion always."

# ---------- axis: phase (5) ----------
# Each phase declares its base tool floor, write capability, and
# default_personality (forward-looking metadata — the personality
# that leads a hypothetical recipe at this phase if not explicitly
# named). Rationale for each default is the trailing comment.

[axis.phase.research]
base_tools = ["Read", "Glob", "Grep"]
writes = false
default_personality = "methodical"  # leave nothing unexamined maps to methodical's exhaustive evidence-gathering disposition

[axis.phase.plan]
base_tools = ["Read", "Glob", "Grep"]
writes = false
default_personality = "synthesizer"  # reconcile competing constraints into one coherent plan maps to synthesizer's disposition

[axis.phase.reviewer]
base_tools = ["Read", "Glob", "Grep"]
writes = false
default_personality = "skeptic"  # matches existing panel.manifest.toml — every reviewer combination is skeptic-led

[axis.phase.implementer]
base_tools = ["Read", "Glob", "Grep", "Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)", "Edit", "Write"]
writes = true
default_personality = "pragmatist"  # simplest thing that works and reads well maps to pragmatist's disposition

[axis.phase.fixer]
base_tools = ["Read", "Glob", "Grep", "Bash(npm run lint:*)", "Bash(npm run build:*)", "Bash(git status:*)", "Bash(git diff:*)", "Edit", "Write"]
writes = true
default_personality = "pragmatist"  # minimal fix to the flagged findings maps to pragmatist's decisive, load-bearing-first disposition

# ---------- recipes (7) ----------
# Each recipe names a curated subset of (phase, domain,
# personality) cells for guild-spawn. Recipes replace the
# anonymous [[combinations]] table from panel.manifest.toml +
# preserve the existing design-systems recipe. Cells must be
# derivable from the cross-product (axis.phase exists; phase ∈
# axis.domain.<d>.phases and axis.personality.<p>.phases). The
# Phase-1.1 U1 naming is in the script header; later phases may
# rename.

[[recipes]]
name = "reviewer-default"
phase = "reviewer"
personality = "skeptic"
domains = ["a11y", "react", "naming", "tokens", "test-unit", "test-integration", "css-architecture", "nextjs"]

[[recipes]]
name = "plan-performance"
phase = "plan"
personality = "methodical"
domains = ["performance", "substrate"]

[[recipes]]
name = "plan-react"
phase = "plan"
personality = "synthesizer"
domains = ["react", "test-unit", "test-integration"]

[[recipes]]
name = "plan-a11y"
phase = "plan"
personality = "generative"
domains = ["a11y"]

[[recipes]]
name = "design-systems"
phase = "plan"
personality = "generative"
domains = ["composition", "abstraction", "tokens", "naming"]

# research-default staffs the read-only research posture across every
# domain that has a plan agent — full RPI symmetry (investigation precedes
# planning). Methodical: leave no sibling case unexamined. New cells
# inherit the escalation contract via the fusion prompt.
[[recipes]]
name = "research-default"
phase = "research"
personality = "methodical"
domains = ["a11y", "abstraction", "composition", "naming", "performance", "react", "substrate", "test-integration", "test-unit", "tokens"]

# implementer-default seeds the write-capable implementer phase on the
# css-architecture proof domain — the first pragmatist cell. Expansion
# to the full domain set is a deferred follow-up wave.
[[recipes]]
name = "implementer-default"
phase = "implementer"
personality = "pragmatist"
domains = ["css-architecture", "tokens"]

# fixer-default seeds the write-capable fixer phase on the
# css-architecture proof domain, completing the implement-verify-fix
# posture set. Expansion to the full domain set is a deferred follow-up.
[[recipes]]
name = "fixer-default"
phase = "fixer"
personality = "pragmatist"
domains = ["css-architecture", "tokens"]

# ---------- singletons (1) ----------
# A singleton is a (phase, personality) pair with NO domain — the
# domain-agnostic agent. plan-skeptic is the skeptic at
# plan that pressure-tests whatever brief it receives, taking
# the brief's domain at dispatch rather than baking one in.

[[singletons]]
name = "plan-skeptic"
phase = "plan"
personality = "skeptic"

# ---------- retained (1) ----------
# Hand-authored agents codegen never touches. contract-fit is the
# always-on baseline reviewer — a panel-composition role, not a
# personality x domain combination — the one principled exception
# to the cross-product. evaluator-base and plan-base are
# documentation roots inlined into every generated body by
# codegen; they are not separately retained at the axes-level.

[[retained]]
name = "contract-fit"
